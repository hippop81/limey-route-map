<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄遠征ルートマップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --primary:    #222222;
  --secondary:  #777777;
  --lime:       #C5E84A;
  --peacock:    #007A8A;
  --soft-lime:  #E8F5C0;
  --cream:      #F7F5EE;
  --warm-gray:  #D9D6CC;
  --light-gray: #EEEEEE;
  --white:      #FFFFFF;
  --font-head:  "DM Sans", "Helvetica Neue", sans-serif;
  --font-body:  "Space Grotesk", Helvetica, sans-serif;
  --ease:       cubic-bezier(0.25, 0.8, 0.25, 1);
  --dur:        220ms;
  --radius:     8px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--primary);
  height: 100dvh;
  display: flex;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Sidebar ── */
.sidebar {
  width: 308px; min-width: 308px;
  background: var(--cream);
  border-right: 1px solid var(--warm-gray);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
  position: relative;
}
.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--warm-gray);
  background: var(--white);
  flex-shrink: 0;
}
.sidebar-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.header-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; position: relative; }
/* More menu dropdown */
.more-menu {
  display: none; position: absolute; right: 0; top: calc(100% + 6px);
  background: var(--white); border: 1px solid var(--warm-gray);
  border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.14);
  padding: 5px; min-width: 148px; z-index: 200; flex-direction: column; gap: 2px;
}
.more-menu.open { display: flex; }
.more-menu-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 7px; background: transparent; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); text-align: left; white-space: nowrap; width: 100%;
}
.more-menu-item:hover { background: var(--soft-lime); color: var(--peacock); }
.eyebrow {
  font-family: var(--font-body);
  font-size: 10px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--peacock); margin-bottom: 4px;
  display: flex; align-items: center; gap: 7px;
}
.eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--lime); flex-shrink: 0; }
.app-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1.25; }
.title-accent { background: var(--lime); padding: 0 5px 1px; border-radius: 3px; }

.edit-toggle-btn {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--secondary); background: transparent;
  border: 1.5px solid var(--warm-gray); border-radius: 6px;
  padding: 5px 10px; cursor: pointer; transition: all .2s;
  white-space: nowrap; flex-shrink: 0;
}
.edit-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
.edit-toggle-btn.on { background: var(--lime); border-color: transparent; color: var(--primary); }

.settings-btn {
  font-family: var(--font-body); font-size: 14px;
  color: var(--secondary); background: transparent;
  border: 1.5px solid var(--warm-gray); border-radius: 6px;
  padding: 5px 8px; cursor: pointer; transition: all .2s;
  flex-shrink: 0; line-height: 1;
}
.settings-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Day tabs ── */
.day-tabs { display: flex; border-bottom: 1px solid var(--warm-gray); background: var(--white); flex-shrink: 0; }
.day-tab {
  flex: 1; padding: 10px 6px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--secondary); cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  transition: all var(--dur) var(--ease);
  line-height: 1.5; text-align: center;
}
.day-tab:hover { color: var(--primary); background: var(--cream); }
.day-tab.active { color: var(--peacock); border-bottom-color: var(--peacock); background: var(--cream); }

/* ── Timeline ── */
.timeline {
  flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 16px;
  scrollbar-width: thin; scrollbar-color: var(--warm-gray) var(--cream);
}
.timeline::-webkit-scrollbar { width: 3px; }
.timeline::-webkit-scrollbar-thumb { background: var(--warm-gray); border-radius: 2px; }

.stop-row { display: flex; gap: 10px; cursor: pointer; }
.stop-row:hover .stop-card { border-color: var(--peacock); box-shadow: 0 2px 8px rgba(0,122,138,.08); }
.stop-row.active .stop-card {
  border-color: var(--peacock); border-left-width: 3px;
  background: var(--white); box-shadow: 0 2px 12px rgba(0,122,138,.12);
}
.stop-row.passed .stop-card { background: var(--soft-lime); border-color: rgba(149,186,32,.45); }
.stop-row.passed .stop-time  { color: #6b8a00; }
.stop-row.passed .stop-name  { color: #3d5000; }
.stop-row.passed .stop-desc  { color: #7a9a10; }

.stop-spine { display: flex; flex-direction: column; align-items: center; min-width: 16px; padding-top: 14px; }
.stop-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warm-gray); flex-shrink: 0; transition: all .25s; }
.stop-row.active .stop-dot { background: var(--peacock); width: 11px; height: 11px; margin-left: -1px; box-shadow: 0 0 0 3px rgba(0,122,138,.15); }
.stop-row.passed .stop-dot { background: var(--lime); border: 1.5px solid #93b820; box-shadow: 0 0 0 2px rgba(197,232,74,.3); }
.stop-seg { width: 1px; flex: 1; background: var(--warm-gray); min-height: 14px; transition: background .4s; }
.stop-seg.passed { background: var(--lime); }
.stop-seg.t-bike { border-left: 1px dashed var(--warm-gray); background: transparent; }
.stop-seg.t-bike.passed { border-left-color: var(--lime); background: transparent; }
.stop-seg.t-walk { border-left: 1px dotted var(--warm-gray); background: transparent; }
.stop-seg.t-walk.passed { border-left-color: var(--lime); background: transparent; }

.stop-card {
  flex: 1; padding: 9px 11px;
  border: 1px solid var(--light-gray); border-radius: var(--radius);
  margin-bottom: 0; background: var(--white);
  transition: all .25s var(--ease);
  position: relative;
}
.stop-time  { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--secondary); margin-bottom: 1px; }
.stop-row.active .stop-time { color: var(--peacock); }
.stop-name  { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 3px; line-height: 1.3; }
.stop-desc  { font-size: 11px; color: var(--secondary); margin-bottom: 5px; line-height: 1.5; }
.transport-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.badge { font-family: var(--font-body); font-size: 9px; font-weight: 600; letter-spacing: .04em; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
.b-transport { background: rgba(0,122,138,.08); color: var(--peacock); border: 1px solid rgba(0,122,138,.3); }
.label-tag { font-family: var(--font-body); font-size: 10px; color: var(--secondary); }
.price-tag { font-family: var(--font-body); font-size: 10px; font-weight: 700; color: var(--primary); }
.dur-tag   { font-family: var(--font-body); font-size: 9px; color: var(--warm-gray); margin-left: auto; }
.segment-duration { font-family: var(--font-body); font-size: 9px; color: var(--warm-gray); margin-left: auto; opacity: 0.8; }
.segment-duration[data-load="green"]  { color: #4CAF50; }
.segment-duration[data-load="yellow"] { color: #FF9800; }
.segment-duration[data-load="red"]    { color: #F44336; }
.rhythm-pill { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-body); font-size: 8px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--warm-gray); margin-top: 5px; }
.rhythm-pill .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--warm-gray); }

/* ── Edit mode card ⋮ menu ── */
.card-menu {
  display: none; position: absolute; top: 4px; right: 4px;
  align-items: center; gap: 2px;
}
.timeline.edit-mode .card-menu { display: flex; }
.card-menu-btn {
  width: 24px; height: 24px; border-radius: 5px; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--secondary); transition: all .15s;
  line-height: 1;
}
.card-menu-btn:hover { background: rgba(0,0,0,.06); color: var(--primary); }
.card-menu-wrap { position: relative; }
.card-menu-dropdown {
  display: none; position: absolute; top: 28px; right: 0; z-index: 300;
  background: var(--white); border: 1px solid var(--warm-gray);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.14);
  min-width: 148px;
}
.card-menu-dropdown.open { display: block; }
.card-menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 14px; border: none; background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); cursor: pointer; text-align: left;
  transition: background .12s; white-space: nowrap;
}
.card-menu-item + .card-menu-item { border-top: 1px solid var(--light-gray); }
.card-menu-item:hover { background: var(--soft-lime); }
.card-menu-item.danger { color: #c04444; }
.card-menu-item.danger:hover { background: rgba(192,68,68,.06); }
.card-menu-sub { border-top: 1px solid var(--light-gray); }
.card-menu-sub-item {
  padding: 8px 14px 8px 28px; font-size: 11px; color: var(--secondary);
}
.card-menu-sub-item:hover { color: var(--peacock); background: var(--soft-lime); }

/* ── Edit mode tabs ── */
.edit-tab-bar {
  display: none; border-bottom: 2px solid var(--light-gray);
  padding: 0 12px; background: var(--white); flex-shrink: 0;
}
.edit-tab {
  padding: 7px 14px; border: none; background: transparent;
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--secondary); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all .15s;
}
.edit-tab.active { color: var(--peacock); border-bottom-color: var(--peacock); }

/* ── Day edit panel ── */
.day-edit-panel {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
}
.de-day-card {
  background: var(--white); border: 1.5px solid var(--light-gray);
  border-radius: var(--radius); padding: 12px; margin-bottom: 8px;
  transition: border-color .15s;
}
.de-day-card.de-day-active { border-color: var(--peacock); }
.de-day-hd {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.de-day-num {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: var(--peacock); flex: 1;
}
.de-day-stat {
  font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--secondary);
}
.de-day-switch {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--peacock); background: var(--soft-lime);
  border: none; border-radius: 4px; padding: 2px 7px; cursor: pointer;
  opacity: 0; transition: opacity .15s;
}
.de-day-card:hover .de-day-switch { opacity: 1; }

/* ── Cost bar totals ── */
.cost-total { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--peacock); }

.add-row {
  display: none; justify-content: center;
  margin: 0 0 0 26px;
}
.timeline.edit-mode .add-row { display: flex; }
.btn-add-stop {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--secondary); background: transparent;
  border: 1.5px dashed var(--warm-gray); border-radius: 6px;
  padding: 3px 10px; cursor: pointer; transition: all .2s;
  justify-content: center; width: 100%;
}
.btn-add-stop:hover { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.03); }

/* ── Cost bar ── */
.cost-bar {
  padding: 9px 16px; border-top: 1px solid var(--warm-gray);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--soft-lime); flex-shrink: 0;
}
.cost-label { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #556b00; }
.cost-num   { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--primary); }

/* ── Controls ── */
.controls {
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  border-top: 1px solid var(--warm-gray);
  display: flex; flex-direction: column; gap: 8px;
  background: var(--white); flex-shrink: 0;
}
/* ── Seek bar row ── */
.ctrl-seek-row { display: flex; flex-direction: column; gap: 5px; }
.ctrl-seek {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--peacock) var(--seek-pct,0%), var(--warm-gray) var(--seek-pct,0%));
}
.ctrl-seek::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--peacock); border: 2px solid var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,.22); cursor: pointer;
}
.ctrl-seek::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--peacock); border: 2px solid var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,.22); cursor: pointer;
}
.ctrl-seek-meta { display: flex; align-items: center; justify-content: space-between; }
.ctrl-seek-label { font-family: var(--font-body); font-size: 9px; font-weight: 600; color: var(--secondary); letter-spacing: .04em; }
.ctrl-speed-chips { display: flex; gap: 4px; }
.speed-chip {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .04em; padding: 2px 7px; border-radius: 20px;
  border: 1.5px solid var(--light-gray); background: transparent;
  color: var(--secondary); cursor: pointer; transition: all .15s;
}
.speed-chip.sel { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.08); }
/* ── Button row ── */
.ctrl-btn-row { display: flex; gap: 6px; }
.btn {
  flex: 1; padding: 8px 10px;
  border-radius: var(--radius); border: 1.5px solid; cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  transition: all var(--dur) var(--ease);
}
.btn-play { background: var(--peacock); border-color: var(--peacock); color: var(--white); }
.btn-play:hover { background: #006475; }
.btn-play.playing { background: var(--white); border-color: var(--peacock); color: var(--peacock); }
.btn-step {
  flex: 0 0 34px; padding: 8px 0;
  background: var(--soft-lime); border-color: var(--warm-gray); color: var(--peacock);
  font-size: 13px;
}
.btn-step:hover { border-color: var(--peacock); background: var(--lime); }
.btn-reset { background: transparent; border-color: var(--warm-gray); color: var(--secondary); }
.btn-reset:hover { border-color: var(--primary); color: var(--primary); }

/* ── Edit panel (slides over sidebar) ── */
.edit-panel {
  position: absolute; inset: 0; z-index: 30;
  background: var(--cream);
  display: flex; flex-direction: column;
  transform: translateX(102%);
  transition: transform 0.3s var(--ease);
}
.edit-panel.open { transform: translateX(0); }

/* ── Settings panel ── */
.settings-panel {
  position: absolute; inset: 0; z-index: 32;
  background: var(--cream);
  display: flex; flex-direction: column;
  transform: translateX(102%);
  transition: transform 0.3s var(--ease);
}
.settings-panel.open { transform: translateX(0); }

.ep-header {
  padding: 14px 16px;
  background: var(--white); border-bottom: 1px solid var(--warm-gray);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.ep-back {
  font-family: var(--font-body); font-size: 11px; font-weight: 600;
  color: var(--peacock); background: transparent; border: none;
  cursor: pointer; padding: 0; display: flex; align-items: center; gap: 3px;
}
.ep-back:hover { color: #006475; }
.ep-title {
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  color: var(--primary); flex: 1;
}

.ep-body { flex: 1; overflow-y: auto; padding: 16px; }

.ep-section { margin-bottom: 18px; }
.ep-section-label {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--secondary); margin-bottom: 10px; display: block;
}
.ep-field { margin-bottom: 10px; }
.ep-lbl {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--secondary); margin-bottom: 4px; display: block;
}
.ep-input, .ep-textarea {
  width: 100%; font-family: var(--font-body); font-size: 12px;
  color: var(--primary); background: var(--white);
  border: 1px solid var(--light-gray); border-radius: 6px;
  padding: 8px 10px; outline: none; transition: border-color .2s;
}
.ep-textarea { resize: vertical; min-height: 58px; line-height: 1.5; }
.ep-input:focus, .ep-textarea:focus { border-color: var(--peacock); }
.ep-row { display: flex; gap: 8px; }
.ep-row .ep-field { flex: 1; }

.type-groups { display: flex; flex-direction: column; gap: 6px; }
.type-group-row { display: flex; flex-wrap: wrap; gap: 5px; }
.type-group-label {
  font-family: var(--font-body); font-size: 8px; font-weight: 700;
  letter-spacing: .10em; text-transform: uppercase;
  color: var(--secondary); opacity: .5; padding: 0 2px; margin-top: 2px;
}
.type-chip {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 20px;
  border: 1.5px solid var(--light-gray);
  background: transparent; color: var(--secondary);
  cursor: pointer; transition: all .18s;
}
.type-chip.sel { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.08); }

.cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.cat-chip {
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  background: var(--cream); border: 1.5px solid var(--warm-gray);
  border-radius: 20px; padding: 4px 10px; cursor: pointer;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  color: var(--primary);
}
.cat-chip.sel { background: var(--lime); border-color: transparent; }
.cat-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  color: var(--peacock); background: var(--soft-lime);
  border-radius: 10px; padding: 1px 7px 1px 5px;
  margin-top: 3px;
}
@keyframes cat-arrive {
  0%   { transform: scale(1);   opacity: .85; }
  100% { transform: scale(4.0); opacity: 0; }
}

.ep-coord-row { display: flex; gap: 6px; }
.ep-coord-row .ep-input { font-size: 11px; }
.ep-pick-btn {
  flex-shrink: 0; padding: 8px 10px;
  background: var(--cream); border: 1px solid var(--warm-gray);
  border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all .2s; white-space: nowrap; line-height: 1;
}
.ep-pick-btn:hover { background: var(--soft-lime); border-color: var(--peacock); }
.ep-pick-btn.picking { background: var(--lime); border-color: transparent; }

/* ── Drag reorder ── */
.drag-handle { font-size: 14px; color: var(--secondary); cursor: grab; padding: 0 5px; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.stop-row.dragging { opacity: 0.3; }
.stop-row.drag-over .stop-card { border-color: var(--peacock) !important; background: var(--soft-lime) !important; outline: 2px dashed var(--peacock); }
/* ── Move to Day ── */
.ep-gtfs-hint { font-family: var(--font-body); font-size: 10px; margin-top: 3px; min-height: 14px; }
.ep-gtfs-ok   { color: #2a7a2a; }
.ep-gtfs-warn { color: #c04444; }
.ep-dur-row { display: flex; align-items: center; gap: 6px; }
.ep-dur-input { width: 56px !important; text-align: center; }
.ep-dur-sep { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--secondary); white-space: nowrap; }
.ep-move-wrap { margin: 0 0 4px; }
.ep-move-btn {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1.5px dashed var(--warm-gray); background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--secondary); cursor: pointer; text-align: left; transition: all .15s;
  display: flex; justify-content: space-between; align-items: center;
}
.ep-move-btn:hover { border-color: var(--peacock); color: var(--peacock); }
.ep-move-menu {
  display: none; margin-top: 4px; border: 1px solid var(--warm-gray);
  border-radius: 8px; overflow: hidden;
}
.ep-move-menu.open { display: block; }
.ep-move-item {
  display: block; width: 100%; padding: 11px 14px; text-align: left; border: none;
  border-bottom: 1px solid var(--light-gray); background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); cursor: pointer; transition: background .12s;
}
.ep-move-item:last-child { border-bottom: none; }
.ep-move-item:hover { background: var(--soft-lime); color: var(--peacock); }
.ep-footer {
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
  border-top: 1px solid var(--warm-gray);
  background: var(--white);
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.ep-btn-del {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: #c04444; background: transparent;
  border: 1.5px solid rgba(192,68,68,.3); border-radius: var(--radius);
  padding: 8px 10px; cursor: pointer; transition: all .2s;
}
.ep-btn-del:hover { background: rgba(192,68,68,.06); border-color: #c04444; }
.ep-btn-save {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--white); background: var(--peacock);
  border: 1.5px solid var(--peacock); border-radius: var(--radius);
  padding: 8px 16px; cursor: pointer; transition: all .2s;
}
.ep-btn-save:hover { background: #006475; }
.ep-btn-outline {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--peacock); background: transparent;
  border: 1.5px solid var(--peacock); border-radius: var(--radius);
  padding: 8px 16px; cursor: pointer; transition: all .2s; width: 100%;
}
.ep-btn-outline:hover { background: rgba(0,122,138,.06); }
.ep-err {
  font-family: var(--font-body); font-size: 10px; color: #c04444;
  margin-top: 4px; display: none;
}
.ep-err.show { display: block; }

/* ── Place search dropdown ── */
.ep-search-wrap { position: relative; }
.ep-search-results {
  display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--warm-gray); border-radius: var(--radius);
  box-shadow: 0 6px 20px rgba(0,0,0,.11); z-index: 200; overflow: hidden;
}
.ep-search-results.open { display: block; }
.ep-search-item {
  padding: 9px 12px; cursor: pointer;
  border-bottom: 1px solid var(--light-gray); transition: background .14s;
}
.ep-search-item:last-child { border-bottom: none; }
.ep-search-item:hover, .ep-search-item:focus { background: rgba(0,122,138,.06); outline: none; }
.ep-search-item-name {
  font-family: var(--font-head); font-size: 12px; font-weight: 600;
  color: var(--primary); margin-bottom: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ep-search-item-addr {
  font-family: var(--font-body); font-size: 10px; color: var(--secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ep-search-msg {
  padding: 10px 12px;
  font-family: var(--font-body); font-size: 11px; color: var(--secondary); text-align: center;
}
.ep-search-ctx-hint {
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  color: var(--peacock); letter-spacing: .03em;
  margin-top: 4px; padding-left: 8px;
  border-left: 2px solid var(--peacock);
  line-height: 1.4;
  opacity: 0; max-height: 0; overflow: hidden;
  transition: opacity var(--dur) var(--ease), max-height var(--dur) var(--ease);
}
.ep-search-ctx-hint.visible { opacity: 1; max-height: 20px; }

/* ── Shape ID searchable dropdown ── */
.shape-combo { position: relative; }
.shape-dropdown {
  display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  max-height: 220px; overflow-y: auto;
  background: var(--white); border: 1px solid var(--warm-gray); border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,.13); z-index: 230;
}
.shape-dropdown.open { display: block; }
.shape-option {
  padding: 9px 11px; cursor: pointer;
  border-bottom: 1px solid var(--light-gray); transition: background .12s;
}
.shape-option:last-child { border-bottom: none; }
.shape-option:hover, .shape-option.active { background: rgba(0,122,138,.07); }
.shape-option-main {
  font-family: var(--font-head); font-size: 12px; font-weight: 700;
  color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.shape-option-sub {
  font-family: var(--font-body); font-size: 10px; color: var(--secondary);
  margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.shape-status {
  min-height: 16px; margin-top: 4px;
  font-family: var(--font-body); font-size: 10px; font-weight: 600;
  letter-spacing: .02em; color: var(--secondary);
}
.shape-status.ok { color: var(--peacock); }
.shape-status.warn { color: #c04444; }
.shape-status.loading { color: var(--secondary); }

/* ── Settings day card ── */
.settings-day-card {
  background: var(--white); border: 1px solid var(--light-gray);
  border-radius: var(--radius); padding: 12px; margin-bottom: 8px;
}
.settings-day-label {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--peacock); margin-bottom: 8px;
}
.settings-action-row { display: flex; gap: 8px; margin-top: 10px; }

/* ── Map ── */
#map { flex: 1; position: relative; }
.leaflet-container { background: #1a6a7a; }

.leaflet-popup-content-wrapper {
  background: var(--white) !important; border-top: 3px solid var(--peacock) !important;
  border-radius: var(--radius) !important; color: var(--primary) !important;
  box-shadow: 0 6px 24px rgba(0,0,0,.18) !important; padding: 0 !important;
}
.leaflet-popup-content { margin: 12px 14px !important; }
.leaflet-popup-tip { background: var(--white) !important; }
.leaflet-popup-close-button { color: var(--secondary) !important; top: 6px !important; right: 8px !important; }
.leaflet-control-zoom a {
  background: var(--white) !important; color: var(--primary) !important;
  border-color: var(--warm-gray) !important; border-radius: 6px !important;
}
.leaflet-control-zoom a:hover { background: var(--cream) !important; }

/* Map pick mode */
.map-pick-tip {
  display: none;
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(34,34,34,.88); color: var(--white);
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  padding: 9px 18px; border-radius: 20px;
  pointer-events: none; z-index: 500; white-space: nowrap;
}
.map-pick-tip.on { display: block; }
#map.pick-mode .leaflet-container { cursor: crosshair !important; }

/* ── Hamburger (desktop fallback — hidden on mobile bottom sheet) ── */
.map-menu-btn { display: none; }

/* ── Overlay (desktop drawer — not used on mobile) ── */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.28); z-index: 999;
  opacity: 0; transition: opacity 0.3s;
}

/* ── Pin pulse animations ── */
@keyframes pulse-std  { 0%{transform:scale(1);opacity:.75} 70%{transform:scale(2.2);opacity:0} 100%{transform:scale(2.2);opacity:0} }
@keyframes pulse-slow { 0%{transform:scale(1);opacity:.65} 70%{transform:scale(2.4);opacity:0} 100%{transform:scale(2.4);opacity:0} }
@keyframes pulse-fast { 0%{transform:scale(1);opacity:.80} 60%{transform:scale(1.9);opacity:0} 100%{transform:scale(1.9);opacity:0} }

/* ── Sheet drag area (mobile only peek strip) ── */
.sheet-drag-area { display: none; }

/* ── Mobile bottom sheet ── */
@media (max-width: 768px), (hover: none) and (pointer: coarse) {
  #map { width: 100%; height: 100dvh; flex: none; }

  .sidebar {
    position: fixed;
    left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; min-width: unset;
    height: 90dvh;
    border-right: none;
    border-radius: 18px 18px 0 0;
    transform: translateY(calc(90dvh - 76px));
    transition: transform 0.34s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 -6px 32px rgba(0,0,0,.13);
    z-index: 1000;
  }
  .sidebar.open { transform: none; }

  .sheet-drag-area {
    display: flex; flex-direction: column; flex-shrink: 0;
    background: var(--white);
    border-radius: 18px 18px 0 0;
    cursor: grab; touch-action: none; user-select: none;
  }
  .sheet-knob-wrap {
    display: flex; justify-content: center; padding: 10px 0 8px;
  }
  .sheet-knob {
    width: 36px; height: 4px;
    background: var(--warm-gray); border-radius: 2px;
  }
  .sheet-status-row {
    display: flex; align-items: center;
    padding: 0 16px 12px; gap: 10px;
  }
  .sheet-status-left {
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
  }
  .sheet-route-badge {
    font-family: var(--font-head); font-size: 11px; font-weight: 700;
    background: var(--lime); padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
  }
  .sheet-status-texts { display: flex; flex-direction: column; min-width: 0; }
  .sheet-status-day {
    font-family: var(--font-body); font-size: 9px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--secondary); line-height: 1.2;
  }
  .sheet-status-stop {
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    color: var(--primary); line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sheet-mini-play {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--peacock); border: none;
    color: var(--white); font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all .2s;
    padding-left: 2px;
  }
  .sheet-mini-play:active { background: #006475; transform: scale(.93); }
  .sheet-mini-play.playing {
    background: var(--white); border: 1.5px solid var(--peacock);
    color: var(--peacock); padding-left: 0;
  }

  .controls { padding-bottom: max(16px, env(safe-area-inset-bottom, 16px)); padding-top: 8px; }
  .ctrl-seek-row { flex-direction: row; align-items: center; gap: 10px; }
  .ctrl-seek { flex: 1; }
  .ctrl-seek-meta { flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .ctrl-seek-label { display: none; }
  /* Edit mode: hide replay controls and mini-play */
  .sidebar.edit-on .controls { display: none; }
  .sidebar.edit-on .sheet-mini-play { display: none; }
  .leaflet-control-zoom { margin-top: 16px !important; margin-left: 16px !important; }
  .stop-card { max-width: 640px; }
}

/* ── Wide touch devices (tablets / foldables) ── */
@media (hover: none) and (pointer: coarse) and (min-width: 641px) {
  .sidebar {
    left: 50%;
    right: auto;
    width: min(640px, 100vw);
    margin-left: calc(-1 * min(320px, 50vw));
  }
}

/* ── Palette chips ── */
.palette-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.palette-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 20px;
  border: 1.5px solid var(--light-gray); background: transparent;
  cursor: pointer; transition: all .18s;
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  color: var(--secondary); letter-spacing: .02em;
}
.palette-chip:hover { border-color: var(--warm-gray); color: var(--primary); }
.palette-chip.active { border-color: var(--peacock); color: var(--peacock); background: rgba(0,0,0,.03); }
.palette-dots { display: flex; gap: 3px; }
.palette-dot { width: 10px; height: 10px; border-radius: 50%; display: block; flex-shrink: 0; }

/* ── Poster button ── */
.btn-poster {
  background: transparent; border-color: var(--warm-gray); color: var(--secondary);
}
.btn-poster:hover { border-color: var(--peacock); color: var(--peacock); }
.btn-profile {
  background: transparent; border-color: var(--warm-gray); color: var(--secondary);
}
.btn-profile:hover { border-color: var(--peacock); color: var(--peacock); }

/* ── Profile Modal ── */
.profile-modal {
  position: fixed; inset: 0; z-index: 2800;
  background: rgba(34,34,34,.55); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur) var(--ease);
}
.profile-modal.open { opacity: 1; pointer-events: all; }
.profile-inner {
  background: var(--cream); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 480px; height: 90dvh; max-height: 90dvh;
  display: flex; flex-direction: column;
  transform: translateY(40px);
  transition: transform var(--dur) var(--ease);
  overflow: hidden;
}
.profile-modal.open .profile-inner { transform: translateY(0); }
.profile-ph {
  padding: 16px 20px; border-bottom: 1px solid var(--warm-gray);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--white); flex-shrink: 0;
}
.profile-ph-title {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--peacock);
}
.profile-ph-close {
  font-family: var(--font-body); font-size: 12px; color: var(--secondary);
  background: transparent; border: 1.5px solid var(--warm-gray);
  border-radius: 6px; padding: 4px 10px; cursor: pointer;
}
.profile-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0 20px; padding-bottom: max(60px, env(safe-area-inset-bottom, 60px)); -webkit-overflow-scrolling: touch; }
.pf-hero { padding: 24px 0 20px; border-bottom: 1px solid var(--warm-gray); }
.pf-eyebrow {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase; color: var(--peacock); margin-bottom: 6px;
}
.pf-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; line-height: 1.15; color: var(--primary); }
.pf-subtitle { font-family: var(--font-body); font-size: 13px; color: var(--secondary); margin-top: 2px; margin-bottom: 14px; }
.pf-counts { display: flex; align-items: baseline; gap: 10px; }
.pf-big { font-family: var(--font-head); font-size: 42px; font-weight: 700; line-height: 1; color: var(--primary); }
.pf-unit { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--secondary); letter-spacing: .06em; text-transform: uppercase; }
.pf-sep { font-size: 20px; color: var(--warm-gray); }
.pf-section { padding: 20px 0; border-bottom: 1px solid var(--warm-gray); }
.pf-section-label {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--secondary); margin-bottom: 12px;
}
.pf-dist-total { display: flex; align-items: baseline; gap: 4px; }
.pf-bar-row { display: grid; grid-template-columns: 20px 60px 1fr 36px auto; align-items: center; gap: 8px; margin-bottom: 8px; }
.pf-bar-icon { font-size: 14px; text-align: center; }
.pf-bar-name { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--primary); }
.pf-bar-track { height: 6px; background: var(--light-gray); border-radius: 3px; overflow: hidden; }
.pf-bar-fill { height: 100%; background: var(--lime); border-radius: 3px; }
.pf-bar-pct { font-family: var(--font-body); font-size: 11px; font-weight: 700; color: var(--primary); text-align: right; }
.pf-bar-rides { font-family: var(--font-body); font-size: 10px; color: var(--secondary); white-space: nowrap; }
.pf-act-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.pf-act-icon { font-size: 16px; width: 22px; text-align: center; }
.pf-act-name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--primary); flex: 1; }
.pf-act-count { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--primary); }
.pf-rhythm-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pf-rhythm-bar { display: inline-block; width: 22px; height: 8px; background: var(--light-gray); border-radius: 3px; }
.pf-rhythm-bar.on { background: var(--lime); }
.pf-rhythm-label { font-family: var(--font-body); font-size: 12px; font-weight: 700; color: var(--primary); margin-left: 6px; }
.pf-personality { border-bottom: none; }
.pf-pers-name {
  font-family: var(--font-head); font-size: 32px; font-weight: 700;
  color: var(--primary); line-height: 1.1;
  background: var(--lime); display: inline-block;
  padding: 2px 10px 4px; border-radius: 4px; margin-bottom: 8px;
}
.pf-pers-desc { font-family: var(--font-body); font-size: 13px; color: var(--secondary); }
.pf-achievement {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--light-gray);
}
.pf-achievement:last-child { border-bottom: none; }
.pf-ach-icon { font-size: 24px; flex-shrink: 0; width: 32px; text-align: center; }
.pf-ach-info { display: flex; flex-direction: column; gap: 2px; }
.pf-ach-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--primary); }
.pf-ach-desc { font-family: var(--font-body); font-size: 11px; color: var(--secondary); }
/* Profile v5.8 — hero layout */
.pf-pers-hero-icon { font-size: 52px; line-height: 1; margin-bottom: 8px; }
.pf-pers-hero-name { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--primary); line-height: 1.1; margin-bottom: 10px; }
.pf-chips-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.pf-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px 4px 8px; border-radius: 20px; font-family: var(--font-body); font-size: 11px; font-weight: 700; }
.pf-chip-vibe { background: var(--soft-lime); color: var(--peacock); }
.pf-chip-rhythm { background: var(--light-gray); color: var(--primary); }
.pf-story { font-family: var(--font-body); font-size: 13px; color: var(--secondary); line-height: 1.55; margin-bottom: 18px; }
.pf-stats-row { display: flex; border-top: 1px solid var(--warm-gray); padding-top: 16px; }
.pf-stat { flex: 1; text-align: center; }
.pf-stat-num { font-family: var(--font-head); font-size: 30px; font-weight: 700; color: var(--primary); line-height: 1; }
.pf-stat-unit { font-family: var(--font-body); font-size: 10px; font-weight: 600; color: var(--secondary); text-transform: uppercase; letter-spacing: .06em; display: block; margin-top: 2px; }
.pf-stat-div { width: 1px; background: var(--warm-gray); margin: 4px 0; }

/* ── AI Draft modal ── */
.ai-draft-modal {
  position: fixed; inset: 0; z-index: 2800;
  background: rgba(34,34,34,.55); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur) var(--ease);
}
.ai-draft-modal.open { opacity: 1; pointer-events: all; }
.ai-draft-inner {
  background: var(--cream); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 480px; height: 92dvh; max-height: 92dvh;
  display: flex; flex-direction: column; overflow: hidden;
  transform: translateY(40px);
  transition: transform var(--dur) var(--ease);
}
.ai-draft-modal.open .ai-draft-inner { transform: translateY(0); }
.ai-draft-body {
  flex: 1 1 auto; min-height: 0; overflow-y: auto;
  padding: 16px; padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
  -webkit-overflow-scrolling: touch;
}
.ai-textarea {
  width: 100%; box-sizing: border-box;
  min-height: 120px; resize: vertical;
  font-family: var(--font-body); font-size: 13px; color: var(--primary);
  background: var(--white); border: 1.5px solid var(--warm-gray); border-radius: 8px;
  padding: 10px 12px; line-height: 1.55; outline: none;
  transition: border-color .15s;
}
.ai-textarea:focus { border-color: var(--peacock); }
.ai-gen-btn { width: 100%; margin-top: 10px; }
.ai-preview-header {
  display: flex; align-items: center; justify-content: space-between;
  margin: 18px 0 10px; padding-top: 16px;
  border-top: 1px solid var(--warm-gray);
}
.ai-preview-count {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  color: var(--peacock); background: rgba(0,122,138,.1);
  padding: 2px 8px; border-radius: 10px;
}
.ai-confirm-btn { width: 100%; margin-top: 14px; }
/* Draft card */
.draft-card {
  background: var(--white); border: 1.5px solid var(--warm-gray);
  border-radius: 10px; padding: 12px; margin-bottom: 8px;
  transition: border-color .15s;
}
.draft-card:focus-within { border-color: var(--peacock); }
.draft-card-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.draft-conf {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.draft-time-inp {
  font-family: var(--font-body); font-size: 13px; font-weight: 700; color: var(--primary);
  background: transparent; border: none; outline: none;
  width: 52px; padding: 0;
}
.draft-transport-sel {
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  color: var(--peacock); background: rgba(0,122,138,.1);
  border: 1px solid rgba(0,122,138,.25); border-radius: 10px;
  padding: 2px 6px; cursor: pointer; outline: none; flex-shrink: 0;
}
.draft-dayend-lbl {
  font-family: var(--font-body); font-size: 10px; color: var(--secondary);
  display: flex; align-items: center; gap: 3px; margin-left: auto; cursor: pointer;
}
.draft-name-inp {
  font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--primary);
  background: transparent; border: none; border-bottom: 1.5px solid var(--warm-gray);
  outline: none; width: 100%; padding: 2px 0 4px; margin-bottom: 8px;
  transition: border-color .15s;
}
.draft-name-inp:focus { border-bottom-color: var(--peacock); }
.draft-cats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.draft-cat-btn {
  font-family: var(--font-body); font-size: 10px; font-weight: 600;
  background: var(--light-gray); color: var(--secondary);
  border: 1.5px solid transparent; border-radius: 20px;
  padding: 3px 8px; cursor: pointer; transition: background .15s, color .15s, border-color .15s;
}
.draft-cat-btn.sel {
  background: rgba(0,122,138,.1); color: var(--peacock);
  border-color: rgba(0,122,138,.3);
}
.draft-op-hint {
  font-family: var(--font-body); font-size: 10px; color: var(--secondary); margin-top: 3px;
}
.ai-err {
  background: rgba(192,68,68,.08); color: rgba(192,68,68,.9);
  border: 1px solid rgba(192,68,68,.25); border-radius: 8px;
  font-family: var(--font-body); font-size: 12px; padding: 10px 12px; margin-top: 10px;
}
.ai-day-sel-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.ai-day-sel-lbl { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--primary); }
.ai-day-sel {
  font-family: var(--font-body); font-size: 12px; color: var(--primary);
  background: var(--white); border: 1.5px solid var(--warm-gray); border-radius: 8px;
  padding: 5px 10px; outline: none; cursor: pointer;
}
/* ── Export modal ── */
.export-sheet {
  display: none; position: fixed; inset: 0; z-index: 3100;
  background: rgba(0,0,0,.55); align-items: center; justify-content: center;
  padding: 20px;
}
.export-sheet.open { display: flex; }
.export-sheet-inner {
  background: var(--white); width: 100%; max-width: 360px;
  border-radius: 16px;
  padding: 20px 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.export-sheet-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.export-sheet-title {
  font-family: var(--font-body); font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--secondary);
}
.export-sheet-close {
  font-size: 16px; background: transparent; border: none; color: var(--secondary);
  cursor: pointer; padding: 2px 6px; border-radius: 4px;
}
.export-sheet-close:hover { background: var(--light-gray); }
.export-sheet-btn {
  width: 100%; padding: 13px 16px; border-radius: var(--radius);
  border: 1.5px solid var(--warm-gray); background: var(--white);
  font-family: var(--font-body); font-size: 13px; font-weight: 700;
  color: var(--primary); cursor: pointer; text-align: center; transition: all .15s;
}
.export-sheet-btn:hover { border-color: var(--peacock); color: var(--peacock); }
.export-sheet-btn-share { background: var(--peacock); border-color: var(--peacock); color: var(--white); }
.export-sheet-btn-share:hover { background: #006475; border-color: #006475; color: var(--white); }

/* ── Poster modal ── */
.poster-modal {
  display: none; position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,.78); align-items: center; justify-content: center;
  padding: 20px;
}
.poster-modal.open { display: flex; }
.poster-wrap {
  background: var(--white); width: 100%; max-width: 440px;
  border-radius: 16px; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  max-height: 92dvh;
}
.poster-modal-header {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.poster-modal-title {
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  color: var(--primary); flex: 1;
}
.poster-modal-close {
  font-size: 16px; line-height: 1; background: transparent; border: none;
  color: var(--secondary); cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.poster-modal-close:hover { background: var(--light-gray); }
.poster-preview {
  flex: 1; overflow-y: auto; display: flex; justify-content: center;
  min-height: 200px; background: var(--light-gray); border-radius: 8px;
}
.poster-preview img {
  width: 100%; height: auto; border-radius: 8px;
  display: block; transition: opacity .3s;
}
.poster-actions { display: flex; gap: 8px; flex-shrink: 0; }
/* Poster range selector */
.poster-range-wrap { flex-shrink: 0; }
.poster-range-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.poster-range-title { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--secondary); text-transform: uppercase; letter-spacing: .04em; flex: 1; }
.poster-range-btn { font-size: 10px; font-family: var(--font-body); font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1.5px solid var(--light-gray); background: transparent; color: var(--secondary); cursor: pointer; }
.poster-range-btn:hover { border-color: var(--peacock); color: var(--peacock); }
.poster-range-list { display: flex; flex-direction: column; gap: 1px; max-height: 160px; overflow-y: auto; border: 1px solid var(--light-gray); border-radius: 8px; padding: 4px; }
.poster-range-item { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 5px; cursor: pointer; transition: background .12s; }
.poster-range-item:hover { background: var(--soft-lime); }
.poster-range-item input[type=checkbox] { accent-color: var(--peacock); width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }
.poster-range-item-time { font-family: var(--font-body); font-size: 10px; color: var(--peacock); font-weight: 600; min-width: 36px; }
.poster-range-item-name { font-family: var(--font-body); font-size: 12px; color: var(--primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
/* Poster generating overlay */
.poster-preview { position: relative; }
.poster-generating { display: none; position: absolute; inset: 0; background: rgba(247,245,238,.82); align-items: center; justify-content: center; gap: 10px; border-radius: 8px; flex-direction: column; z-index: 1; }
.poster-generating.active { display: flex; }
.poster-gen-spinner { width: 24px; height: 24px; border: 3px solid var(--light-gray); border-top-color: var(--peacock); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.poster-gen-label { font-family: var(--font-body); font-size: 11px; color: var(--secondary); }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImport(this)">

<div class="sidebar" id="sidebar">

  <!-- ── Mobile peek strip ── -->
  <div class="sheet-drag-area" id="sheetDragArea">
    <div class="sheet-knob-wrap"><div class="sheet-knob"></div></div>
    <div class="sheet-status-row">
      <div class="sheet-status-left">
        <span class="sheet-route-badge">ROUTE</span>
        <div class="sheet-status-texts">
          <span class="sheet-status-day" id="sdDay">Day 1</span>
          <span class="sheet-status-stop" id="sdStop">5 stops</span>
        </div>
      </div>
      <button class="sheet-mini-play" id="sdPlayBtn" onclick="event.stopPropagation();togglePlay()">&#9654;</button>
    </div>
  </div>

  <div class="sidebar-header">
    <div class="sidebar-header-top">
      <div>
        <div class="eyebrow" id="eyebrow"><span class="eyebrow-dot"></span>Okinawa June 2026</div>
        <div class="app-title" id="appTitle"><span class="title-accent">ROUTE</span> MAP</div>
      </div>
      <div class="header-actions">
        <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">✏ Edit Trip</button>
        <button class="settings-btn" id="moreBtn" onclick="toggleMoreMenu(event)">⋯</button>
        <div class="more-menu" id="moreMenu">
          <button class="more-menu-item" onclick="openPosterModal();closeMoreMenu()">🖼 Poster</button>
          <button class="more-menu-item" onclick="openProfileModal();closeMoreMenu()">📖 Journey Log</button>
          <button class="more-menu-item" onclick="openExportSheet();closeMoreMenu()">📤 Export</button>
          <button class="more-menu-item" onclick="openSettings();closeMoreMenu()">⚙ Settings</button>
        </div>
      </div>
    </div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>

  <div class="edit-tab-bar" id="editTabBar">
    <button class="edit-tab active" id="etabStops" onclick="switchEditTab('stops')">Stops</button>
    <button class="edit-tab" id="etabDays" onclick="switchEditTab('days')">Days</button>
  </div>

  <div class="timeline" id="timeline"></div>
  <div class="day-edit-panel" id="dayEditPanel" style="display:none"></div>
  <div class="cost-bar" id="costBar"></div>

  <div class="controls">
    <div class="ctrl-seek-row">
      <input type="range" class="ctrl-seek" id="seekBar" min="0" max="1000" value="0" step="0.1"
        oninput="onSeekInput(this.value)" onchange="onSeekChange(this.value)">
      <div class="ctrl-seek-meta">
        <span class="ctrl-seek-label" id="seekStopLabel">— Stops</span>
        <div class="ctrl-speed-chips">
          <button class="speed-chip" data-speed="0.5" onclick="setPlaybackSpeed(0.5)">0.5×</button>
          <button class="speed-chip sel" data-speed="1"   onclick="setPlaybackSpeed(1)"  >1×</button>
          <button class="speed-chip" data-speed="2"   onclick="setPlaybackSpeed(2)"  >2×</button>
        </div>
      </div>
    </div>
    <div class="ctrl-btn-row">
      <button class="btn btn-step" onclick="stepPrev()" title="前のStop">&#8592;</button>
      <button class="btn btn-play" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
      <button class="btn btn-step" onclick="stepNext()" title="次のStop">&#8594;</button>
      <button class="btn btn-reset" onclick="resetAnim()">&#8635;</button>
    </div>
  </div>

  <!-- ── Edit panel ── -->
  <div class="edit-panel" id="editPanel">
    <div class="ep-header">
      <button class="ep-back" onclick="closeEP()">&#8592; Back</button>
      <span class="ep-title" id="epTitle">Stop を編集</span>
    </div>
    <div class="ep-body">

      <div class="ep-section">
        <span class="ep-section-label">基本情報</span>
        <div class="ep-row">
          <div class="ep-field" style="flex:0 0 90px">
            <label class="ep-lbl">時刻</label>
            <input class="ep-input" id="ef-time" type="text" inputmode="numeric" placeholder="09:21" oninput="toHankaku(this)">
          </div>
          <div class="ep-field" style="flex:1">
            <label class="ep-lbl">場所名 <span style="color:#c04444">*</span></label>
            <input class="ep-input" id="ef-name" type="text" placeholder="那覇空港">
            <div class="ep-err" id="ef-name-err">場所名を入力してください</div>
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-lbl">メモ</label>
          <textarea class="ep-input ep-textarea" id="ef-memo" placeholder="コインロッカーに荷物を預けてから乗車"></textarea>
        </div>
        <div class="ep-field">
          <label class="ep-lbl">カテゴリ（複数選択可）</label>
          <div class="cat-chips" id="catChips">
            <button class="cat-chip" data-cat="food"        onclick="epToggleCategory('food')"       >🍜 Food</button>
            <button class="cat-chip" data-cat="cafe"        onclick="epToggleCategory('cafe')"       >☕ Café</button>
            <button class="cat-chip" data-cat="stay"        onclick="epToggleCategory('stay')"       >🏨 Stay</button>
            <button class="cat-chip" data-cat="sightseeing" onclick="epToggleCategory('sightseeing')">🏛 Sight</button>
            <button class="cat-chip" data-cat="heritage"    onclick="epToggleCategory('heritage')"   >⛩️ Heritage</button>
            <button class="cat-chip" data-cat="event"       onclick="epToggleCategory('event')"      >🎫 Event</button>
            <button class="cat-chip" data-cat="shopping"    onclick="epToggleCategory('shopping')"   >🛒 Shop</button>
            <button class="cat-chip" data-cat="onsen"       onclick="epToggleCategory('onsen')"      >♨️ Onsen</button>
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-lbl" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="ef-is-day-end" style="width:15px;height:15px;accent-color:var(--lime);cursor:pointer">
            Day End（その日の最終地点）
          </label>
        </div>
      </div>

      <div class="ep-section">
        <span class="ep-section-label">移動手段</span>
        <div class="ep-field">
          <div class="type-groups" id="typeGroups">
            <div class="type-group-row">
              <button class="type-chip" data-type="plane" onclick="epSetType('plane')">✈️ Plane</button>
              <button class="type-chip" data-type="ferry" onclick="epSetType('ferry')">🚢 Ferry</button>
            </div>
            <div class="type-group-label">— Train —</div>
            <div class="type-group-row">
              <button class="type-chip" data-type="shinkansen"    onclick="epSetType('shinkansen')"   >🚄 Shinkansen</button>
              <button class="type-chip" data-type="train_limited" onclick="epSetType('train_limited')">🚃 Limited Exp.</button>
              <button class="type-chip" data-type="train_local"   onclick="epSetType('train_local')"  >🚃 Local Train</button>
            </div>
            <div class="type-group-label">— Bus —</div>
            <div class="type-group-row">
              <button class="type-chip" data-type="bus_express" onclick="epSetType('bus_express')">🚍 Highway Bus</button>
              <button class="type-chip" data-type="bus_local"   onclick="epSetType('bus_local')"  >🚌 Local Bus</button>
              <button class="type-chip" data-type="shuttle"     onclick="epSetType('shuttle')"    >🚐 Shuttle</button>
            </div>
            <div class="type-group-row">
              <button class="type-chip" data-type="car"  onclick="epSetType('car')" >🚗 Car</button>
              <button class="type-chip" data-type="bike" onclick="epSetType('bike')">🚴 Bike</button>
              <button class="type-chip" data-type="walk" onclick="epSetType('walk')">🚶 Walk</button>
            </div>
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-lbl">ラベル（バス番号など）</label>
          <input class="ep-input" id="ef-label" type="text" placeholder="117番 高速バス">
        </div>
        <div class="ep-row">
          <div class="ep-field">
            <label class="ep-lbl">料金</label>
            <input class="ep-input" id="ef-fare" type="text" inputmode="numeric" placeholder="¥2,880" oninput="toHankaku(this)" onblur="formatFareInput(this)">
          </div>
          <div class="ep-field">
            <label class="ep-lbl">所要時間</label>
            <div class="ep-dur-row">
              <input class="ep-input ep-dur-input" id="ef-dur-h" type="text" inputmode="numeric" placeholder="0" oninput="toHankaku(this)">
              <span class="ep-dur-sep">時間</span>
              <input class="ep-input ep-dur-input" id="ef-dur-m" type="text" inputmode="numeric" placeholder="0" oninput="toHankaku(this)">
              <span class="ep-dur-sep">分</span>
            </div>
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-lbl">GTFS Shape ID</label>
          <div class="shape-combo" id="shapeCombo">
            <input class="ep-input" id="ef-shape-id" type="text"
              placeholder="yuirail:shapes_383_1"
              autocomplete="off"
              oninput="onShapeInput()"
              onfocus="openShapeDropdown()"
              onkeydown="onShapeKeydown(event)"
              onblur="setTimeout(closeShapeDropdown, 180)">
            <div class="shape-status" id="shapeStatus"></div>
            <div class="shape-dropdown" id="shapeDropdown"></div>
          </div>
        </div>
      </div>

      <div class="ep-section">
        <span class="ep-section-label">位置</span>
        <div class="ep-field">
          <label class="ep-lbl">場所を検索</label>
          <div class="ep-search-wrap" id="epSearchWrap">
            <input class="ep-input" id="ef-search" type="text"
              placeholder="美ら海水族館、那覇空港…"
              autocomplete="off"
              oninput="onSearchInput()"
              onblur="setTimeout(closeSearchResults, 200)">
            <div class="ep-search-results" id="epSearchResults"></div>
          </div>
          <div class="ep-search-ctx-hint" id="epSearchHint"></div>
        </div>
        <div class="ep-field">
          <label class="ep-lbl">緯度 / 経度 <span style="color:#c04444">*</span></label>
          <div class="ep-coord-row">
            <input class="ep-input" id="ef-lat" type="text" inputmode="decimal" placeholder="26.196" oninput="toHankaku(this)">
            <input class="ep-input" id="ef-lng" type="text" inputmode="decimal" placeholder="127.646" oninput="toHankaku(this)">
            <button class="ep-pick-btn" id="epPickBtn" onclick="startMapPick()" title="地図をタップして座標を設定">📍</button>
          </div>
          <div class="ep-err" id="ef-coord-err">座標を入力または地図でタップしてください</div>
        </div>
      </div>

    </div>
    <div class="ep-footer">
      <button class="ep-btn-del" id="epDelBtn" onclick="epDelete()">Delete</button>
      <button class="ep-btn-save" onclick="epSave()">Save</button>
    </div>
  </div>

  <!-- ── Settings panel ── -->
  <div class="settings-panel" id="settingsPanel">
    <div class="ep-header">
      <button class="ep-back" onclick="closeSettings()">&#8592; Back</button>
      <span class="ep-title">設定</span>
      <button class="ep-btn-save" onclick="saveSettings()">Save</button>
    </div>
    <div class="ep-body">

      <div class="ep-section">
        <span class="ep-section-label">旅のタイトル</span>
        <div class="ep-field">
          <label class="ep-lbl">タイトル</label>
          <input class="ep-input" id="sf-title" type="text" placeholder="ROUTE MAP">
        </div>
        <div class="ep-field">
          <label class="ep-lbl">サブタイトル</label>
          <input class="ep-input" id="sf-subtitle" type="text" placeholder="Okinawa June 2026">
        </div>
      </div>

      <div class="ep-section">
        <span class="ep-section-label">カラーテーマ</span>
        <div class="palette-grid" id="paletteGrid"></div>
      </div>

      <div class="ep-section">
        <span class="ep-section-label">データ</span>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="ep-btn-save" onclick="openAIDraftModal();closeSettings()" style="width:100%;background:var(--peacock)">🤖 AI 旅程生成</button>
          <button class="ep-btn-save" onclick="exportJSON()" style="width:100%">↓ JSON Export</button>
          <button class="ep-btn-outline" onclick="triggerImport()">↑ JSON Import</button>
          <button class="ep-btn-outline" onclick="triggerGtfsImport()">🚃 GTFS JSON Import</button>
          <input type="file" id="gtfsFileInput" accept=".json" style="display:none" onchange="handleGtfsImport(event)">
        </div>
      </div>

      <div class="ep-section">
        <span class="ep-section-label" style="color:rgba(192,68,68,.7)">リセット</span>
        <button class="ep-btn-del" onclick="resetToDefaults()" style="width:100%;padding:10px">デフォルトデータに戻す</button>
      </div>

    </div>
  </div>

</div><!-- .sidebar -->

<!-- ── AI Draft modal ── -->
<div class="ai-draft-modal" id="aiDraftModal" onclick="if(event.target===this)closeAIDraftModal()">
  <div class="ai-draft-inner">
    <div class="profile-ph">
      <span class="profile-ph-title">🤖 AI 旅程生成</span>
      <button class="profile-ph-close" onclick="closeAIDraftModal()">閉じる</button>
    </div>
    <div class="ai-draft-body">

      <div>
        <label class="ep-lbl">旅程テキスト</label>
        <textarea class="ai-textarea" id="aiTextarea" placeholder="例：&#10;7月1日 09:00 羽田空港から飛行機で出発&#10;11:30 那覇空港着、ゆいレールで国際通りへ&#10;13:00 タコス屋でランチ&#10;15:00 美ら海水族館（観光）&#10;18:00 名護のホテルに宿泊"></textarea>
        <div id="aiErrMsg"></div>
        <button class="ep-btn-save ai-gen-btn" id="aiGenBtn" onclick="generateDraftStops()">✨ 旅程を生成</button>
      </div>

      <div id="aiDraftPreview" style="display:none">
        <div class="ai-preview-header">
          <span class="ep-section-label" style="margin:0">🤖 AI生成（確認してください）</span>
          <span class="ai-preview-count" id="aiPreviewCount"></span>
        </div>
        <div id="aiDraftCards"></div>
        <div class="ai-day-sel-row">
          <span class="ai-day-sel-lbl">追加先</span>
          <select class="ai-day-sel" id="aiTargetDay"></select>
        </div>
        <button class="ep-btn-save ai-confirm-btn" id="aiConfirmBtn" onclick="confirmDraftStops()">旅程に追加 →</button>
      </div>

    </div>
  </div>
</div>

<!-- ── Poster modal ── -->
<div class="poster-modal" id="posterModal" onclick="if(event.target===this)closePosterModal()">

function saveToStorage() {

}
function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);

    if (data.trip) {
      TRIP.title    = data.trip.title    || TRIP.title;
      TRIP.subtitle = data.trip.subtitle !== undefined ? data.trip.subtitle : TRIP.subtitle;

      DAYS = {};
      Object.keys(data.days).forEach(function(k) { DAYS[parseInt(k)] = data.days[k]; });
      _migrateDays(DAYS);
    }
    return true;

/* ─── Export / Import ─── */
function openExportSheet() {

function closeExportSheet() {

function _buildExportBlob() {
  return new Blob([JSON.stringify({ schemaVersion: ROUTE_SCHEMA_VERSION, trip: TRIP, days: DAYS }, null, 2)], { type: 'application/json' });
}
function downloadJSON() {
  var blob = _buildExportBlob();
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ((TRIP.subtitle || 'route-map').replace(/\s+/g, '-').toLowerCase()) + '.json';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
  closeExportSheet();
}
function shareJSON() {
  var blob = _buildExportBlob();
  var filename = ((TRIP.subtitle || 'route-map').replace(/\s+/g, '-').toLowerCase()) + '.json';
  var file = new File([blob], filename, { type: 'application/json' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: TRIP.title || 'Route Map' });
  } else {
    var url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
  }
  closeExportSheet();
}

function triggerImport() {
  document.getElementById('importFileInput').value = '';
  document.getElementById('importFileInput').click();
}
function handleImport(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);

      /* ── Validation (fail early, never touch localStorage) ── */
      if (!data.days || typeof data.days !== 'object') {
        alert('読み込みエラー: daysフィールドがありません。有効なルートマップJSONを選択してください。'); return;
      }
      var errs = [];
      Object.keys(data.days).forEach(function(k) {
        var day = data.days[k];
        if (!day.stops || !Array.isArray(day.stops)) { errs.push('Day ' + k + ': stops が配列ではありません'); return; }
        day.stops.forEach(function(s, i) {
          if (!s.name)             errs.push('Day ' + k + ' Stop ' + (i+1) + ': name が未設定');
          if (s.lat == null || s.lng == null) errs.push('Day ' + k + ' Stop ' + (i+1) + ': 座標(lat/lng)が未設定');
        });
      });
      if (errs.length) {
        alert('読み込みエラー:\n' + errs.slice(0, 6).join('\n') + (errs.length > 6 ? '\n…他 ' + (errs.length - 6) + ' 件' : '')); return;
      }
      var sv = parseFloat(data.schemaVersion || '0');
      if (sv > 0 && sv < 5.0 && !confirm('古いバージョン (schemaVersion ' + data.schemaVersion + ') のデータです。続けますか？')) return;

      /* ── Import (only reached if validation passed) ── */
      if (data.trip) {
        TRIP.title    = data.trip.title    || TRIP.title;
        TRIP.subtitle = data.trip.subtitle !== undefined ? data.trip.subtitle : TRIP.subtitle;
      }
      DAYS = {};
      Object.keys(data.days).forEach(function(k) { DAYS[parseInt(k)] = data.days[k]; });
      _migrateDays(DAYS);
      var firstDay = parseInt(Object.keys(DAYS).sort(function(a,b){return a-b;})[0]) || 1;
      saveToStorage();
      renderHeader();
      currentDay = firstDay;
      renderDayTabs();
      switchDay(firstDay);
      closeSettings();
    } catch(err) { alert('JSONの読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
}

function triggerGtfsImport() {
  document.getElementById('gtfsFileInput').value = '';
  document.getElementById('gtfsFileInput').click();
}
function handleGtfsImport(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (loadGtfsDbObject(data)) {
        stopAnim(); playing = false; setPlayBtn(false); currentStop = -1;
        te.normalizedTime=0;te.baseTime=0;te.lastStopIdx=-1;te.lastSegIdx=-1;
        removeCurrentPin();
        initRouteLines();
        renderMapMarkers();
        renderTimeline();
        alert(Object.keys(GTFS_DB.shapes || {}).length + ' shapes を読み込みました');
        return;
      }
      var arr = data;
      if (!Array.isArray(arr)) arr = [arr];
      var added = 0;
      arr.forEach(function(entry) {
        if (!entry.name || !entry.stops || !entry.types) return;
        var key = entry.name.replace(/[\s　]/g, '_').toLowerCase();
        if (!entry.shape) entry.shape = entry.stops.map(function(s){ return [s.lat, s.lng]; });
        GTFS_PROX_DB[key] = entry;
        added++;
      });
      if (!added) { alert('有効な GTFS エントリが見つかりませんでした'); return; }
      stopAnim(); playing = false; setPlayBtn(false); currentStop = -1;
      te.normalizedTime=0;te.baseTime=0;te.lastStopIdx=-1;te.lastSegIdx=-1;
      removeCurrentPin();
      initRouteLines();
      renderMapMarkers();
      renderTimeline();
      alert(added + ' 路線を読み込みました');
    } catch(err) { alert('GTFS JSON の読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
}

function renderDayTabs() {
  var html = '';
  Object.keys(DAYS).map(Number).sort(function(a,b){return a-b;}).forEach(function(d) {
    var active = d === currentDay ? ' active' : '';
    var label  = DAYS[d].label || '';

            '</button>';
  });
  document.getElementById('dayTabs').innerHTML = html;
}

  cameraState.targetLat = target[0];
  cameraState.targetLng = target[1];

  cameraState.lat = lerp(cameraState.lat, cameraState.targetLat, cfg.alpha);
  cameraState.lng = lerp(cameraState.lng, cameraState.targetLng, cfg.alpha);
  cameraState.zoom = lerp(cameraState.zoom, cameraState.targetZoom, CAMERA_CONFIG.zoomAlpha);
  map.setView([cameraState.lat, cameraState.lng], cameraState.zoom, { animate: false });
}

/* ─── Bezier helpers ─── */
function bezierPt(p0, c, p1, t) { var m=1-t; return [m*m*p0[0]+2*m*t*c[0]+t*t*p1[0], m*m*p0[1]+2*m*t*c[1]+t*t*p1[1]]; }
function ctrlPt(f,t,b)  { var dl=t[0]-f[0],dn=t[1]-f[1]; return [(f[0]+t[0])/2-dn*b,(f[1]+t[1])/2+dl*b]; }

function lineInterp(f, t, te) { return [f[0] + (t[0]-f[0])*te, f[1] + (t[1]-f[1])*te]; }
function fallbackUsesArc(type) { return type === 'plane' || type === 'ferry'; }
function fallbackGeometryPoints(from, to, type) {
  var f = [from.lat, from.lng], t = [to.lat, to.lng];
  var c = tcfg(type);
  if (!fallbackUsesArc(type) || !c.curve) return [f, t];
  var ctrl = ctrlPt(f, t, c.curve), pts = [];
  for (var i = 0; i <= 48; i++) pts.push(bezierPt(f, ctrl, t, i/48));
  return pts;
}
function buildSegmentGeometry(from, to) {
  var shapeId = explicitSegmentShapeId(from, to);
  var shapePts = shapeId ? findShapeById(shapeId, from.lat, from.lng, to.lat, to.lng) : null;
  if (shapePts) return { type: 'shape', shapeId: shapeId, points: shapePts, fallback: false, provenance: 'gtfs' };
  // Proximity DB fallback (GTFS_PROX_DB station matching)
  var proxPts = findProxDbShape(from.lat, from.lng, to.lat, to.lng, from.transport);
  if (proxPts) return { type: 'shape', shapeId: '', points: proxPts, fallback: false, provenance: 'prox-db' };
  var usesArc = fallbackUsesArc(from.transport);
  return { type: usesArc ? 'arc' : 'line', shapeId: shapeId || '', points: fallbackGeometryPoints(from, to, from.transport), fallback: true, provenance: usesArc ? 'inferred' : 'fallback' };
}
function findProxDbShape(fromLat, fromLng, toLat, toLng, type) {
  var THRESHOLD = 0.5;
  var keys = Object.keys(GTFS_PROX_DB);
  for (var ki = 0; ki < keys.length; ki++) {
    var db = GTFS_PROX_DB[keys[ki]];
    if (!db || !db.types || !db.stops || !db.shape) continue;
    if (db.types.indexOf(type) < 0) continue;
    var fromIdx = -1, toIdx = -1, fromDist = Infinity, toDist = Infinity;
    for (var si = 0; si < db.stops.length; si++) {
      var s = db.stops[si];
      var d1 = haversineKm(fromLat, fromLng, s.lat, s.lng);
      var d2 = haversineKm(toLat,   toLng,   s.lat, s.lng);
      if (d1 < fromDist) { fromDist = d1; fromIdx = si; }
      if (d2 < toDist)   { toDist   = d2; toIdx   = si; }
    }
    if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) continue;
    if (fromDist > THRESHOLD || toDist > THRESHOLD) continue;
    var pts = fromIdx < toIdx
      ? db.shape.slice(fromIdx, toIdx + 1)

}
function buildRouteMetrics(day) {

  var segments = [], cum = [0], geoms = [], sum = 0;
  for (var i = 0; i < stops.length - 1; i++) {
    var from = stops[i], to = stops[i+1];
    /* skip segments where either endpoint has no coordinates yet (AI draft) */
    if (from.lat == null || from.lng == null || to.lat == null || to.lng == null) {
      segments.push(null); cum.push(sum); geoms.push(null); continue;
    }
    var dist = haversineKm(from.lat, from.lng, to.lat, to.lng);
    sum += dist;
    segments.push({ from: from, to: to, dist: dist });
    cum.push(sum);
    geoms.push(buildSegmentGeometry(from, to));
  }
  routeSegments = segments;
  cumulativeDist = cum;
  totalDist = sum;
  segmentGeometries = geoms;
  segShapes = geoms.map(function(g) { return g && g.type === 'shape' ? g.points : null; });

/* O(log n) binary search over cumulativeDist — Codex */
function findSegmentByT(t) {

}
function fullSegPts(fi, ti) {

}
function partialSegPts(fi, te) {
  return slicePolylineAt(fullSegPts(fi, fi+1), clamp01(te));
}

/* ─── Route lines ─── */
function initRouteLines() {
  segLines.forEach(function(l){if(l)map.removeLayer(l);}); segProgressLines.forEach(function(l){if(l)map.removeLayer(l);});
  segLines=[]; segProgressLines=[];
  buildRouteMetrics(currentDay);
  var stops=DAYS[currentDay].stops;
  for(var i=0;i<stops.length-1;i++){
    var from=stops[i];
    /* skip null-coord segments (AI draft stops awaiting location) */
    if (!segmentGeometries[i] || from.lat == null || from.lng == null ||
        stops[i+1].lat == null || stops[i+1].lng == null) {
      segLines.push(null); segProgressLines.push(L.polyline([],{color:LIME,weight:4,opacity:.9,lineCap:'round'}).addTo(map));
      continue;
    }
    var c=tcfg(from.transport), pts=fullSegPts(i,i+1);
    var dash = segmentGeometries[i] && segmentGeometries[i].type === 'shape' ? null : (c.dashArray||'6 5');
    segLines.push(L.polyline(pts,{color:'#C4C0B6',weight:Math.max(1.5,c.lineWeight),opacity:.8,dashArray:dash,lineCap:'round'}).addTo(map));
    segProgressLines.push(L.polyline([],{color:LIME,weight:c.progWeight||4,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map));
  }

}
function updateAllProgress() {
  var nT = te.normalizedTime;

    var seg = segmentTable[i];
    if (!seg) { segProgressLines[i].setLatLngs([]); continue; }
    if (nT <= seg.startT) {
      segProgressLines[i].setLatLngs([]);
    } else if (nT >= seg.endT) {
      segProgressLines[i].setLatLngs(fullSegPts(i, i+1));
    } else {
      var _lt = (nT - seg.startT) / (seg.endT - seg.startT);

/* ─── Jump ─── */
function jumpTo(i) {
