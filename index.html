<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄遠征 ROUTE MAP — limey</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#222222;--secondary:#777777;--lime:#C5E84A;--peacock:#007A8A;
  --soft-lime:#E8F5C0;--cream:#F7F5EE;--warm-gray:#D9D6CC;
  --light-gray:#EEEEEE;--white:#FFFFFF;
  --font-head:"DM Sans",sans-serif;--font-body:"Space Grotesk",sans-serif;
  --radius:8px;--ease:cubic-bezier(0.25,0.8,0.25,1);--dur:220ms;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--cream);color:var(--primary);height:100dvh;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
.screen{display:none;height:100dvh;height:100vh;}
.screen.active{display:flex;}
#mapScreen.active{flex:1;min-height:0;height:100dvh;height:100vh;}

/* ── My Trips screen ── */
#tripsScreen{flex-direction:column;background:var(--cream);height:100dvh;height:100vh;min-height:0;max-height:100dvh;max-height:100vh;overflow:hidden;}
.trips-header{flex-shrink:0;padding:max(28px,var(--safe-top)) max(24px,var(--safe-right)) 20px max(24px,var(--safe-left));background:var(--white);border-bottom:1px solid var(--warm-gray);}
.trips-header .eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--peacock);display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.trips-header .eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--lime);flex-shrink:0;}
.trips-title{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--primary);}
.trips-title-accent{background:var(--lime);padding:0 6px 2px;border-radius:3px;}
.trips-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:20px max(24px,var(--safe-right)) 12px max(24px,var(--safe-left));}
.trips-list{display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto;width:100%;}
.trip-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--white);border:1px solid var(--warm-gray);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all var(--dur) var(--ease);position:relative;}
.trip-card:hover,.trip-card:focus-visible{border-color:var(--peacock);box-shadow:0 4px 14px rgba(0,122,138,.12);transform:translateY(-1px);outline:none;}
.trip-card-emoji{font-size:28px;line-height:1;flex-shrink:0;width:36px;text-align:center;}
.trip-card-body{flex:1;min-width:0;}
.trip-card-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--primary);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trip-card-meta{font-size:11px;color:var(--secondary);line-height:1.5;}
.trip-card-meta span{display:block;}
.trip-card-delete{flex-shrink:0;width:32px;height:32px;border:none;background:transparent;color:var(--secondary);border-radius:var(--radius);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--dur) var(--ease);opacity:0;}
.trip-card:hover .trip-card-delete,.trip-card:focus-within .trip-card-delete{opacity:1;}
.trip-card-delete:hover{background:rgba(0,0,0,.06);color:var(--primary);}
.trip-card-sync{display:none;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--peacock);margin-top:2px;}
.trips-skeleton{display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto;width:100%;}
.trips-skeleton[hidden]{display:none!important;}
.skeleton-card{height:76px;background:linear-gradient(90deg,var(--light-gray) 25%,var(--white) 50%,var(--light-gray) 75%);background-size:200% 100%;animation:shimmer 1.2s ease-in-out infinite;border-radius:var(--radius);border:1px solid var(--warm-gray);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.trips-empty{max-width:480px;margin:48px auto 0;text-align:center;padding:0 24px;}
.trips-empty-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--primary);margin-bottom:8px;}
.trips-empty-sub{font-size:13px;color:var(--secondary);margin-bottom:20px;}
.trips-empty-cta{padding:11px 24px;border-radius:var(--radius);border:1.5px solid var(--peacock);background:var(--peacock);color:#fff;cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);}
.trips-empty-cta:hover{background:#006475;}
.trips-error{max-width:480px;margin:24px auto;padding:14px 16px;background:#fff5f5;border:1px solid #fcc;border-radius:var(--radius);font-size:12px;color:#a33;text-align:center;}
.trips-footer{flex-shrink:0;padding:16px max(24px,var(--safe-right)) max(16px,var(--safe-bottom)) max(24px,var(--safe-left));background:var(--white);border-top:1px solid var(--warm-gray);}
.trips-footer-inner{max-width:480px;margin:0 auto;}
.btn-new-trip{width:100%;padding:12px;border-radius:var(--radius);border:1.5px solid var(--peacock);background:var(--white);color:var(--peacock);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);}
.btn-new-trip:hover{background:var(--peacock);color:#fff;}
.btn-ai-trip{width:100%;padding:12px;border-radius:var(--radius);border:1.5px solid var(--lime);background:var(--soft-lime);color:#556b00;cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);margin-bottom:10px;}
.btn-ai-trip:hover{background:var(--lime);color:var(--primary);}
.trips-footer-inner .btn-row{display:flex;flex-direction:column;gap:0;}

/* ── AI Draft flow (Phase 1.5A) ── */
#aiInputScreen,#draftPreviewScreen{flex-direction:column;background:var(--cream);}
.draft-header{padding:28px 24px 20px;background:var(--white);border-bottom:1px solid var(--warm-gray);}
.draft-header .back-link{display:inline-flex;align-items:center;border:none;background:transparent;color:var(--peacock);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.04em;padding:0 0 10px;margin:0;}
.draft-header .back-link:hover{color:var(--primary);}
.draft-title{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--primary);}
.draft-body{flex:1;overflow-y:auto;padding:20px 24px;}
.draft-panel{max-width:520px;margin:0 auto;width:100%;}
.draft-textarea{width:100%;min-height:140px;padding:14px;border:1px solid var(--warm-gray);border-radius:var(--radius);background:var(--white);font-family:var(--font-body);font-size:14px;line-height:1.6;color:var(--primary);resize:vertical;}
.draft-textarea:focus{outline:none;border-color:var(--peacock);box-shadow:0 0 0 3px rgba(0,122,138,.12);}
.draft-textarea::placeholder{color:var(--secondary);}
.draft-generating{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 0;color:var(--secondary);font-size:13px;}
.draft-footer{padding:16px 24px 24px;background:var(--white);border-top:1px solid var(--warm-gray);}
.draft-footer-inner{max-width:520px;margin:0 auto;display:flex;gap:10px;}
.btn-draft-primary{flex:1;padding:12px;border-radius:var(--radius);border:1.5px solid var(--lime);background:var(--lime);color:var(--primary);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.btn-draft-primary:hover{background:#b8d942;}
.btn-draft-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-draft-secondary{flex:1;padding:12px;border-radius:var(--radius);border:1.5px solid var(--warm-gray);background:var(--white);color:var(--secondary);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.btn-draft-secondary:hover{border-color:var(--primary);color:var(--primary);}
.draft-card-list{display:flex;flex-direction:column;gap:12px;}
.draft-card{background:var(--white);border:1px solid var(--warm-gray);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.draft-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.draft-card-index{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--peacock);min-width:24px;}
.draft-card-badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;}
.draft-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.draft-badge-warn{background:rgba(255,193,7,.15);color:#8a6d00;border:1px solid rgba(255,193,7,.35);}
.draft-badge-error{background:rgba(220,53,69,.1);color:#a33;border:1px solid rgba(220,53,69,.25);}
.draft-badge-loc{background:rgba(0,122,138,.08);color:var(--peacock);border:1px solid rgba(0,122,138,.2);}
.draft-badge-poi{letter-spacing:.02em;line-height:1.35;}
.draft-badge-poi-exact{background:rgba(197,232,74,.22);color:#4a5f00;border:1px solid rgba(197,232,74,.5);}
.draft-badge-poi-near{background:rgba(255,193,7,.12);color:#8a6d00;border:1px solid rgba(255,193,7,.35);}
.draft-transport-chip{font-size:9px;}
.draft-field{margin-bottom:8px;}
.draft-field label{display:block;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--secondary);margin-bottom:3px;}
.draft-field input,.draft-field textarea,.draft-field select{width:100%;padding:7px 9px;border:1px solid var(--light-gray);border-radius:6px;font-family:var(--font-body);font-size:12px;color:var(--primary);background:var(--white);}
.draft-field input:focus,.draft-field textarea:focus,.draft-field select:focus{outline:none;border-color:var(--peacock);}
.draft-field textarea{min-height:52px;resize:vertical;line-height:1.5;}
.draft-field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.draft-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--light-gray);}
.draft-icon-btn{width:32px;height:32px;border:1px solid var(--warm-gray);border-radius:6px;background:var(--white);color:var(--secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.draft-icon-btn:hover{border-color:var(--peacock);color:var(--peacock);}
.draft-icon-btn:disabled{opacity:.35;cursor:not-allowed;}
.draft-icon-btn.draft-delete{margin-left:auto;color:#a33;border-color:#fcc;}
.draft-icon-btn.draft-delete:hover{background:#fff5f5;}
.draft-location{font-size:10px;color:var(--secondary);margin-top:4px;}
.draft-warnings-box{margin-bottom:16px;padding:12px 14px;background:var(--soft-lime);border:1px solid rgba(197,232,74,.5);border-radius:var(--radius);font-size:11px;color:#556b00;line-height:1.5;}

/* ── Map screen (unchanged layout) ── */
#mapScreen{overflow:hidden;height:100dvh;height:100vh;position:relative;}
.sidebar{width:308px;min-width:308px;height:100dvh;height:100vh;max-height:100dvh;max-height:100vh;background:var(--cream);border-right:1px solid var(--warm-gray);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.sidebar-header{flex-shrink:0;padding:18px 18px 14px;border-bottom:1px solid var(--warm-gray);background:var(--white);}
.back-btn{display:inline-flex;align-items:center;gap:4px;border:none;background:transparent;color:var(--peacock);cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.04em;padding:0 0 10px;margin:0;transition:color var(--dur) var(--ease);}
.back-btn:hover{color:var(--primary);}
.map-save-status{display:block;font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--secondary);margin-top:6px;min-height:14px;transition:color var(--dur) var(--ease);}
.map-save-status[data-save-state="pending"],.map-save-status[data-save-state="saving"]{color:var(--peacock);}
.map-save-status[data-save-state="saved"]{color:#556b00;}
.map-save-status[data-save-state="error"]{color:#a33;}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--peacock);display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--lime);flex-shrink:0;}
.app-title{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--primary);}
.title-accent{background:var(--lime);padding:0 5px 1px;border-radius:3px;}
.day-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--warm-gray);background:var(--white);}
.day-tab{flex:1;padding:10px 4px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--secondary);cursor:pointer;font-family:var(--font-body);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all var(--dur) var(--ease);line-height:1.5;text-align:center;}
.day-tab:hover{color:var(--primary);}
.day-tab.active{color:var(--peacock);border-bottom-color:var(--peacock);background:var(--cream);}
.timeline{flex:1;min-height:0;overflow-y:auto;padding:12px 16px;scrollbar-width:thin;scrollbar-color:var(--warm-gray) var(--cream);}
.timeline::-webkit-scrollbar{width:3px;}
.timeline::-webkit-scrollbar-thumb{background:var(--warm-gray);border-radius:2px;}
.stop-row{display:flex;gap:9px;cursor:pointer;}
.stop-row:hover .stop-card{border-color:#bbb;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.stop-row.active .stop-card{border-left:3px solid var(--peacock);background:var(--white);box-shadow:0 2px 10px rgba(0,122,138,.1);}
.stop-spine{display:flex;flex-direction:column;align-items:center;min-width:14px;padding-top:13px;}
.stop-dot{width:8px;height:8px;border-radius:50%;background:var(--warm-gray);flex-shrink:0;transition:all .2s;}
.stop-row.active .stop-dot{background:var(--peacock);width:10px;height:10px;margin-left:-1px;box-shadow:0 0 0 3px rgba(0,122,138,.15);}
.stop-seg{width:1px;flex:1;background:var(--warm-gray);min-height:12px;}
.transit-gap{display:flex;gap:9px;margin:0 0 2px;}
.transit-gap .stop-spine{padding-top:0;align-self:stretch;}
.transit-gap .stop-seg{min-height:22px;margin-top:0;}
.transit-label{font-size:10px;color:var(--secondary);line-height:1.4;padding:4px 0 8px;flex:1;}
.stop-card{flex:1;padding:8px 10px;border:1px solid var(--light-gray);border-radius:var(--radius);margin-bottom:9px;background:var(--white);transition:all .2s var(--ease);}
.stop-time{font-family:var(--font-head);font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--secondary);margin-bottom:1px;}
.stop-row.active .stop-time{color:var(--peacock);}
.stop-name{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--primary);line-height:1.3;margin-bottom:2px;}
.stop-desc{font-size:10px;color:var(--secondary);line-height:1.5;margin-bottom:4px;}
.transport-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{font-family:var(--font-body);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.b-bus{background:rgba(0,122,138,.08);color:var(--peacock);border:1px solid rgba(0,122,138,.25);}
.b-train{background:rgba(91,127,166,.08);color:#5b7fa6;border:1px solid rgba(91,127,166,.25);}
.b-plane{background:rgba(139,92,246,.08);color:#8b5cf6;border:1px solid rgba(139,92,246,.25);}
.b-walk{background:var(--light-gray);color:var(--secondary);border:1px solid var(--warm-gray);}
.b-stay{background:rgba(197,232,74,.2);color:#556b00;border:1px solid rgba(197,232,74,.5);}
.b-tour{background:rgba(0,122,138,.12);color:var(--peacock);border:1px solid rgba(0,122,138,.3);}
.price-tag{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--primary);}
.cost-bar{flex-shrink:0;padding:9px 16px;border-top:1px solid var(--warm-gray);display:flex;justify-content:space-between;align-items:center;background:var(--soft-lime);}
.cost-label{font-family:var(--font-body);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#556b00;}
.cost-num{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--primary);}
.controls{flex-shrink:0;margin-top:auto;padding:11px 16px;padding-bottom:max(11px,env(safe-area-inset-bottom));border-top:1px solid var(--warm-gray);display:flex;gap:8px;background:var(--white);}
.btn{flex:1;padding:9px;border-radius:var(--radius);border:1.5px solid;cursor:pointer;font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);}
.btn-play{background:var(--peacock);border-color:var(--peacock);color:#fff;}
.btn-play:hover{background:#006475;}
.btn-play.playing{background:var(--white);border-color:var(--peacock);color:var(--peacock);}
.btn-reset{background:transparent;border-color:var(--warm-gray);color:var(--secondary);}
.btn-reset:hover{border-color:var(--primary);color:var(--primary);}
.share-btn{display:inline-flex;align-items:center;margin-top:8px;padding:7px 14px;border-radius:var(--radius);border:1.5px solid var(--peacock);background:var(--white);color:var(--peacock);cursor:pointer;font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);}
.share-btn:hover{background:var(--peacock);color:#fff;}
.share-btn.copied{background:var(--soft-lime);border-color:#556b00;color:#556b00;}
#sharedErrorScreen{flex-direction:column;align-items:center;justify-content:center;background:var(--cream);padding:24px;}
.shared-error-inner{max-width:400px;width:100%;text-align:center;padding:32px 24px;background:var(--white);border:1px solid var(--warm-gray);border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.shared-error-title{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--primary);margin-bottom:8px;}
.shared-error-sub{font-size:13px;color:var(--secondary);margin-bottom:24px;line-height:1.5;}
.shared-error-actions{display:flex;flex-direction:column;gap:10px;}
.shared-error-btn{padding:11px 20px;border-radius:var(--radius);border:1.5px solid;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all var(--dur) var(--ease);}
.shared-error-btn-primary{background:var(--peacock);border-color:var(--peacock);color:#fff;}
.shared-error-btn-primary:hover{background:#006475;}
.shared-error-btn-secondary{background:var(--white);border-color:var(--warm-gray);color:var(--secondary);}
.shared-error-btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
.shared-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:48px;color:var(--secondary);font-size:13px;}
.shared-loading-spinner{width:28px;height:28px;border:2px solid var(--warm-gray);border-top-color:var(--peacock);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
body.shared-view .back-btn,body.shared-view #mapSaveStatus,body.shared-view #shareBtn{display:none!important;}
#mapScreen .sidebar-header-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
#map{flex:1;}
.leaflet-container{background:#1a6a7a;}
.leaflet-popup-content-wrapper{background:var(--white)!important;border-top:3px solid var(--peacock)!important;border-radius:var(--radius)!important;color:var(--primary)!important;box-shadow:0 4px 16px rgba(0,0,0,.18)!important;padding:0!important;}
.leaflet-popup-content{margin:11px 13px!important;font-family:var(--font-body)!important;}
.leaflet-popup-tip{background:var(--white)!important;}
.leaflet-popup-close-button{color:var(--secondary)!important;}
.leaflet-control-zoom a{background:var(--white)!important;color:var(--primary)!important;border-color:var(--warm-gray)!important;border-radius:6px!important;}
button,.btn,.share-btn,.day-tab,.trip-card,.stop-row,.draft-icon-btn,.back-btn,.back-link{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.sheet-handle{display:none;}
.day-swipe-hint{display:none;}
.shared-readonly-banner{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 14px;padding-top:max(8px,var(--safe-top));background:rgba(0,122,138,.92);color:#fff;font-size:11px;font-weight:600;letter-spacing:.04em;z-index:600;pointer-events:none;}
.shared-readonly-banner[hidden]{display:none!important;}

<!-- My Trips screen -->
<div id="tripsScreen" class="screen active">
  <header class="trips-header">
    <div class="eyebrow">Limey Route Replay</div>
    <h1 class="trips-title"><span class="trips-title-accent">My</span> Trips</h1>
  </header>
  <div class="trips-body" id="tripsBody">
    <div class="trips-skeleton" id="tripsLoading">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
    <div class="trips-list" id="tripsList" hidden></div>
    <div class="trips-empty" id="tripsEmpty" hidden>
      <div class="trips-empty-title">No trips yet</div>
      <div class="trips-empty-sub">Create your first trip</div>
      <button class="trips-empty-cta" type="button" onclick="handleNewTrip()">Create your first trip</button>
    </div>
    <div class="trips-error" id="tripsError" hidden></div>
  </div>
  <footer class="trips-footer">
    <div class="trips-footer-inner btn-row">
      <button class="btn-ai-trip" type="button" onclick="openAiInput()">+ AI で旅程を作る</button>
      <button class="btn-new-trip" type="button" onclick="handleNewTrip()">New Trip</button>
    </div>
  </footer>
</div>

<!-- AI input screen -->
<div id="aiInputScreen" class="screen">
  <header class="draft-header">
    <button class="back-link" type="button" onclick="showScreen('trips')">&#8592; My Trips</button>
    <div class="eyebrow">AI Draft</div>
    <h1 class="draft-title">旅程を<span class="title-accent">生成</span></h1>
  </header>
  <div class="draft-body">
    <div class="draft-panel">
      <div class="draft-field">
        <label for="aiPromptInput">旅のイメージ</label>
        <textarea id="aiPromptInput" class="draft-textarea" placeholder="例：羽田から沖縄へ。国際通りでタコス、美ら海、名護泊"></textarea>
      </div>
      <div class="draft-generating" id="aiGenerating" hidden>
        <div class="shared-loading-spinner" aria-hidden="true"></div>
        <span>生成中…</span>
      </div>
    </div>
  </div>
  <footer class="draft-footer">
    <div class="draft-footer-inner">
      <button class="btn-draft-primary" id="aiGenerateBtn" type="button" onclick="handleGenerateDraft()">生成する</button>
    </div>
  </footer>
</div>

<!-- DraftStop preview editor -->
<div id="draftPreviewScreen" class="screen">
  <header class="draft-header">
    <button class="back-link" type="button" onclick="openAiInput()">&#8592; 入力に戻る</button>
    <div class="eyebrow">Preview</div>
    <h1 class="draft-title">下書き<span class="title-accent">確認</span></h1>
  </header>
  <div class="draft-body">
    <div class="draft-panel">
      <div class="draft-warnings-box" id="draftWarningsBox" hidden></div>
      <div class="draft-card-list" id="draftCardList"></div>
    </div>
  </div>
  <footer class="draft-footer">
    <div class="draft-footer-inner">
      <button class="btn-draft-secondary" type="button" onclick="redoDraft()">やり直す</button>
      <button class="btn-draft-primary" type="button" onclick="saveDraftTrip()">この旅程を保存</button>
    </div>
  </footer>
</div>

<!-- Shared trip error / loading -->
<div id="sharedErrorScreen" class="screen">
  <div class="shared-error-inner" id="sharedErrorPanel" hidden>
    <div class="shared-error-title" id="sharedErrorTitle">Trip not found</div>
    <div class="shared-error-sub" id="sharedErrorSub"></div>
    <div class="shared-error-actions">
      <button class="shared-error-btn shared-error-btn-secondary" type="button" id="sharedRetryBtn" hidden onclick="retrySharedTrip()">Retry</button>
      <button class="shared-error-btn shared-error-btn-primary" type="button" onclick="exitSharedView()">Go to My Trips</button>
    </div>
  </div>
  <div class="shared-loading" id="sharedLoading">
    <div class="shared-loading-spinner" aria-hidden="true"></div>
    <span>Loading trip…</span>
  </div>
</div>

<!-- Map / replay screen -->
<div id="mapScreen" class="screen">
  <div class="shared-readonly-banner" id="sharedReadonlyBanner" hidden>
    <span class="shared-readonly-icon" aria-hidden="true">&#128065;</span>
    <span>閲覧のみ — 共有された旅程</span>
  </div>
  <div id="map"></div>
  <div class="sidebar" id="routeSheet" data-sheet="half">
    <button type="button" class="sheet-handle" id="sheetHandle" aria-label="ドラッグしてパネルサイズを変更">
      <span class="sheet-handle-bar"></span>
    </button>
    <div class="sidebar-header">
      <button class="back-btn" id="backToTripsBtn" type="button" onclick="goToTrips()">&#8592; My Trips</button>
      <div class="eyebrow" id="mapEyebrow">Trip</div>
      <div class="app-title"><span class="title-accent">ROUTE</span> MAP</div>
      <div class="sidebar-header-actions">
        <button class="share-btn" id="shareBtn" type="button" onclick="handleShareTrip()">Share</button>
      </div>
      <div class="map-save-status" id="mapSaveStatus" data-save-state="saved">Saved ✓</div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="day-swipe-hint" id="daySwipeHint" hidden>左右スワイプで日を切り替え</div>
    <div class="timeline" id="timeline"></div>
    <div class="cost-bar" id="costBar"></div>
    <div class="controls">
      <button class="btn btn-play" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
      <button class="btn btn-reset" onclick="resetAnim()">&#8635; Reset</button>
    </div>
  </div>
</div>

<div class="app-toast" id="shareToast" role="status" aria-live="polite" hidden></div>

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function formatRelativeDate(isoString) {
  if (!isoString) return '';
  var date = new Date(isoString);
  if (isNaN(date.getTime())) return '';
  var now = new Date();
  var diff = Math.round((startOfDay(now) - startOfDay(date)) / 86400000);
  if (diff <= 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return diff + ' days ago';
  if (diff < 14) return '1 week ago';
  if (diff < 30) return Math.floor(diff / 7) + ' weeks ago';
  return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function extractEmoji(title, routeData) {
  var emojiMatch = String(title || '').match(/\p{Extended_Pictographic}/u);
  if (emojiMatch) return emojiMatch[0];
  if (routeData && routeData.trip && routeData.trip.emoji) return routeData.trip.emoji;
  return '✈️';
}

function stripLeadingEmoji(title) {
  return String(title || '').replace(/^\p{Extended_Pictographic}\s*/u, '').trim() || 'Untitled Trip';
}

function countStops(routeData) {
  if (!routeData || !routeData.days) return 0;
  var days = Array.isArray(routeData.days) ? routeData.days : Object.values(routeData.days);
  var total = 0;
  for (var i = 0; i < days.length; i++) {
    if (days[i] && days[i].stops) total += days[i].stops.length;
  }
  return total;
}

var TRANSPORT_BADGE = {
  bus_express:'bus', bus_local:'bus', train_local:'train', shinkansen:'train',
  shuttle:'bus', ferry:'bus', walk:'walk', plane:'plane', stay:'stay', tour:'tour',
  hippop:'tour'
};

function transportToBadge(transport) {
  if (!transport) return 'walk';
  if (TRANSPORT_BADGE[transport]) return TRANSPORT_BADGE[transport];
  var t = String(transport).toLowerCase();
  if (/plane|air|flight|搭乗/.test(t)) return 'plane';
  if (/train|レール|rail|mono/.test(t)) return 'train';
  if (/walk|徒歩/.test(t)) return 'walk';

  if (/stay|ホテル|到着/.test(t)) return 'stay';

/* ── Transit time estimates (Phase 2-B) ── */
var TRANSIT_SPEED_M_PER_MIN = {
  walk: 80,
  bus_local: 250,
  bus_express: 400,
  shuttle: 300,
  train_local: 500,
  train_limited: 700,
  shinkansen: 1200,
  ferry: 150
};

var TRANSIT_EMOJI = {
  walk: '🚶',
  bus_local: '🚌',
  bus_express: '🚌',
  shuttle: '🚌',
  train_local: '🚃',
  train_limited: '🚃',
  shinkansen: '🚄',
  ferry: '⛴️',
  plane: '✈️'
};

function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function normalizeTransportMode(stop) {
  if (!stop) return 'walk';
  var raw = stop.transportMode != null ? stop.transportMode : (stop.transport || '');
  if (TRANSIT_SPEED_M_PER_MIN[raw] || raw === 'plane' || raw === 'stay' || raw === 'tour') return raw;
  var label = String(raw);
  if (/plane|air|flight|搭乗|ソラシド|flight/i.test(label)) return 'plane';
  if (/stay|ホテル|到着|チェックイン/i.test(label) && stop.type === 'stay') return 'stay';
  if (/tour|hippop|バスツアー/i.test(label) || stop.type === 'tour') return 'tour';
  if (/ferry|フェリー|船/i.test(label)) return 'ferry';
  if (/新幹線|shinkansen/i.test(label)) return 'shinkansen';
  if (/急行|limited/i.test(label)) return 'train_limited';
  if (/walk|徒歩/i.test(label) || stop.type === 'walk') return 'walk';
  if (/train|レール|rail|mono|ゆいレール/i.test(label) || stop.type === 'train') return 'train_local';
  if (/シャトル|shuttle/i.test(label)) return 'shuttle';
  if (/高速|express|急行|リムジン|highway|limousine/i.test(label)) return 'bus_express';
  if (stop.type === 'bus') return 'bus_local';
  if (stop.type === 'plane') return 'plane';
  if (stop.type === 'stay') return 'stay';
  if (stop.type === 'tour') return 'tour';
  return 'walk';
}

function formatTransitDuration(minutes) {
  var m = Math.max(1, Math.round(minutes));
  if (m < 60) return '約' + m + '分';
  var h = Math.floor(m / 60);
  var rem = m % 60;
  if (rem === 0) return '約' + h + '時間';
  return '約' + h + '時間' + rem + '分';
}

function getTransitEstimate(stopA, stopB) {
  if (!stopA || !stopB) return { visible: false };
  if (stopA.lat == null || stopA.lng == null || stopB.lat == null || stopB.lng == null) {
    return { visible: false };
  }
  var mode = normalizeTransportMode(stopB);
  if (mode === 'stay' || mode === 'tour') return { visible: false };
  if (mode === 'plane') {
    return { visible: true, emoji: TRANSIT_EMOJI.plane, text: 'Flight' };
  }
  var speed = TRANSIT_SPEED_M_PER_MIN[mode];
  if (!speed) return { visible: false };
  var distKm = haversine(stopA.lat, stopA.lng, stopB.lat, stopB.lng);
  var minutes = (distKm * 1000) / speed;
  return {
    visible: true,
    emoji: TRANSIT_EMOJI[mode] || '🚌',
    text: formatTransitDuration(minutes)
  };
}

function renderTransitConnector(estimate) {
  if (!estimate || !estimate.visible) {
    return '<div class="transit-gap"><div class="stop-spine"><div class="stop-seg"></div></div><div class="transit-label"></div></div>';
  }
  return '<div class="transit-gap"><div class="stop-spine"><div class="stop-seg"></div></div>' +
    '<div class="transit-label">&#8595; ' + estimate.emoji + ' ' + escapeHtml(estimate.text) + '</div></div>';
}

];


function parseRawStops(rawText) {
  var text = rawText;
  var fj = text.match(/```json\s*([\s\S]*?)```/i);
  if (fj) text = fj[1].trim();
  else {
    var f = text.match(/```\s*([\s\S]*?)```/);
    if (f) text = f[1].trim();
    else {
      var fo = text.indexOf('{'), lo = text.lastIndexOf('}');
      if (fo !== -1 && lo > fo) text = text.slice(fo, lo + 1).trim();
    }
  }
  try {
    var parsed = JSON.parse(text);
    var stops = Array.isArray(parsed) ? parsed
      : Array.isArray(parsed.stops) ? parsed.stops
      : [];
    return stops.map(function(s) {
      return {
        name:         s.name        || '',
        time:         s.time        || '',
        desc:         s.activity    || '',
        locationText: s.name        || '',
        lat:          null,
        lng:          null,
        transport:    s.transport   || 'walk',
        type:         s.transport   || 'walk',
        price:        '',
        confidence:   typeof s.confidence === 'number' ? s.confidence : 0.8,
        warnings:     [],
        operatorHint: s.operatorHint || null,
        categoryHint: (s.categories && s.categories[0]) || null,
        source:       'ai'
      };
    });
  } catch (e) {
    console.warn('[Limey] parseRawStops failed:', e);
    return [];
  }
}

async function callEdgeFn(prompt) {
  var resp = await fetch(EDGE_FN_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ prompt: prompt })
  });
  var data = await resp.json().catch(function() { return {}; });
  if (!resp.ok) {
    var errType = (data && data.error) || 'unknown_error';
    var err = new Error(data.message || errType);
    err.type = errType;
    err.retryAfter = data.retryAfter || null;
    err.status = resp.status;
    throw err;
  }
  var stops = parseRawStops(data.rawText || '');
  return { stops: stops };
}

async function generateDraftStops(prompt) {
  aiPromptText = prompt || '';
  var lastErr = null;
  for (var attempt = 0; attempt <= AI_MAX_RETRY; attempt++) {
    try {
      var data = await callEdgeFn(prompt);
      if (!data || !Array.isArray(data.stops)) throw new Error('invalid_response');
      return data.stops;
    } catch (err) {
      lastErr = err;
      var t = err.type || '';
      var shouldRetry = (t === 'timeout' || t === 'provider_error') && attempt < AI_MAX_RETRY;
      if (shouldRetry) {
        await new Promise(function(r) { setTimeout(r, AI_RETRY_DELAY_MS); });
        continue;
      }
      throw err;
    }
  }
  throw lastErr;
}

async function handleGenerateDraft() {
  var prompt = document.getElementById('aiPromptInput').value.trim();
  if (!prompt) {
    showAiError('旅のイメージを入力してください。');
    return;
  }
  showAiError('');
  document.getElementById('aiGenerating').hidden = false;
  document.getElementById('aiGenerateBtn').disabled = true;
  try {
    draftStops = await generateDraftStops(prompt);
    renderDraftPreview();
    showScreen('draftPreview');
  } catch (err) {
    var t = err.type || '';
    var msg;
    if (t === 'rate_limited') {
      var wait = err.retryAfter ? '（' + err.retryAfter + '秒後に再試行できます）' : '';
      msg = 'リクエスト上限に達しました。しばらく待ってから試してください。' + wait;
    } else if (t === 'validation_error') {
      msg = '入力内容に問題があります: ' + (err.message || '');
    } else if (t === 'timeout') {
      msg = '生成がタイムアウトしました。混雑している可能性があります。';
    } else if (t === 'provider_error') {
      msg = 'AI APIでエラーが発生しました。しばらく待ってから試してください。';
    } else {
      msg = '生成に失敗しました。' + (err.message || '');
    }
    showAiError(msg + '\n手動で旅程を作成する場合は「New Trip」をご利用ください。');
  } finally {
    document.getElementById('aiGenerating').hidden = true;
    document.getElementById('aiGenerateBtn').disabled = false;
  }
}

function moveDraftStop(index, direction) {
  var target = index + direction;
  if (target < 0 || target >= draftStops.length) return;
  var tmp = draftStops[index];
  draftStops[index] = draftStops[target];
  draftStops[target] = tmp;
  renderDraftPreview();
}

function deleteDraftStop(index) {
  if (!window.confirm('このストップを削除しますか？')) return;
  draftStops.splice(index, 1);
  renderDraftPreview();
}

function validateDraftStops(drafts) {
  var errors = [];
  if (!drafts || !drafts.length) errors.push('少なくとも1つのストップが必要です。');
  for (var i = 0; i < (drafts || []).length; i++) {
    if (!drafts[i].name || !String(drafts[i].name).trim()) {
      errors.push('ストップ #' + (i + 1) + ' に名前がありません。');
    }
  }
  return errors;
}

function getDraftWarnings(drafts) {
  var warnings = [];
  if (!drafts || !drafts.length) return warnings;
  var lowConf = 0;
  var missingLoc = 0;
  for (var i = 0; i < drafts.length; i++) {
    if (drafts[i].confidence < 0.5) lowConf++;
    if (drafts[i].lat == null || drafts[i].lng == null) missingLoc++;
  }
  if (lowConf > 0) warnings.push(lowConf + ' 件のストップは信頼度が低いです（要修正）');
  if (missingLoc / drafts.length > 0.3) {
    warnings.push(Math.round(100 * missingLoc / drafts.length) + '% のストップに位置情報がありません');
  }
  return warnings;
}

function deriveTripTitleFromDraft(drafts, prompt) {
  if (drafts && drafts.length && drafts[0].name) {
    return drafts[0].name + 'の旅';
  }
  if (prompt && prompt.trim()) {
    var short = prompt.trim().slice(0, 24);
    return short + (prompt.length > 24 ? '…' : '');
  }
  return 'AI 旅程';
}

function draftStopsToRouteData(drafts, title) {
  var stops = drafts.map(function(d) {
    var transportType = d.type === 'unknown' ? 'walk' : d.type;
    return {
      name: d.name,
      time: d.time || '',
      memo: d.desc || '',
      lat: d.lat,
      lng: d.lng,
      transport: transportType,
      label: d.transport || '',
      fare: d.price || '',
      categories: d.categoryHint ? [d.categoryHint] : []
    };
  });
  var center = [26.39, 127.82];
  var zoom = 10;
  for (var i = 0; i < stops.length; i++) {
    if (stops[i].lat != null && stops[i].lng != null) {
      center = [stops[i].lat, stops[i].lng];
      break;
    }
  }
  return {
    schemaVersion: TripRepository.schemaVersion,
    title: title,
    trip: { title: title, subtitle: '', palette: 'tropical' },
    days: [{
      label: 'Day 1',
      cost: '',
      center: center,
      zoom: zoom,
      stops: stops
    }]
  };
}

async function saveDraftTrip() {
  syncDraftFromDom();
  var errors = validateDraftStops(draftStops);
  if (errors.length) {
    window.alert(errors.join('\n'));
    return;
  }
  var warnings = getDraftWarnings(draftStops);
  if (warnings.length) {
    if (!window.confirm(warnings.join('\n') + '\n\nこのまま保存しますか？')) return;
  }
  var title = deriveTripTitleFromDraft(draftStops, aiPromptText);
  try {
    var result = await TripRepository.createTrip(title);
    if (!result || !result.trip) throw new Error('Trip creation failed');
    await switchTrip(result.trip.id, TripRepository._emptyRouteData(title), title);
    mutateRoute(function(route) {
      var built = draftStopsToRouteData(draftStops, title);
      route.days = built.days;
      route.trip = built.trip;
      route.title = built.title;
      route.schemaVersion = built.schemaVersion;
    }, { render: true });
    draftStops = [];
    await refreshTripsList();
    setTimeout(function() { if (map) map.invalidateSize(); }, 50);
  } catch (err) {
    window.alert('保存に失敗しました: ' + (err.message || 'Unknown error'));
  }
}

function syncDraftFromDom() {
  var cards = document.querySelectorAll('#draftCardList .draft-card');
  cards.forEach(function(card) {
    var idx = parseInt(card.getAttribute('data-draft-idx'), 10);
    if (isNaN(idx) || !draftStops[idx]) return;
    card.querySelectorAll('[data-field]').forEach(function(el) {
      var field = el.getAttribute('data-field');
      if (field === 'time') draftStops[idx].time = el.value || null;
      else draftStops[idx][field] = el.value;
    });
  });
}

function isDirty() {
  if (!currentRoute) return false;
  return JSON.stringify(currentRoute) !== savedSnapshot;
}

function getRouteTitle(routeData) {
  if (!routeData) return '';
  return routeData.title || (routeData.trip && routeData.trip.title) || '';
}

function normalizeRouteData(routeData, title) {
  if (!routeData || routeData.days === undefined || routeData.days === null) {
    return JSON.parse(JSON.stringify(TripRepository._emptyRouteData(title)));
  }
  return JSON.parse(JSON.stringify(routeData));
}

function updateSaveStatus(state) {
  var el = document.getElementById('mapSaveStatus');
  if (!el) return;
  el.setAttribute('data-save-state', state);
  el.textContent = SAVE_STATUS_LABELS[state] || '';
}

function cancelAutoSave() {
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = null;
}

function notifyRouteChanged() {
  if (isSharedView || suppressAutosave || !currentTripId || !currentRoute) return;
  if (!isDirty()) return;
  updateSaveStatus('pending');
  scheduleAutoSave();
}

function scheduleAutoSave() {
  cancelAutoSave();
  saveDebounceTimer = setTimeout(function() {
    saveDebounceTimer = null;
    if (!currentTripId || !currentRoute || !isDirty()) return;
    persistTrip(currentTripId, currentRoute);
  }, AUTOSAVE_DEBOUNCE_MS);
}

async function flushPendingSave() {
  if (isSharedView) return true;
  cancelAutoSave();
  if (!currentTripId || !currentRoute || !isDirty()) return true;
  return persistTrip(currentTripId, currentRoute);
}

async function persistTrip(tripId, snapshot) {
  if (isSharedView) return true;
  // Update existing trip: TripRepository.saveTrip() creates new trips only;
  // version insert is the correct persist path without modifying TripRepository.
  if (saveInFlight) await saveInFlight;
  var tripIdAtStart = tripId;
  var savePromise = (async function() {
    updateSaveStatus('saving');
    try {
      await TripRepository._createTripVersion(tripIdAtStart, snapshot);
      if (tripIdAtStart === currentTripId) {
        savedSnapshot = JSON.stringify(snapshot);
        updateSaveStatus('saved');
      }
      return true;
    } catch (err) {
      console.error('[Limey] Auto-save failed:', err);
      if (tripIdAtStart === currentTripId) updateSaveStatus('error');
      return false;
    } finally {
      if (saveInFlight === savePromise) saveInFlight = null;
    }
  })();
  saveInFlight = savePromise;
  return savePromise;
}

/* ── Route data helpers (mutations sync currentRoute → DAYS) ── */
function getRouteDaysArray(route) {
  var raw = (route || currentRoute).days;
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  return Object.keys(raw).sort(function(a, b) {
    var na = parseInt(a, 10), nb = parseInt(b, 10);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return String(a).localeCompare(String(b));
  }).map(function(k) { return raw[k]; });
}

function writeRouteDays(daysArray) {
  if (Array.isArray(currentRoute.days)) {
    currentRoute.days = daysArray;
    return;
  }
  var obj = {};
  for (var i = 0; i < daysArray.length; i++) obj[String(i)] = daysArray[i];
  currentRoute.days = obj;
}

function syncDaysFromRoute() {
  DAYS = routeDataToDays(currentRoute);
}

function mutateRoute(mutator, options) {
  if (isSharedView || !currentRoute) return;
  mutator(currentRoute);
  if (!options || options.syncDays !== false) syncDaysFromRoute();
  if (options && options.render) render();
  notifyRouteChanged();
}

function saveStop(dayIndex, stopIndex, patch) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    var stop = days[dayIndex] && days[dayIndex].stops && days[dayIndex].stops[stopIndex];
    if (!stop) return;
    Object.assign(stop, patch);
    writeRouteDays(days);
  }, { render: true });
}

function moveStop(fromDay, fromIndex, toDay, toIndex) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    if (!days[fromDay] || !days[toDay]) return;
    var stop = days[fromDay].stops.splice(fromIndex, 1)[0];
    if (!stop) return;
    if (toIndex === undefined || toIndex === null) days[toDay].stops.push(stop);
    else days[toDay].stops.splice(toIndex, 0, stop);
    writeRouteDays(days);
  }, { render: true });
}

function delStop(dayIndex, stopIndex) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    if (!days[dayIndex]) return;
    days[dayIndex].stops.splice(stopIndex, 1);
    writeRouteDays(days);
  }, { render: true });
}

function addStop(dayIndex, stop, atIndex) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    if (!days[dayIndex]) return;
    if (!days[dayIndex].stops) days[dayIndex].stops = [];
    if (atIndex === undefined || atIndex === null) days[dayIndex].stops.push(stop);
    else days[dayIndex].stops.splice(atIndex, 0, stop);
    writeRouteDays(days);
  }, { render: true });
}

function editDayLabel(dayIndex, label) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    if (!days[dayIndex]) return;
    days[dayIndex].label = label;
    writeRouteDays(days);
  }, { render: true });
}

function editDayCost(dayIndex, cost) {
  if (isSharedView) return;
  mutateRoute(function() {
    var days = getRouteDaysArray();
    if (!days[dayIndex]) return;
    days[dayIndex].cost = cost;
    writeRouteDays(days);
  }, { render: true });
}

function editStopMemo(dayIndex, stopIndex, memo) {
  saveStop(dayIndex, stopIndex, { memo: memo });
}

function editStopTransport(dayIndex, stopIndex, transport, label) {
  var patch = { transport: transport };
  if (label !== undefined) patch.label = label;
  saveStop(dayIndex, stopIndex, patch);
}

function editStopCategories(dayIndex, stopIndex, categories) {
  saveStop(dayIndex, stopIndex, { categories: categories });
}

function routeDataToDays(routeData) {
  if (!routeData || !routeData.days) return JSON.parse(JSON.stringify(DEFAULT_DAYS));
  var raw = routeData.days;
  var daysArray = Array.isArray(raw)
    ? raw
    : Object.keys(raw).sort(function(a, b) {
        var na = parseInt(a, 10), nb = parseInt(b, 10);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return String(a).localeCompare(String(b));
      }).map(function(k) { return raw[k]; });

  if (!daysArray.length) {
    return [{ label:'Day 1', cost:'', center:[26.39,127.82], zoom:10, stops:[] }];
  }

  return daysArray.map(function(day, idx) {
    var stops = (day.stops || []).map(function(s) {
      var transportLabel = s.label || s.transport || '';
      if (typeof s.transport === 'string' && !s.label && s.transport.indexOf('_') === -1 && s.transport.length < 20) {
        transportLabel = s.transport;
      }
      return {
        name: s.name || '',
        time: s.time || '',
        desc: s.memo || s.desc || '',
        transport: transportLabel,
        transportMode: s.transport || '',
        type: transportToBadge(s.transport),
        price: s.fare || s.price || '',
        lat: s.lat,
        lng: s.lng
      };
    });
    return {
      label: day.label || ('Day ' + (idx + 1)),
      cost: day.cost || '',
      center: day.center || [26.39, 127.82],
      zoom: day.zoom || 10,
      stops: stops
    };
  });
}

function showScreen(name) {
  document.getElementById('tripsScreen').classList.toggle('active', name === 'trips');
  document.getElementById('mapScreen').classList.toggle('active', name === 'map');
  document.getElementById('sharedErrorScreen').classList.toggle('active', name === 'sharedError');
  document.getElementById('aiInputScreen').classList.toggle('active', name === 'aiInput');
  document.getElementById('draftPreviewScreen').classList.toggle('active', name === 'draftPreview');
  if (name === 'map') onMapScreenVisible();
}

function getSharedTripIdFromUrl() {
  var params = new URLSearchParams(window.location.search);
  var tripId = params.get('trip');
  return tripId && String(tripId).trim() ? String(tripId).trim() : null;
}

function buildShareUrl(tripId) {
  return window.location.origin + window.location.pathname + '?trip=' + encodeURIComponent(tripId);
}

function setSharedViewMode(on) {
  isSharedView = !!on;
  document.body.classList.toggle('shared-view', isSharedView);
  var banner = document.getElementById('sharedReadonlyBanner');
  if (banner) banner.hidden = !isSharedView;
  if (!isSharedView) suppressAutosave = false;
}

function showSharedLoading() {
  document.getElementById('sharedLoading').hidden = false;
  document.getElementById('sharedErrorPanel').hidden = true;
  showScreen('sharedError');
}

function showSharedError(kind) {
  document.getElementById('sharedLoading').hidden = true;
  document.getElementById('sharedErrorPanel').hidden = false;
  var titleEl = document.getElementById('sharedErrorTitle');
  var subEl = document.getElementById('sharedErrorSub');
  var retryBtn = document.getElementById('sharedRetryBtn');
  if (kind === 'fetch-failed') {
    titleEl.textContent = 'Unable to load trip';
    subEl.textContent = 'Check your connection and try again.';
    retryBtn.hidden = false;
  } else {
    titleEl.textContent = 'Trip not found';
    subEl.textContent = 'This link may be invalid or the trip was deleted.';
    retryBtn.hidden = true;
  }
  showScreen('sharedError');
}

function loadSharedTrip(tripId, routeData) {
  stopReplay();
  cancelAutoSave();
  suppressAutosave = true;
  clearRouteLayers();
  currentTripId = tripId;
  currentRoute = normalizeRouteData(routeData, null);
  currentTripTitle = getRouteTitle(currentRoute) || 'Shared Trip';
  currentDay = 0;
  currentStop = -1;
  savedSnapshot = JSON.stringify(currentRoute);
  DAYS = routeDataToDays(currentRoute);
  document.getElementById('mapEyebrow').textContent = stripLeadingEmoji(currentTripTitle);
  showScreen('map');
  ensureMap();
  render();
  setTimeout(function() { if (map) map.invalidateSize(); }, 50);
}

async function enterSharedView(tripId) {
  sharedTripId = tripId;
  setSharedViewMode(true);
  suppressAutosave = true;
  cancelAutoSave();
  showSharedLoading();
  try {
    var routeData = await TripRepository.loadTrip(tripId);
    if (!routeData) {
      showSharedError('not-found');
      return;
    }
    loadSharedTrip(tripId, routeData);
  } catch (err) {
    console.error('[Limey] Shared trip load failed:', err);
    showSharedError('fetch-failed');
  }
}

function retrySharedTrip() {
  if (sharedTripId) enterSharedView(sharedTripId);
}

function exitSharedView() {
  stopReplay();
  clearRouteLayers();
  cancelAutoSave();
  currentTripId = null;
  currentRoute = null;
  savedSnapshot = '';
  sharedTripId = null;
  setSharedViewMode(false);
  var url = new URL(window.location.href);
  url.searchParams.delete('trip');
  window.history.replaceState({}, '', url.pathname + (url.search || ''));
  showScreen('trips');
  refreshTripsList();
}

function showShareToast(message) {
  var toast = document.getElementById('shareToast');
  if (!toast) return;
  toast.textContent = message;
  toast.hidden = false;
  toast.classList.add('visible');
  clearTimeout(showShareToast._timer);
  showShareToast._timer = setTimeout(function() {
    toast.classList.remove('visible');
    toast.hidden = true;
  }, 2600);
}

async function handleShareTrip() {
  if (!currentTripId || isSharedView) return;
  var url = buildShareUrl(currentTripId);
  var title = currentTripTitle || 'Limey Trip';
  if (isMobileLayout() && navigator.share) {
    try {
      await navigator.share({ title: title, text: title, url: url });
      showShareToast('共有しました');
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }
  var copied = false;
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
      copied = true;
    }
  } catch (err) { /* fallback below */ }
  if (!copied) {
    try {
      var ta = document.createElement('textarea');
      ta.value = url;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      copied = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (err2) { /* ignore */ }
  }
  var btn = document.getElementById('shareBtn');
  if (copied) {
    showShareToast('リンクをコピーしました');
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = 'Share';
        btn.classList.remove('copied');
      }, 2000);
    }
  }
}

function setTripsLoading(loading) {
  var skeleton = document.getElementById('tripsLoading');
  skeleton.hidden = !loading;
  skeleton.style.display = loading ? '' : 'none';
  if (loading) {
    document.getElementById('tripsList').hidden = true;
    document.getElementById('tripsEmpty').hidden = true;
    document.getElementById('tripsError').hidden = true;
  }
}

function withTimeout(promise, ms, label) {
  return new Promise(function(resolve, reject) {
    var settled = false;
    var timer = setTimeout(function() {
      if (settled) return;
      settled = true;
      reject(new Error((label || 'Operation') + ' timed out after ' + ms + 'ms'));
    }, ms);
    Promise.resolve(promise).then(function(value) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      resolve(value);
    }, function(err) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(err);
    });
  });
}

function fallbackEnrichedTrip(trip) {
  return {
    id: trip.id,
    title: trip.title,
    updated_at: trip.updated_at || trip.created_at,
    stopCount: 0,
    emoji: extractEmoji(trip.title, null)
  };
}

async function enrichTrip(trip) {
  var routeData = null;
  try {
    routeData = await withTimeout(
      TripRepository.loadTrip(trip.id),
      TRIP_ENRICH_TIMEOUT_MS,
      'loadTrip'
    );
  } catch (err) {
    console.warn('[Limey] enrichTrip failed for trip', trip.id, err);
  }
  return {
    id: trip.id,
    title: trip.title,
    updated_at: trip.updated_at || trip.created_at,
    stopCount: countStops(routeData),
    emoji: extractEmoji(trip.title, routeData)
  };
}

function renderTripCard(trip) {
  var card = document.createElement('article');
  card.className = 'trip-card';
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('data-trip-id', trip.id);
  card.innerHTML =
    '<div class="trip-card-emoji" aria-hidden="true">' + escapeHtml(trip.emoji) + '</div>' +
    '<div class="trip-card-body">' +
      '<div class="trip-card-title">' + escapeHtml(stripLeadingEmoji(trip.title)) + '</div>' +
      '<div class="trip-card-meta">' +
        '<span>' + trip.stopCount + ' stop' + (trip.stopCount === 1 ? '' : 's') + '</span>' +
        '<span>Updated ' + escapeHtml(formatRelativeDate(trip.updated_at)) + '</span>' +
        '<span class="trip-card-sync" data-sync-state="idle"></span>' +
      '</div>' +
    '</div>' +
    '<button class="trip-card-delete" type="button" aria-label="Delete trip" title="Delete trip">&#128465;</button>';

  card.addEventListener('click', function() { openTrip(trip.id, trip.title); });
  card.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTrip(trip.id, trip.title); }
  });
  card.querySelector('.trip-card-delete').addEventListener('click', function(e) {
    e.stopPropagation();
    handleDeleteTrip(trip.id);
  });
  return card;
}

function renderTripsList(enriched) {
  var listEl = document.getElementById('tripsList');
  listEl.innerHTML = '';
  if (!enriched.length) {
    listEl.hidden = true;
    document.getElementById('tripsEmpty').hidden = false;
    return;
  }
  document.getElementById('tripsEmpty').hidden = true;
  listEl.hidden = false;
  enriched.forEach(function(trip) { listEl.appendChild(renderTripCard(trip)); });
}

async function refreshTripsList() {
  setTripsLoading(true);
  document.getElementById('tripsError').hidden = true;
  try {
    var trips = await TripRepository.listTrips();
    setTripsLoading(false);
    renderTripsList(trips.map(fallbackEnrichedTrip));
    var enriched = await Promise.all(trips.map(function(trip) {
      return enrichTrip(trip).catch(function(err) {
        console.warn('[Limey] enrichTrip rejected:', trip.id, err);
        return fallbackEnrichedTrip(trip);
      });
    }));
    renderTripsList(enriched);
  } catch (err) {
    console.error('[Limey] refreshTripsList failed:', err);
    document.getElementById('tripsList').hidden = true;
    document.getElementById('tripsEmpty').hidden = true;
    var errEl = document.getElementById('tripsError');
    errEl.textContent = 'Could not load trips. ' + (err.message || 'Please try again.');
    errEl.hidden = false;
  } finally {
    setTripsLoading(false);
  }
}

async function handleNewTrip() {
  var title = window.prompt('Trip title');
  if (title === null) return;
  title = title.trim() || 'Untitled Trip';
  try {
    var result = await TripRepository.createTrip(title);
    await refreshTripsList();
    if (result && result.trip) openTrip(result.trip.id, result.trip.title);
  } catch (err) {
    window.alert('Could not create trip: ' + (err.message || 'Unknown error'));
  }
}

async function handleDeleteTrip(tripId) {
  if (!window.confirm('Delete this trip?')) return;
  cancelAutoSave();
  try {
    await TripRepository.deleteTrip(tripId);
    if (currentTripId === tripId) {
      stopReplay();
      clearRouteLayers();
      currentTripId = null;
      currentRoute = null;
      savedSnapshot = '';
      showScreen('trips');
    }
    await refreshTripsList();
  } catch (err) {
    window.alert('Could not delete trip: ' + (err.message || 'Unknown error'));
  }
}

async function goToTrips() {
  stopReplay();
  await flushPendingSave();
  if (isDirty() && !window.confirm('You have unsaved changes. Leave without saving?')) return;
  cancelAutoSave();
  clearRouteLayers();
  currentTripId = null;
  currentRoute = null;
  savedSnapshot = '';
  showScreen('trips');
  refreshTripsList();
}

async function openTrip(tripId, tripTitle) {
  try {
    setSharedViewMode(false);
    var routeData = await TripRepository.loadTrip(tripId);
    if (!await switchTrip(tripId, routeData, tripTitle)) return;
    setTimeout(function() { if (map) map.invalidateSize(); }, 50);
  } catch (err) {
    window.alert('Could not load trip: ' + (err.message || 'Unknown error'));
  }
}

async function switchTrip(tripId, routeData, tripTitle) {
  stopReplay();
  await flushPendingSave();
  if (isDirty() && !window.confirm('You have unsaved changes. Continue without saving?')) return false;

  cancelAutoSave();
  suppressAutosave = true;
  clearRouteLayers();

  currentTripId = tripId;
  currentRoute = normalizeRouteData(routeData, tripTitle);
  currentTripTitle = tripTitle || getRouteTitle(currentRoute) || 'Trip';

  currentDay = 0;
  currentStop = -1;

  savedSnapshot = JSON.stringify(currentRoute);
  DAYS = routeDataToDays(currentRoute);
  document.getElementById('mapEyebrow').textContent = stripLeadingEmoji(currentTripTitle);

  showScreen('map');
  ensureMap();
  render();

  suppressAutosave = false;
  updateSaveStatus('saved');
  return true;
}

function initApp() {
  var tripId = getSharedTripIdFromUrl();
  if (tripId) {
    enterSharedView(tripId);
    return;
  }
  setSharedViewMode(false);
  showScreen('trips');
  refreshTripsList();
}

/* ── Map / replay engine ── */
var PEACOCK='#007A8A',LIME='#C5E84A';
var map=null, mapReady=false, routeLayer=null;
var currentDay=0,currentStop=-1,playing=false,playTimer=null;
var mapMarkers=[];

function stopReplay() {
  clearInterval(playTimer);
  playTimer = null;
  playing = false;
  currentStop = -1;
  var btn = document.getElementById('playBtn');
  if (btn) {
    btn.innerHTML = '&#9654; Play';
    btn.classList.remove('playing');
  }
}

function clearRouteLayers() {
  if (map) map.closePopup();
  if (routeLayer) routeLayer.clearLayers();
  mapMarkers = [];
}

function render() {
  renderDayTabs();
  renderTimeline();
  renderMap();
}

function ensureMap() {
  if (mapReady) return;
  map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:19,opacity:.85}).addTo(map);
  routeLayer = L.layerGroup().addTo(map);
  mapReady=true;
  updateMapChromeForSheet();
}

function renderDayTabs() {
  var tabs = document.getElementById('dayTabs');
  var html = '';
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var sub = escapeHtml(d.label || ('Day ' + (i + 1)));
    html += '<button class="day-tab' + (i === currentDay ? ' active' : '') + '" onclick="switchDay(' + i + ')">Day ' + (i + 1) +
      '<br><span style="font-size:9px;font-weight:400;letter-spacing:.01em;text-transform:none">' + sub + '</span></button>';
  }
  tabs.innerHTML = html;
  var hint = document.getElementById('daySwipeHint');
  if (hint) hint.hidden = !(isMobileLayout() && DAYS.length > 1);
}

function makeIcon(s,active){
  if(active){return L.divIcon({className:'',html:'<div style="width:34px;height:34px;background:'+LIME+';border:2.5px solid #222;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(197,232,74,.3),0 3px 10px rgba(0,0,0,.3)"><div style="width:10px;height:10px;background:#222;border-radius:50%"></div></div>',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-17]});}
  return L.divIcon({className:'',html:'<div style="width:22px;height:22px;background:#fff;border:2.5px solid '+PEACOCK+';border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)"><div style="width:7px;height:7px;background:'+PEACOCK+';border-radius:50%"></div></div>',iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-11]});

function renderTimeline(){
  var d=DAYS[currentDay];
  if (!d) {
    document.getElementById('timeline').innerHTML = '<div style="padding:16px;text-align:center;color:var(--secondary);font-size:12px">No stops in this day</div>';
    document.getElementById('costBar').innerHTML = '';
    return;
  }
  var html='';
  for(var i=0;i<d.stops.length;i++){
    var s=d.stops[i];
    var isActive=i===currentStop;
    var hasT=s.transport&&s.transport!=='到着';
    var tHtml='';
    if(hasT){tHtml='<div class="transport-row"><span class="badge b-'+s.type+'">'+escapeHtml(s.transport)+'</span>'+(s.price?'<span class="price-tag">'+escapeHtml(s.price)+'</span>':'')+'</div>';}
    html+='<div class="stop-row'+(isActive?' active':'')+'" onclick="jumpTo('+i+')" id="sr'+i+'">';
    html+='<div class="stop-spine"><div class="stop-dot"></div></div>';
    html+='<div style="flex:1"><div class="stop-card"><div class="stop-time">'+escapeHtml(s.time)+'</div><div class="stop-name">'+escapeHtml(s.name)+'</div><div class="stop-desc">'+escapeHtml(s.desc)+'</div>'+tHtml+'</div></div></div>';
    if (i < d.stops.length - 1) {
      html += renderTransitConnector(getTransitEstimate(s, d.stops[i + 1]));
    }
  }
  document.getElementById('timeline').innerHTML=html;
  document.getElementById('costBar').innerHTML='<span class="cost-label">交通費メモ</span><span class="cost-num">'+escapeHtml(d.cost)+'</span>';
}

function renderMap(){
  if (!map || !routeLayer) return;
  routeLayer.clearLayers();
  mapMarkers=[];
  var d=DAYS[currentDay];
  if (!d) return;
  var ll=[];
  for(var i=0;i<d.stops.length;i++)if(d.stops[i].lat)ll.push([d.stops[i].lat,d.stops[i].lng]);
  if(ll.length>1)routeLayer.addLayer(L.polyline(ll,{color:PEACOCK,weight:2.5,opacity:.6,dashArray:'8 5'}));
  for(var i=0;i<d.stops.length;i++){
    (function(idx){
      var s=d.stops[idx];
      if(!s.lat)return;
      var m=L.marker([s.lat,s.lng],{icon:makeIcon(s,idx===currentStop)});
      var hasT=s.transport&&s.transport!=='到着';
      var tHtml=hasT?'<div style="margin-top:5px"><span style="font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:rgba(0,122,138,.1);color:'+PEACOCK+';border:1px solid rgba(0,122,138,.3)">'+escapeHtml(s.transport)+'</span>'+(s.price?'<span style="font-size:10px;font-weight:700;color:#222;margin-left:4px">'+escapeHtml(s.price)+'</span>':'')+'</div>':'';
      m.bindPopup('<div style="font-family:Space Grotesk,sans-serif;min-width:155px"><div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:'+PEACOCK+';margin-bottom:2px">'+escapeHtml(s.time)+'</div><div style="font-family:DM Sans,sans-serif;font-weight:700;font-size:13px;color:#222;margin-bottom:3px;line-height:1.3">'+escapeHtml(s.name)+'</div><div style="font-size:11px;color:#777;line-height:1.5">'+escapeHtml(s.desc)+'</div>'+tHtml+'</div>');
      m.on('click',function(){jumpTo(idx);});
      routeLayer.addLayer(m);
      mapMarkers.push(m);
    })(i);
  }
  map.setView(d.center,d.zoom,{animate:true});
}

function jumpTo(i){
  currentStop=i;
  var d=DAYS[currentDay];
  if (!d || !d.stops[i] || !d.stops[i].lat) return;
  for(var j=0;j<mapMarkers.length;j++)mapMarkers[j].setIcon(makeIcon(d.stops[j],j===i));
  map.flyTo([d.stops[i].lat,d.stops[i].lng],13,{duration:.7});
  mapMarkers[i].openPopup();
  renderTimeline();
  var el=document.getElementById('sr'+i);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchDay(i){
  stopReplay();
  currentDay=i;
  document.querySelectorAll('.day-tab').forEach(function(t,j){t.classList.toggle('active',j===i);});
  renderTimeline();
  renderMap();
}

function togglePlay(){
  if(playing){
    clearInterval(playTimer);playing=false;
    document.getElementById('playBtn').innerHTML='&#9654; Play';
    document.getElementById('playBtn').classList.remove('playing');
  } else {
    playing=true;
    document.getElementById('playBtn').innerHTML='&#9632; Stop';
    document.getElementById('playBtn').classList.add('playing');
    var max=DAYS[currentDay].stops.length;
    if(currentStop>=max-1)currentStop=-1;
    playTimer=setInterval(function(){
      currentStop++;
      if(currentStop>=max){clearInterval(playTimer);playing=false;document.getElementById('playBtn').innerHTML='&#9654; Play';document.getElementById('playBtn').classList.remove('playing');return;}
      jumpTo(currentStop);
    },2200);
  }
}

function resetAnim(){
  stopReplay();
  renderTimeline();
  renderMap();
}

/* ── Mobile UX (Pre-Okinawa review) ── */
var MOBILE_MAX_WIDTH = 767;
var SHEET_STATES = ['peek', 'half', 'full'];
var sheetState = 'half';
var sheetDrag = { active: false, startY: 0, startH: 0, moved: false };
var daySwipe = { active: false, x0: 0, y0: 0, locked: null };

function isMobileLayout() {
  return window.matchMedia('(max-width: ' + MOBILE_MAX_WIDTH + 'px)').matches;
}

function getSheetHeightTargets() {
  var vh = window.innerHeight;
  return {
    peek: 120,
    half: Math.round(vh * 0.54),
    full: Math.round(Math.min(vh * 0.88, vh - 48))
  };
}

function setSheetState(state) {
  if (SHEET_STATES.indexOf(state) === -1) state = 'half';
  sheetState = state;
  var sheet = document.getElementById('routeSheet');
  if (sheet) {
    sheet.setAttribute('data-sheet', state);
    sheet.style.height = '';
  }
  updateMapChromeForSheet();
  if (map && mapReady) {
    setTimeout(function() { map.invalidateSize(); }, 240);
  }
}

function updateMapChromeForSheet() {
  var zoom = document.querySelector('#mapScreen .leaflet-bottom.leaflet-right');
  if (!zoom) return;
  if (!isMobileLayout()) {
    zoom.style.bottom = '';
    return;
  }
  var sheet = document.getElementById('routeSheet');
  var h = sheet ? sheet.getBoundingClientRect().height : 0;
  zoom.style.bottom = Math.max(12, h + 8) + 'px';
}

function onMapScreenVisible() {
  if (!isMobileLayout()) {
    setSheetState('half');
    return;
  }
  setSheetState(sheetState || 'half');
  updateMapChromeForSheet();
  if (map && mapReady) setTimeout(function() { map.invalidateSize(); }, 80);
}

function initRouteSheet() {
  var sheet = document.getElementById('routeSheet');
  var handle = document.getElementById('sheetHandle');
  if (!sheet || !handle || handle._sheetInit) return;
  handle._sheetInit = true;

  function snapSheetFromHeight(h) {
    var targets = getSheetHeightTargets();
    var best = 'half';
    var bestDist = Infinity;
    SHEET_STATES.forEach(function(state) {
      var dist = Math.abs(h - targets[state]);
      if (dist < bestDist) {
        bestDist = dist;
        best = state;
      }
    });
    setSheetState(best);
  }

  handle.addEventListener('pointerdown', function(e) {
    if (!isMobileLayout()) return;
    sheetDrag.active = true;
    sheetDrag.moved = false;
    sheetDrag.startY = e.clientY;
    sheetDrag.startH = sheet.getBoundingClientRect().height;
    sheet.classList.add('sheet-dragging');
    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener('pointermove', function(e) {
    if (!sheetDrag.active || !isMobileLayout()) return;
    var dy = sheetDrag.startY - e.clientY;
    if (Math.abs(dy) > 6) sheetDrag.moved = true;
    var targets = getSheetHeightTargets();
    var newH = Math.max(targets.peek, Math.min(targets.full, sheetDrag.startH + dy));
    sheet.style.height = newH + 'px';
    updateMapChromeForSheet();
  });

  function endSheetDrag(e) {
    if (!sheetDrag.active) return;
    sheetDrag.active = false;
    sheet.classList.remove('sheet-dragging');
    try { handle.releasePointerCapture(e.pointerId); } catch (err) { /* ignore */ }
    if (!sheetDrag.moved && isMobileLayout()) {
      var idx = SHEET_STATES.indexOf(sheetState);
      setSheetState(SHEET_STATES[(idx + 1) % SHEET_STATES.length]);
      return;
    }
    snapSheetFromHeight(sheet.getBoundingClientRect().height);
  }

  handle.addEventListener('pointerup', endSheetDrag);
  handle.addEventListener('pointercancel', endSheetDrag);

  window.addEventListener('resize', function() {
    if (!isMobileLayout()) {
      sheet.style.height = '';
      updateMapChromeForSheet();
      return;
    }
    updateMapChromeForSheet();
  });
}

function initDaySwipe() {
  var el = document.getElementById('timeline');
  if (!el || el._daySwipeInit) return;
  el._daySwipeInit = true;

  el.addEventListener('touchstart', function(e) {
    if (!isMobileLayout() || e.touches.length !== 1 || sheetState === 'peek') return;
    daySwipe.active = true;
    daySwipe.x0 = e.touches[0].clientX;
    daySwipe.y0 = e.touches[0].clientY;
    daySwipe.locked = null;
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    if (!daySwipe.active || !isMobileLayout() || e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - daySwipe.x0;
    var dy = e.touches[0].clientY - daySwipe.y0;
    if (!daySwipe.locked) {
      if (Math.abs(dy) > 14 && Math.abs(dy) > Math.abs(dx)) {
        daySwipe.locked = 'vertical';
        return;
      }
      if (Math.abs(dx) > 14 && Math.abs(dx) > Math.abs(dy) * 1.4) {
        daySwipe.locked = 'horizontal';
        el.classList.add('day-swipe-lock');
      }
    }
    if (daySwipe.locked === 'horizontal') e.preventDefault();
  }, { passive: false });

  function endDaySwipe(e) {
    if (!daySwipe.active) return;
    el.classList.remove('day-swipe-lock');
    if (daySwipe.locked !== 'horizontal' || !e.changedTouches || !e.changedTouches.length) {
      daySwipe.active = false;
      daySwipe.locked = null;
      return;
    }
    var dx = e.changedTouches[0].clientX - daySwipe.x0;
    daySwipe.active = false;
    daySwipe.locked = null;
    if (Math.abs(dx) < 56 || DAYS.length < 2) return;
    if (dx < 0 && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
    else if (dx > 0 && currentDay > 0) switchDay(currentDay - 1);
  }

  el.addEventListener('touchend', endDaySwipe, { passive: true });
  el.addEventListener('touchcancel', endDaySwipe, { passive: true });
}

initRouteSheet();
initDaySwipe();

initApp();
</script>
