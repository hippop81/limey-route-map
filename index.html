function scrollToCard(i) { var el=document.getElementById('sr'+i); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }

/* ─── Time engine: segment table ─── */
function buildSegmentTable() {
  segmentTable = [];
  var stops = DAYS[currentDay].stops;
  if (stops.length < 2) { te.totalDuration = 1; return; }
  var segs = [];
  for (var i = 0; i < stops.length - 1; i++) {
    var from = stops[i], to = stops[i+1];
    /* skip null-coord stops (AI draft stops) */
    if (from.lat == null || from.lng == null || to.lat == null || to.lng == null) continue;
    var c = tcfg(from.transport);
    var f = [from.lat, from.lng], t_ = [to.lat, to.lng];
    var dl = t_[0]-f[0], dn = t_[1]-f[1], dist = Math.sqrt(dl*dl+dn*dn);
    var travelMs = Math.max(700, Math.min(2800, dist * 4400)) / c.speedMult;
    var cats = Array.isArray(to.categories) ? to.categories : [];
    var pauseMs = cats.reduce(function(mx,k){ var cfg=CATEGORIES[k]; return cfg?Math.max(mx,cfg.pauseMs):mx; }, c.pauseMs);
    if (i === stops.length - 2) pauseMs = 0;
    var geom = segmentGeometries[i];
    var provenance = geom ? geom.provenance : null;
    var confidence = provenance || (segShapes[i] ? 'gtfs' : (c.curve ? 'inferred' : 'fallback'));
    var curveBias = (confidence === 'inferred' && c.curve) ? c.curve : null;
    segs.push({ i:i, travelMs:travelMs, pauseMs:pauseMs, confidence:confidence, curveBias:curveBias, fromPt:f, toPt:t_, transport:from.transport, easing:c.easing });
  }
  var initialPauseMs = tcfg(stops[0].transport).pauseMs;
  var total = initialPauseMs;
  for (var i = 0; i < segs.length; i++) total += segs[i].travelMs + segs[i].pauseMs;
  te.totalDuration = Math.max(1, total);
  var elapsed = initialPauseMs;
  for (var i = 0; i < segs.length; i++) {
    var s = segs[i];
    var startT = elapsed / te.totalDuration;
    elapsed += s.travelMs;
    var endT = elapsed / te.totalDuration;
    elapsed += s.pauseMs;
    segmentTable.push({ index:s.i, startT:startT, endT:endT, pauseEndT:elapsed/te.totalDuration,
      transport:s.transport, confidence:s.confidence, curveBias:s.curveBias,
      fromPt:s.fromPt, toPt:s.toPt, easing:s.easing });
  }
}

/* Binary search: find segment entry covering nT */
function _segAtTime(nT) {
  if (!segmentTable.length) return null;
  var lo = 0, hi = segmentTable.length - 1;
  while (lo <= hi) {
    var mid = (lo + hi) >> 1;
    var s = segmentTable[mid];
    if (nT < s.startT) hi = mid - 1;
    else if (nT > s.pauseEndT) lo = mid + 1;
    else return s;
  }
  return nT <= segmentTable[0].startT ? segmentTable[0] : segmentTable[segmentTable.length-1];
}

/* Geometry resolver: gtfs → bezier → lerp */
function getPositionAtTime(nT) {
  if (!segmentTable.length) return null;
  var seg = _segAtTime(nT);
  if (!seg) return null;
  if (nT <= seg.startT) return seg.fromPt;
  if (nT >= seg.endT)   return seg.toPt;
  var lt = (nT - seg.startT) / (seg.endT - seg.startT);
  var te_ = ease(lt, seg.easing);
  /* Any segment with a cached shape (gtfs OR prox-db) → arc-length interpolation */
  var pts = segShapes[seg.index];
  if (pts) return polylineInterp(pts, te_);
  /* Inferred (plane/ferry) → bezier arc */
  if (seg.confidence === 'inferred') {
    var ctrl_ = ctrlPt(seg.fromPt, seg.toPt, seg.curveBias);
    return bezierPt(seg.fromPt, ctrl_, seg.toPt, te_);
  }
  /* Fallback → linear */
  return [seg.fromPt[0]+(seg.toPt[0]-seg.fromPt[0])*te_, seg.fromPt[1]+(seg.toPt[1]-seg.fromPt[1])*te_];
}

/* Seek to normalised position (works playing or paused) */
function _seekTo(nT) {
  nT = Math.max(0, Math.min(1, nT));
  te.normalizedTime = nT;
  te.baseTime = nT;
  te.baseRealTime = performance.now();
  var seg = _segAtTime(nT);
  var newStop = !seg || nT <= 0 ? 0 : nT >= seg.endT ? seg.index+1 : seg.index;
  currentStop = newStop;
  te.lastStopIdx = newStop;
  te.lastSegIdx  = -1;
  var pos = getPositionAtTime(nT);
  var transport = seg ? seg.transport : ((DAYS[currentDay].stops[0]||{}).transport);
  /* Sync te.current* so _cameraOnSeek() reads fresh values (Codex seek sync) */
  te.currentPos       = pos;
  te.currentTransport = transport;
  te.currentSeg       = seg;
  te.currentSegIdx    = seg ? seg.index : -1;
  if (pos) moveCurrentPin(pos[0], pos[1], transport); else removeCurrentPin();
  updateAllProgress(); renderMapMarkers(); renderTimeline(); updatePeekInfo(); updateSeekBar();
  /* Signal camera state machine to re-evaluate at new position (Codex) */
  cam.isSeeking = true;
  _cameraOnSeek();
  if (playing) {
    if (te.raf) { cancelAnimationFrame(te.raf); te.raf = null; }
    te.raf = requestAnimationFrame(_calcLoop);
  }
}

/* ─── Calc loop: position & state — runs every RAF frame ─── */
function _calcLoop(ts) {
  if (!playing) return;
  te.normalizedTime = Math.min(1, te.baseTime + (ts - te.baseRealTime) * playbackSpeed / te.totalDuration);
  var nT = te.normalizedTime;
  var seg = _segAtTime(nT);
  var segIdx = seg ? seg.index : -1;

  /* Current stop index */
  var newStopIdx = (!seg || nT < seg.startT) ? 0 : nT >= seg.endT ? seg.index+1 : seg.index;

  /* Stop arrival event */
  if (newStopIdx > te.lastStopIdx) {
    te.lastStopIdx = newStopIdx;
    currentStop = newStopIdx;
    renderMapMarkers(); renderTimeline(); scrollToCard(currentStop);
    if (mapMarkers[currentStop]) mapMarkers[currentStop].openPopup();
    var _arr = DAYS[currentDay].stops[currentStop];
    map.panTo([_arr.lat, _arr.lng], {animate:true, duration:0.4});
    if (Array.isArray(_arr.categories) && _arr.categories.length) showCategoryArrivalPulse(_arr.lat, _arr.lng);
    updatePeekInfo();
  } else {
    currentStop = newStopIdx;
  }

  /* Compute & cache position for render tick */
  te.currentPos       = getPositionAtTime(nT);
  te.currentTransport = seg ? seg.transport : ((DAYS[currentDay].stops[0]||{}).transport);
  te.currentSegIdx    = segIdx;
  te.currentSeg       = seg;

  if (nT >= 1) { finishPlay(); return; }
  te.raf = requestAnimationFrame(_calcLoop);
}

/* ─── Render tick: Leaflet DOM updates — throttled to 50ms ─── */
function _renderTick() {
  if (!playing) return;
  var pos = te.currentPos, transport = te.currentTransport;
  var seg = te.currentSeg, segIdx = te.currentSegIdx;
  var nT  = te.normalizedTime;

  if (pos) moveCurrentPin(pos[0], pos[1], transport);

  /* Progress line for active travelling segment */
  if (seg && segIdx >= 0 && nT >= segmentTable[segIdx].startT && nT < segmentTable[segIdx].endT) {
    var _lt = (nT - segmentTable[segIdx].startT) / (segmentTable[segIdx].endT - segmentTable[segIdx].startT);
    segProgressLines[segIdx].setLatLngs(partialSegPts(segIdx, ease(_lt, seg.easing)));
  }

  updateSeekBar();
  _cameraUpdate();
}

/* ─── Playback ─── */
function startPlay() {
  var stops = DAYS[currentDay].stops;
  if (!segmentTable.length || stops.length < 2) return;
  if (te.normalizedTime >= 1) {
    te.normalizedTime = 0; te.baseTime = 0; currentStop = -1;
    te.lastStopIdx = -1; te.lastSegIdx = -1;
    removeCurrentPin(); renderMapMarkers(); renderTimeline(); updateAllProgress();
  }
  if (te.normalizedTime <= 0 || currentStop < 0) {
    te.normalizedTime = 0; te.baseTime = 0;
    currentStop = 0; te.lastStopIdx = 0; te.lastSegIdx = -1;
    renderMapMarkers(); renderTimeline(); updateAllProgress();
    var s0 = stops[0];
    moveCurrentPin(s0.lat, s0.lng, s0.transport);
    map.flyTo([s0.lat, s0.lng], 13, {duration: 0.5});
    if (mapMarkers[0]) mapMarkers[0].openPopup();
    scrollToCard(0);
  } else {
    te.lastSegIdx = -1;
  }
  te.baseTime = te.normalizedTime;
  te.baseRealTime = performance.now();
  cam.segIdx = -1; cam.arrivalLock = false; cam.isSeeking = false;
  cam.dirHistory = []; cam.lastFollowPos = null;
  if (_renderTimer) { clearInterval(_renderTimer); _renderTimer = null; }
  _renderTimer = setInterval(_renderTick, 50);
  te.raf = requestAnimationFrame(_calcLoop);
}
/* ─── Camera State Machine helpers ─── */
function _camZoom(rhythm, phase) {
  var r = CAMERA_CONFIG.zoom[rhythm] || CAMERA_CONFIG.zoom.road;
  return r[phase] || 13;
}
function _segLenKm(seg) {
  return haversineKm(seg.fromPt[0], seg.fromPt[1], seg.toPt[0], seg.toPt[1]);
}
function _camDeparture(seg, rhythm) {
  var segLenM = _segLenKm(seg) * 1000;
  var offset  = Math.min(CAMERA_CONFIG.DEPARTURE.offsetMeters, segLenM * 0.3); // short segment (Codex)
  if (rhythm === 'air' || rhythm === 'sea') {
    var shp    = segShapes[seg.index] || null;
    var bounds = L.latLngBounds([seg.fromPt, seg.toPt]);
    if (shp) shp.forEach(function(p) { bounds.extend(p); });
    var pad = rhythm === 'air' ? 0.45 : 0.35;
    var mz  = rhythm === 'air' ? 8    : 9;
    map.fitBounds(bounds.pad(pad), { maxZoom: mz, animate: true, duration: 1.2 });
    return;
  }
  var zoom  = _camZoom(rhythm, 'depart');
  var dLat  = seg.toPt[0] - seg.fromPt[0], dLng = seg.toPt[1] - seg.fromPt[1];
  var norm  = Math.sqrt(dLat*dLat + dLng*dLng) || 1;
  var offDeg = offset / 111320;
  var center = [seg.fromPt[0] + (dLat/norm)*offDeg, seg.fromPt[1] + (dLng/norm)*offDeg];
  map.flyTo(center, zoom, { animate: true, duration: CAMERA_CONFIG.fly.depart });
}
function _camArrival(seg, rhythm) {
  var segLenM = _segLenKm(seg) * 1000;
  Math.min(CAMERA_CONFIG.ARRIVAL.offsetMeters, segLenM * 0.3); // short segment guard (Codex)
  map.flyTo(seg.toPt, _camZoom(rhythm, 'arrive'), { animate: true, duration: CAMERA_CONFIG.fly.arrive });
}
function _camTravelFollow(pos, rhythm) {
  if (!pos) return;
  /* Hysteresis: skip if pin hasn't moved enough (Cursor) */
  if (cam.lastFollowPos &&
      haversineKm(pos[0], pos[1], cam.lastFollowPos[0], cam.lastFollowPos[1]) < CAMERA_CONFIG.hysteresisKm) return;
  cam.lastFollowPos = pos;
  map.flyTo(pos, _camZoom(rhythm, 'travel'), { animate: true, duration: CAMERA_CONFIG.fly.travel });
}
/* Seek sync: re-evaluate camera state at new seek position (Codex) */
function _cameraOnSeek() {
  var seg = te.currentSeg;
  var pos = te.currentPos;
  cam.arrivalLock   = false;
  cam.lastFollowPos = null;
  cam.dirHistory    = [];
  cam.isSeeking     = false;
  if (!seg || !pos) { cam.state = 'IDLE'; return; }
  cam.segIdx = te.currentSegIdx >= 0 ? te.currentSegIdx : seg.index;
  var nT = te.normalizedTime;
  var lt = seg.endT > seg.startT ? (nT - seg.startT) / (seg.endT - seg.startT) : 0;
  var rhythm = tcfg(seg.transport).rhythmLabel;
  if (lt < 0.15) {
    cam.state = 'DEPARTURE'; _camDeparture(seg, rhythm);
  } else if (lt > 0.85) {
    cam.state = 'ARRIVAL'; cam.arrivalLock = true; _camArrival(seg, rhythm);
  } else {
    cam.state = 'TRAVEL';
    map.flyTo(pos, _camZoom(rhythm, 'travel'), { animate: true, duration: 0.5 });
  }
}
/* Main camera update — called from _renderTick every 50ms */
function _cameraUpdate() {
  if (!playing) { cam.state = 'IDLE'; return; }
  /* Seek sync guard (Codex) */
  if (cam.isSeeking) { _cameraOnSeek(); return; }
  var nT     = te.normalizedTime;
  var seg    = te.currentSeg;
  var pos    = te.currentPos;
  if (!seg || !pos) return;
  var segIdx   = te.currentSegIdx;
  var rhythm   = tcfg(seg.transport).rhythmLabel;
  var segLenKm = _segLenKm(seg);
  /* Segment change detection */
  if (segIdx !== cam.segIdx && segIdx >= 0) {
    var now   = performance.now();
    /* Rapid segment switching: skip DEPARTURE re-init if < 50ms (Codex) */
    var rapid = cam.segIdx >= 0 && (now - cam.lastSegChangeMs) < CAMERA_CONFIG.minDepartureIntervalMs;
    cam.segIdx          = segIdx;
    cam.lastSegChangeMs = now;
    cam.arrivalLock     = false;
    cam.lastFollowPos   = null;
    cam.dirHistory      = [];
    if (!rapid) {
      cam.state = 'DEPARTURE';
      _camDeparture(seg, rhythm);
      return;
    }
    cam.state = 'TRAVEL'; // rapid switch: jump straight to TRAVEL
  }
  /* DEPARTURE → TRAVEL transition */
  if (cam.state === 'DEPARTURE') {
    var elapsed = (nT - seg.startT) * te.totalDuration;
    if (elapsed < CAMERA_CONFIG.DEPARTURE.durationMs) return;
    cam.state = 'TRAVEL';
  }
  /* ARRIVAL trigger */
  if (!cam.arrivalLock && cam.state === 'TRAVEL') {
    var lt = seg.endT > seg.startT ? (nT - seg.startT) / (seg.endT - seg.startT) : 0;
    var shouldArrive = false;
    if ((rhythm === 'air' || rhythm === 'sea') && segLenKm > CAMERA_CONFIG.ARRIVAL.longSegKm) {
      /* Long ferry/flight: remaining-distance trigger (Codex) */
      var remKm = haversineKm(pos[0], pos[1], seg.toPt[0], seg.toPt[1]);
      if (remKm < CAMERA_CONFIG.ARRIVAL.triggerRemKm) shouldArrive = true;
    } else {
      if (lt > CAMERA_CONFIG.ARRIVAL.triggerRatio) shouldArrive = true;
    }
    if (shouldArrive) {
      cam.arrivalLock = true; cam.state = 'ARRIVAL';
      _camArrival(seg, rhythm); return;
    }
  }
  /* TRAVEL: smooth direction following with hysteresis */
  if (cam.state === 'TRAVEL') {
    /* Direction vector smoothing — 4-frame average (Cursor) */
    var ahead = getPositionAtTime(Math.min(1, nT + 0.005));
    if (ahead && (ahead[0] !== pos[0] || ahead[1] !== pos[1])) {
      cam.dirHistory.push([ahead[0]-pos[0], ahead[1]-pos[1]]);
      if (cam.dirHistory.length > CAMERA_CONFIG.smoothFrames) cam.dirHistory.shift();
    }
    _camTravelFollow(pos, rhythm);
  }
}
function stopAnim() {
  if (te.raf) { cancelAnimationFrame(te.raf); te.raf = null; }
  if (_renderTimer) { clearInterval(_renderTimer); _renderTimer = null; }
  cam.state = 'IDLE';
}
function finishPlay() {
  if (te.raf) { cancelAnimationFrame(te.raf); te.raf = null; }
  if (_renderTimer) { clearInterval(_renderTimer); _renderTimer = null; }
  cam.state = 'IDLE';
  playing = false; te.normalizedTime = 1;
  currentStop = DAYS[currentDay].stops.length - 1;
  removeCurrentPin(); renderMapMarkers(); renderTimeline();
  setPlayBtn(false); updatePeekInfo(); updateSeekBar();
}

/* ─── Camera-safe state interface ─── */
function getCurrentState() {
  var pos = te.currentPos;
  if (!pos) {
    var stopPt = DAYS[currentDay].stops[Math.max(0, currentStop)];
    pos = stopPt ? [stopPt.lat, stopPt.lng] : null;
  }
  var heading = null;
  var seg = te.currentSeg;
  if (seg && pos) {
    var nT = te.normalizedTime;
    var lt = seg.endT > seg.startT ? (nT - seg.startT) / (seg.endT - seg.startT) : 0;
    var ahead = getPositionAtTime(Math.min(1, nT + 0.002));
    if (ahead && (ahead[0] !== pos[0] || ahead[1] !== pos[1])) {
      heading = Math.atan2(ahead[1] - pos[1], ahead[0] - pos[0]) * 180 / Math.PI;
    }
  }
  var confidence = seg ? seg.confidence : 'fallback';
  return {
    lat:           pos ? pos[0] : null,
    lng:           pos ? pos[1] : null,
    heading:       heading,
    normalizedTime: te.normalizedTime,
    confidence:    confidence
  };
}

/* ─── Playback controls ─── */
function setPlaybackSpeed(s) {
  te.baseTime = te.normalizedTime;
  te.baseRealTime = performance.now();
  playbackSpeed = s;
  document.querySelectorAll('.speed-chip').forEach(function(c) {
    c.classList.toggle('sel', parseFloat(c.dataset.speed) === s);
  });
}
function stepPrev() {
  if (currentStop <= 0) { resetAnim(); return; }
  jumpTo(currentStop - 1);
}
function stepNext() {
  var stops = DAYS[currentDay].stops;
  if (currentStop < 0) { jumpTo(0); return; }
  if (currentStop >= stops.length - 1) return;
  jumpTo(currentStop + 1);
}
function onSeekInput(val) {
  var nT = parseFloat(val) / 1000;
  var bar = document.getElementById('seekBar');
  var lbl = document.getElementById('seekStopLabel');
  if (bar) bar.style.setProperty('--seek-pct', (nT * 100) + '%');
  if (segmentTable.length) {
    var pos = getPositionAtTime(nT);
    var seg = _segAtTime(nT);
    if (pos) moveCurrentPin(pos[0], pos[1], seg ? seg.transport : (DAYS[currentDay].stops[0]||{}).transport);
    if (lbl && seg) {
      var stops = DAYS[currentDay].stops;
      var badge = seg.confidence === 'gtfs' ? ' ·GTFS' : seg.confidence === 'inferred' ? ' ·~' : '';
      lbl.textContent = stops[seg.index].name + ' → ' + stops[seg.index+1].name + badge;
    }
  }
}
function onSeekChange(val) {
  var nT = parseFloat(val) / 1000;
  if (isNaN(nT)) return;
  _seekTo(nT);
}
function updateSeekBar() {
  var bar = document.getElementById('seekBar');
  var lbl = document.getElementById('seekStopLabel');
  if (!bar) return;
  var nT = te.normalizedTime;
  bar.value = nT * 1000;
  bar.style.setProperty('--seek-pct', (nT * 100) + '%');
  if (!lbl) return;
  var stops = DAYS[currentDay].stops;
  if (playing && segmentTable.length) {
    var seg = _segAtTime(nT);
    if (seg && nT >= seg.startT && nT < seg.endT) {
      var badge = seg.confidence === 'gtfs' ? ' ·GTFS' : seg.confidence === 'inferred' ? ' ·~' : '';
      lbl.textContent = stops[seg.index].name + ' → ' + stops[seg.index+1].name + badge;
      return;
    }
  }
  if (currentStop >= 0 && currentStop < stops.length) lbl.textContent = stops[currentStop].name;
  else lbl.textContent = stops.length + ' Stops';
}

/* ─── Controls ─── */
function setPlayBtn(p) { var b=document.getElementById('playBtn'); b.innerHTML=p?'&#9632; Stop':'&#9654; Play'; b.classList.toggle('playing',p); }
function togglePlay() {
  if(playing){
    stopAnim();playing=false;removeCurrentPin();renderMapMarkers();setPlayBtn(false);
    updatePeekInfo();
  } else {
    playing=true;setPlayBtn(true);startPlay();
    updatePeekInfo();
    if(isMobile()&&sheetState==='peek') setSheet('half');
  }
}
function resetAnim() {
  stopAnim();playing=false;
  te.normalizedTime=0;te.baseTime=0;te.lastSegIdx=-1;te.lastStopIdx=-1;
  currentStop=-1;removeCurrentPin();setPlayBtn(false);
  renderTimeline();initRouteLines();renderMapMarkers();
  updatePeekInfo();updateSeekBar();
  map.setView(DAYS[currentDay].center,DAYS[currentDay].zoom,{animate:true});
}
function switchDay(day) {
  stopAnim();playing=false;
  te.normalizedTime=0;te.baseTime=0;te.lastSegIdx=-1;te.lastStopIdx=-1;
  currentStop=-1;removeCurrentPin();setPlayBtn(false);
  currentDay=day;
  renderDayTabs();
  renderTimeline();initRouteLines();renderMapMarkers();
  updatePeekInfo();updateSeekBar();
  map.setView(DAYS[day].center,DAYS[day].zoom,{animate:true});
  if (editMode) switchEditTab(_editTab);
}

/* Swipe-triggered day switch with slide animation */
function _swipeSwitchDay(day, toLeft) {
  var tl = document.getElementById('timeline');
  var inX = toLeft ? '100%' : '-100%';
  switchDay(day);                         // re-render timeline at translateX(0)
  tl.style.transition = 'none';
  tl.style.transform  = 'translateX(' + inX + ')';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {    // double-rAF ensures browser has painted
      tl.style.transition = 'transform 0.18s ease-out';
      tl.style.transform  = 'translateX(0)';
      tl.addEventListener('transitionend', function _done() {
        tl.style.transition = '';
        tl.style.transform  = '';
        tl.removeEventListener('transitionend', _done);
      });
    });
  });
}

/* ─── Mobile / desktop ─── */
var _isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
function isMobile() { return window.innerWidth <= 768 || _isTouchDevice; }

/* ── Bottom sheet state ── */
var sheetState  = 'peek';
var sheetOffset = 0;
var PEEK_H = 76;

function setSheet(state, animate) {
  if (!isMobile()) return;
  sheetState = state;
  var sb = document.getElementById('sidebar');
  var h  = sb.offsetHeight || Math.round(window.innerHeight * 0.9);
  var halfH = Math.round(window.innerHeight * 0.5);
  var off = state === 'peek' ? h - PEEK_H
          : state === 'half' ? h - halfH
          : 0;
  sheetOffset = Math.max(0, off);
  if (animate === false) sb.style.transition = 'none';
  else sb.style.transition = 'transform 0.34s cubic-bezier(0.25,0.8,0.25,1)';
  sb.style.transform = 'translateY(' + sheetOffset + 'px)';
  updatePeekInfo();
}

function updatePeekInfo() {
  var d = DAYS[currentDay];
  var stopText = (currentStop >= 0 && currentStop < d.stops.length)
    ? d.stops[currentStop].name
    : d.stops.length + ' stops';
  var el;
  if ((el = document.getElementById('sdDay')))    el.textContent = 'Day ' + currentDay;
  if ((el = document.getElementById('sdStop')))   el.textContent = stopText;
  if ((el = document.getElementById('sdPlayBtn'))) {
    el.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    el.classList.toggle('playing', playing);
    el.style.paddingLeft = playing ? '0' : '2px';
  }
  updateSeekBar();
}

/* ── Touch drag ── */
var isDraggingSheet = false, touchStartY = null, touchOffsetStart = 0;

(function() {
  var dragEl = document.getElementById('sheetDragArea');

  dragEl.addEventListener('touchstart', function(e) {
    if (!isMobile()) return;
    isDraggingSheet = true;
    touchStartY = e.touches[0].clientY;
    touchOffsetStart = sheetOffset;
    document.getElementById('sidebar').style.transition = 'none';
  }, { passive: true });

  dragEl.addEventListener('click', function() {
    if (!isMobile()) return;
    if (sheetState === 'peek') setSheet('half');
    else if (sheetState === 'half') setSheet('full');
  });

  document.addEventListener('touchmove', function(e) {
    if (!isDraggingSheet || touchStartY === null) return;
    var sb  = document.getElementById('sidebar');
    var h   = sb.offsetHeight;
    var dy  = e.touches[0].clientY - touchStartY;
    var off = Math.max(0, Math.min(h - PEEK_H, touchOffsetStart + dy));
    sheetOffset = off;
    sb.style.transform = 'translateY(' + off + 'px)';
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isDraggingSheet) return;
    isDraggingSheet = false;
    if (touchStartY === null) return;
    var dy = e.changedTouches[0].clientY - touchStartY;
    touchStartY = null;
    var SNAP = 52;
    var next = sheetState;
    if      (dy >  SNAP) next = sheetState === 'full' ? 'half' : 'peek';
    else if (dy < -SNAP) next = sheetState === 'peek' ? 'half' : 'full';
    document.getElementById('sidebar').style.transition = 'transform 0.34s cubic-bezier(0.25,0.8,0.25,1)';
    setSheet(next);
  }, { passive: true });

  window.addEventListener('resize', function() {
    if (isMobile()) setSheet(sheetState, false);
    else {
      var sb = document.getElementById('sidebar');
      sb.style.transform = '';
      sb.style.transition = '';
    }
  });
})();

/* ── Timeline day-swipe (left/right only, timeline area only) ── */
(function() {
  var tl = document.getElementById('timeline');
  if (!tl) return;
  var _sx = null, _sy = null;

  tl.addEventListener('touchstart', function(e) {
    if (isDraggingSheet) return;
    _sx = e.touches[0].clientX;
    _sy = e.touches[0].clientY;
  }, { passive: true });

  tl.addEventListener('touchend', function(e) {
    if (_sx === null || isDraggingSheet) { _sx = null; _sy = null; return; }
    var dx = e.changedTouches[0].clientX - _sx;
    var dy = e.changedTouches[0].clientY - _sy;
    _sx = null; _sy = null;
    /* must be clearly horizontal and exceed threshold */
    if (Math.abs(dx) < 30 || Math.abs(dx) <= Math.abs(dy)) return;
    var days = Object.keys(DAYS).map(Number).sort(function(a, b) { return a - b; });
    var idx  = days.indexOf(currentDay);
    var ni   = idx + (dx < 0 ? 1 : -1);  // left swipe → next, right swipe → prev
    if (ni >= 0 && ni < days.length) _swipeSwitchDay(days[ni], dx < 0);
  }, { passive: true });
})();

function openSidebar() {
  if (isMobile()) { setSheet('half'); }
  else { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); }
}
function closeSidebar() {
  if (isMobile()) { setSheet('peek'); }
  else { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); }
}

function toggleEditMode() {

  btn.textContent = editMode ? '✓ Done' : '✏ Edit Trip';
  btn.classList.toggle('on', editMode);

}

function openEP(idx, insertAfter) {
  epIdx         = idx;
  epInsertAfter = (idx >= 0) ? -1 : insertAfter;

  var s = idx >= 0 ? DAYS[currentDay].stops[idx] : null;
  document.getElementById('ef-time').value     = s ? s.time     : '';
  document.getElementById('ef-name').value     = s ? s.name     : '';
  document.getElementById('ef-memo').value     = s ? (s.memo || '') : '';
  document.getElementById('ef-label').value    = s ? (s.label || '') : '';
  document.getElementById('ef-fare').value     = s ? (s.fare || '') : '';
  document.getElementById('ef-dur-h').value = s && s.durHours ? String(s.durHours) : '';
  document.getElementById('ef-dur-m').value = s && s.durMins  ? String(s.durMins)  : '';
  document.getElementById('ef-shape-id').value = s ? explicitSegmentShapeId(s, null) : '';
  renderShapeStatus();
  document.getElementById('ef-lat').value      = s ? s.lat      : '';
  document.getElementById('ef-lng').value      = s ? s.lng      : '';
  document.getElementById('ef-is-day-end').checked = s ? !!s.isDayEnd : false;

  epType = s ? (s.transport || 'bus_local') : 'bus_local';
  refreshTypeChips();
  updateSearchContext();
  renderShapeStatus();
  epCategories = s ? (Array.isArray(s.categories) ? s.categories.slice() : []) : [];
  refreshCategoryChips();

  document.getElementById('epTitle').textContent = idx >= 0 ? 'Stop を編集' : 'Stop を追加';

var shapeOptions = [];
var shapeActiveIndex = -1;

function getGtfsShapes() {
  var root = (typeof window !== 'undefined' && window.GTFS_DB) ? window.GTFS_DB : GTFS_DB;
  return (root && root.shapes) ? root.shapes : {};
}
function getGtfsLoading() {
  var root = (typeof window !== 'undefined' && window.GTFS_DB) ? window.GTFS_DB : GTFS_DB;
  return !!(root && root.loading && !root.loaded);
}
function isShapeDropdownOpen() {
  var box = document.getElementById('shapeDropdown');
  return !!(box && box.classList.contains('open'));
}
function shapeEmoji(type) {
  if (type === 'train_local' || type === 'train_limited') return '🚃';
  if (type === 'bus_express') return '🚍';
  if (type === 'bus_local') return '🚌';
  if (type === 'shuttle') return '🚐';
  return '·';
}
function shapeProviderName(shapeId) {
  var idx = String(shapeId || '').indexOf(':');
  return idx > 0 ? String(shapeId).slice(0, idx) : '';
}
function shapeDisplayName(shape, shapeId) {
  return shapeEmoji(shape.transportType) + ' ' + (shape.routeName || shape.routeId || shapeProviderName(shapeId) || 'GTFS') + ' — ' + shapeId;
}
function shapeSearchText(shape, shapeId) {
  return [shapeId, shape.routeName, shape.routeId, shape.transportType, shapeProviderName(shapeId)]
    .join(' ').toLowerCase();
}
function buildShapeOptions(query) {
  var shapes = getGtfsShapes();
  var q = (query || '').trim().toLowerCase();
  var keys = Object.keys(shapes || {}).sort();
  var opts = [];
  for (var i = 0; i < keys.length; i++) {
    var id = keys[i], shape = shapes[id] || {};
    if (epType && shape.transportType && shape.transportType !== epType) continue;
    if (q && shapeSearchText(shape, id).indexOf(q) < 0) continue;
    opts.push({ shapeId: id, shape: shape, label: shapeDisplayName(shape, id), provider: shapeProviderName(id) });
    if (opts.length >= 20) break;
  }
  return opts;
}
function renderShapeDropdown() {
  var box = document.getElementById('shapeDropdown');
  var input = document.getElementById('ef-shape-id');
  if (!box || !input) return;
  if (getGtfsLoading()) {
    shapeOptions = [];
    shapeActiveIndex = -1;
    box.innerHTML = '<div class="ep-search-msg">⏳ 読み込み中...</div>';
    box.classList.add('open');
    return;
  }
  shapeOptions = buildShapeOptions(input.value);
  if (!shapeOptions.length) {
    shapeActiveIndex = -1;
    box.innerHTML = '<div class="ep-search-msg">候補が見つかりません</div>';
    box.classList.add('open');
    return;
  }
  if (shapeActiveIndex < 0 || shapeActiveIndex >= shapeOptions.length) shapeActiveIndex = 0;
  box.innerHTML = shapeOptions.map(function(opt, i) {
    var active = i === shapeActiveIndex ? ' active' : '';
    var pointCount = opt.shape && Array.isArray(opt.shape.points) ? opt.shape.points.length : 0;
    return '<div class="shape-option' + active + '" onmousedown="selectShapeOption(' + i + ')">' +
      '<div class="shape-option-main">' + escHtml(opt.label) + '</div>' +
      '<div class="shape-option-sub">' + escHtml([opt.provider, opt.shape.transportType, pointCount + ' points'].filter(Boolean).join(' · ')) + '</div>' +
      '</div>';
  }).join('');
  box.classList.add('open');
}
function openShapeDropdown() {
  shapeActiveIndex = 0;
  renderShapeDropdown();
}
function closeShapeDropdown() {
  var box = document.getElementById('shapeDropdown');
  if (box) box.classList.remove('open');
}
function onShapeInput() {
  shapeActiveIndex = 0;
  renderShapeStatus();
  renderShapeDropdown();
}
function selectShapeOption(i) {
  var opt = shapeOptions[i];
  var input = document.getElementById('ef-shape-id');
  if (!opt || !input) return;
  input.value = opt.shapeId;
  closeShapeDropdown();
  renderShapeStatus();
  input.focus();
}
function onShapeKeydown(e) {
  var boxOpen = isShapeDropdownOpen();
  if (e.key === 'Escape') { closeShapeDropdown(); e.preventDefault(); return; }
  if (e.key === 'ArrowDown') {
    if (!boxOpen) renderShapeDropdown();
    if (shapeOptions.length) shapeActiveIndex = Math.min(shapeOptions.length - 1, shapeActiveIndex + 1);
    renderShapeDropdown(); e.preventDefault(); return;
  }
  if (e.key === 'ArrowUp') {
    if (!boxOpen) renderShapeDropdown();
    if (shapeOptions.length) shapeActiveIndex = Math.max(0, shapeActiveIndex - 1);
    renderShapeDropdown(); e.preventDefault(); return;
  }
  if (e.key === 'Enter' && boxOpen && shapeOptions.length && shapeActiveIndex >= 0) {
    selectShapeOption(shapeActiveIndex); e.preventDefault(); return;
  }
}
function renderShapeStatus() {
  var input = document.getElementById('ef-shape-id');
  var status = document.getElementById('shapeStatus');
  if (!input || !status) return;
  var shapeId = input.value.trim();
  status.className = 'shape-status';
  if (!shapeId) { status.textContent = ''; return; }
  if (getGtfsLoading()) {
    status.textContent = '⏳ 読み込み中...';
    status.classList.add('loading');
    return;
  }
  var shape = getGtfsShapes()[shapeId];
  if (shape && Array.isArray(shape.points)) {
    status.textContent = '✓ points ' + shape.points.length;
    status.classList.add('ok');
  } else {
    status.textContent = '⚠ not found';
    status.classList.add('warn');
  }
}

/* ── Duration helpers ── */
function formatDur(s) {
  var h = s.durHours ? parseInt(s.durHours, 10) : 0;
  var m = s.durMins  ? parseInt(s.durMins,  10) : 0;
  if (h && m) return h + 'h ' + m + 'm';
  if (h)      return h + 'h';
  if (m)      return m + 'm';
  return '';
}

/* ── P2-B duration estimation helpers ── */
function _parseTimeToMins(t) {
  var m = String(t || '').match(/^(\d{1,2}):(\d{2})$/);
  return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : null;
}
function getTimeDiffMinutes(t1, t2) {
  var m1 = _parseTimeToMins(t1), m2 = _parseTimeToMins(t2);
  if (m1 === null || m2 === null) return null;
  var d = m2 - m1; return d >= 0 ? d : d + 1440; // handle overnight
}
function formatMinutes(mins) {
  var h = Math.floor(mins / 60), m = mins % 60;
  if (h && m) return h + '時間' + m + '分';
  if (h)      return h + '時間';
  return mins + '分';
}
function _validateDistance(transport, distKm) {
  var rule = TRANSPORT_DISTANCE_RULES[transport]; if (!rule) return 'ok';
  if (rule.suspiciousAbove && distKm > rule.suspiciousAbove) return 'suspicious';
  if (rule.suspiciousBelow && distKm < rule.suspiciousBelow) return 'suspicious';
  if (rule.warnAbove        && distKm > rule.warnAbove)       return 'warning';
  if (rule.warnBelow        && distKm < rule.warnBelow)       return 'warning';
  return 'ok';
}
function _getLoadLevel(mins) {
  return mins <= 10 ? 'green' : mins <= 30 ? 'yellow' : 'red';
}
function estimateTransportDuration(from, to) {
  var transport = (from && from.transport) || 'walk';
  /* 1. Actual time diff — highest priority */
  var td = getTimeDiffMinutes(from && from.time, to && to.time);
  if (td !== null && td > 0 && td < 1440) {
    return { kind: 'actual', label: formatMinutes(td), confidence: 'high', loadLevel: _getLoadLevel(td) };
  }
  /* 2. Plane — skip distance estimation */
  if (transport === 'plane') return { kind: 'missing', label: null, confidence: 'none' };
  /* 3. Need valid coords */
  if (!from || from.lat == null || from.lng == null ||
      !to   || to.lat  == null || to.lng  == null) {
    return { kind: 'missing', label: null, confidence: 'none' };
  }
  /* 4. Haversine distance estimate */
  var distKm  = haversineKm(from.lat, from.lng, to.lat, to.lng);
  var speed   = TRANSPORT_SPEED_MPM[transport] || 300;
  var factor  = DISTANCE_FACTOR[transport]     || [1.2, 1.5];
  var warnLvl = _validateDistance(transport, distKm);
  if (warnLvl === 'suspicious') {
    return { kind: 'suspicious', label: '移動手段を確認', confidence: 'none', loadLevel: 'red' };
  }
  var minMins = Math.max(1, Math.round(distKm * 1000 * factor[0] / speed));
  var maxMins = Math.max(1, Math.round(distKm * 1000 * factor[1] / speed));
  var rangeLabel = minMins === maxMins ? '約' + minMins + '分' : '約' + minMins + '〜' + maxMins + '分';
  return {
    kind:       warnLvl === 'warning' ? 'warning' : 'estimate',
    label:      warnLvl === 'warning' ? rangeLabel + ' · 要確認' : rangeLabel,
    confidence: warnLvl === 'warning' ? 'low' : 'medium',
    loadLevel:  _getLoadLevel(minMins)
  };
}
function _parseDurationStr(str) {
  if (!str || !str.trim()) return null;
  var hm = str.match(/(\d+)\s*[hH時]/);
  var mm = str.match(/(\d+)\s*[mM分]/);
  if (hm || mm) return { h: hm ? parseInt(hm[1], 10) : 0, m: mm ? parseInt(mm[1], 10) : 0 };
  return null;
}
function _migrateDays(days) {
  Object.keys(days).forEach(function(k) {
    var day = days[k];
    if (!day.stops) return;
    day.stops.forEach(function(s) {
      if (s.duration !== undefined) {
        var parsed = _parseDurationStr(s.duration);
        if (parsed) {
          s.durHours = parsed.h;
          s.durMins  = parsed.m;
        } else if (s.duration.trim()) {
          s.memo = s.memo ? s.memo + '（' + s.duration + '）' : s.duration;
        }
        delete s.duration;
      }
    });
  });
}

    .replace(/：/g, ':')

}

function doPlaceSearch(q, isFallback) {

  var box = document.getElementById('epSearchResults');

  var url = 'https://nominatim.openstreetmap.org/search?q=' +
    encodeURIComponent(query) + '&format=json&limit=6&accept-language=ja,en&addressdetails=0';
  fetch(url, { headers: { 'Accept-Language': 'ja,en' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.length && !isFallback && ctx.suffix) {

   AI 旅程生成 (P1.5)

/* ── Supabase Edge Function URL — replace YOUR_PROJECT_REF after deploy ── */
var SUPABASE_EDGE_FN_URL = 'https://YOUR_PROJECT_REF.supabase.co/functions/v1/generate-draft-stops';

var _draftStops  = [];   // working copy for preview
var _aiAbortCtrl = null;
var _aiRetryCount = 0;   // retry counter (max 1)

/* ── 1. 安全なJSONパース（Codex 3段階）── */
function _extractJsonText(raw) {
  var fencedJson = raw.match(/```json\s*([\s\S]*?)```/i);
  if (fencedJson) return fencedJson[1].trim();
  var fenced = raw.match(/```\s*([\s\S]*?)```/);
  if (fenced) return fenced[1].trim();
  var firstObj = raw.indexOf('{'), lastObj = raw.lastIndexOf('}');
  if (firstObj !== -1 && lastObj > firstObj) return raw.slice(firstObj, lastObj + 1).trim();
  var firstArr = raw.indexOf('['), lastArr = raw.lastIndexOf(']');
  if (firstArr !== -1 && lastArr > firstArr) return raw.slice(firstArr, lastArr + 1).trim();
  return raw.trim();
}
function _parseJsonSafely(raw) {
  var jsonText = _extractJsonText(raw);
  try { return { ok: true, data: JSON.parse(jsonText) }; }
  catch(e) { return { ok: false, data: null, error: 'AIの出力を読み取れませんでした' }; }
}

/* ── 2. per-stop validation（Codex）── */
function _validateDraftStop(raw, index) {
  if (!raw || typeof raw !== 'object' || Array.isArray(raw))
    return { status: 'invalid', index: index, reason: 'not_an_object', raw: raw };
  var name = typeof raw.name === 'string' ? raw.name.trim() : '';
  var memo = typeof raw.memo === 'string' ? raw.memo.trim()
           : typeof raw.activity === 'string' ? raw.activity.trim() : '';
  if (!name && !memo)
    return { status: 'invalid', index: index, reason: 'missing_name', raw: raw };
  var warnings = [];
  var lat = Number(raw.lat), lng = Number(raw.lng);
  var hasCoords = isFinite(lat) && isFinite(lng) &&
    lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180;
  if (!hasCoords) warnings.push('coords_missing');
  var time = String(raw.time || '').trim();
  if (!time) warnings.push('time_missing');
  var confidence = isFinite(Number(raw.confidence))
    ? Math.max(0, Math.min(1, Number(raw.confidence))) : 0.5;
  if (confidence <= 0.5) warnings.push('low_confidence');
  var transport = Object.prototype.hasOwnProperty.call(TCFG, raw.transport) ? raw.transport : 'walk';
  return {
    status: warnings.length ? 'needsReview' : 'valid',
    index: index,
    draft: {
      name:               name || '（名前未定）',
      time:               time,
      memo:               memo,
      lat:                hasCoords ? lat : null,
      lng:                hasCoords ? lng : null,
      transport:          transport,
      categories:         Array.isArray(raw.categories)
                            ? raw.categories.filter(function(c){ return !!CATEGORIES[c]; }) : [],
      isDayEnd:           !!raw.isDayEnd,
      operatorHint:       raw.operatorHint || '',
      confidence:         confidence,
      needsReview:        warnings.length > 0,
      validationWarnings: warnings,
      source:             'ai'
    }
  };
}

/* ── 3. mode 判定（Codex）── */
function _processDraftStops(parsed) {
  var items = Array.isArray(parsed) ? parsed : (parsed.stops || []);
  var results = items.map(function(raw, i) { return _validateDraftStop(raw, i); });
  var drafts  = results.filter(function(r){ return r.status !== 'invalid'; }).map(function(r){ return r.draft; });
  var invalids = results.filter(function(r){ return r.status === 'invalid'; });
  var mode;
  if (drafts.length === 0) mode = 'fallback';
  else if (invalids.length === 0 && drafts.every(function(d){ return !d.needsReview; })) mode = 'success';
  else if (invalids.length > 0) mode = 'partial_success';
  else mode = 'needs_review';
  return {
    mode: mode, drafts: drafts, invalidItems: invalids,
    summary: {
      total:       items.length,
      valid:       drafts.filter(function(d){ return !d.needsReview; }).length,
      needsReview: drafts.filter(function(d){ return d.needsReview; }).length,
      invalid:     invalids.length
    }
  };
}

/* ── 4. API失敗時 fallback（Codex）── */
function _createManualFallbackDraft(originalInput) {
  return {
    name:               '',
    time:               '',
    memo:               originalInput || '',
    lat:                null, lng: null,
    transport:          'walk',
    categories:         [],
    isDayEnd:           false,
    operatorHint:       '',
    confidence:         0,
    needsReview:        true,
    validationWarnings: ['manual_fallback'],
    source:             'manual_fallback'
  };
}

/* ── 5. confidence 表示ヘルパー（Codex）── */
function _getConfidenceLabel(confidence) {
  if (confidence >= 0.8) return { color: '#28b56a', icon: '🟢', text: 'High' };
  if (confidence >= 0.5) return { color: '#f5a623', icon: '🟡', text: 'Medium' };
  return { color: '#e05454', icon: '🔴', text: 'Low' };
}

  plane:'PLANE', ferry:'FERRY', shinkansen:'SHINKANSEN', train_limited:'LTD EXP',
  train_local:'LOCAL', bus_express:'HWY BUS', bus_local:'BUS', shuttle:'SHUTTLE',

/* Supabase Edge Function call — ANTHROPIC_API_KEY stored server-side */
async function _callEdgeFunction(text) {
  _aiAbortCtrl = new AbortController();
  var resp = await fetch(SUPABASE_EDGE_FN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: text }),
    signal: _aiAbortCtrl.signal
  });
  if (!resp.ok) {
    var errData = await resp.json().catch(function(){ return {}; });
    throw new Error((errData.error) || ('HTTP ' + resp.status));
  }
  var data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data.rawText || '';
}

async function generateDraftStops() {
  var text = document.getElementById('aiTextarea').value.trim();
  if (!text) { _aiShowErr('旅程テキストを入力してください。'); return; }

  document.getElementById('aiErrMsg').innerHTML = '';
  var btn = document.getElementById('aiGenBtn');
  btn.textContent = '生成中…'; btn.disabled = true;
  document.getElementById('aiDraftPreview').style.display = 'none';
  _aiRetryCount = 0;

  try {
    var rawTxt = null;
    var parseResult = null;

    /* ─ attempt 1 ─ */
    try {
      rawTxt      = await _callEdgeFunction(text);
      parseResult = _parseJsonSafely(rawTxt);
    } catch(e1) {
      if (e1.name === 'AbortError') { return; }
      /* API error → retry once */
      rawTxt = null; parseResult = null;
    }

    /* ─ attempt 2 (retry on API error or bad parse) ─ */
    if (!parseResult || !parseResult.ok) {
      _aiRetryCount = 1;
      btn.textContent = '再試行中…';
      try {
        rawTxt      = await _callEdgeFunction(text);
        parseResult = _parseJsonSafely(rawTxt);
      } catch(e2) {
        if (e2.name === 'AbortError') { return; }
        parseResult = { ok: false, data: null };
      }
    }

    /* ─ fallback: 2回とも失敗 ─ */
    if (!parseResult || !parseResult.ok) {
      _draftStops = [_createManualFallbackDraft(text)];
      renderDraftPreviews({
        mode: 'fallback', summary: { total: 1, valid: 0, needsReview: 1, invalid: 0 }
      });
      document.getElementById('aiDraftPreview').style.display = 'block';
      document.getElementById('aiPreviewCount').textContent = '手動入力';
      _aiShowErr(
        'うまく読み取れなかったため、手動入力に切り替えました。' +
        '入力内容はメモに残しています。'
      );
      return;
    }

    /* ─ process & validate ─ */
    var proc = _processDraftStops(parseResult.data);
    _draftStops = proc.drafts;

    if (proc.mode === 'fallback') {
      /* All stops invalid — one manual fallback card */
      _draftStops = [_createManualFallbackDraft(text)];
      renderDraftPreviews({ mode: 'fallback', summary: { total: 1, valid: 0, needsReview: 1, invalid: 0 } });
      document.getElementById('aiDraftPreview').style.display = 'block';
      document.getElementById('aiPreviewCount').textContent = '手動入力';
      _aiShowErr('Stopが抽出できませんでした。テキストを詳しく書いてみてください。');
      return;
    }

    renderDraftPreviews(proc);
    document.getElementById('aiDraftPreview').style.display = 'block';
    document.getElementById('aiPreviewCount').textContent = _draftStops.length + ' stops';

    /* ─ partial_success banner ─ */
    if (proc.mode === 'partial_success') {
      _aiShowErr(
        proc.summary.needsReview + '件のStop候補を作成しました。' +
        proc.summary.invalid + '件は読み取れませんでした。' +
        '確認が必要な項目が含まれます。'
      );
    } else if (proc.mode === 'needs_review') {
      _aiShowErr(proc.summary.needsReview + '件の確認が必要な項目があります。');
    }

  } finally {
    btn.textContent = '✨ 旅程を生成'; btn.disabled = false;
    _aiAbortCtrl = null; _aiRetryCount = 0;
  }
}

function _aiShowErr(msg, type) {
  /* type: 'error'(default) | 'warn' */
  var style = (type === 'warn')
    ? 'background:rgba(245,166,35,.1);color:rgba(160,100,0,.9);border:1px solid rgba(245,166,35,.35);'
    : '';
  document.getElementById('aiErrMsg').innerHTML =
    '<div class="ai-err" style="' + style + '">' + escHtml(msg) + '</div>';
}

function renderDraftPreviews(proc) {
  var html = '';

  /* ─ valid / needsReview cards ─ */
  _draftStops.forEach(function(s, i) {
    var conf  = _getConfidenceLabel(s.confidence);
    var transportOpts = Object.keys(TCFG).map(function(k) {
      return '<option value="' + k + '"' + (k === s.transport ? ' selected' : '') + '>' +
        (TRANSPORT_EMOJI[k] || '') + ' ' + (TRANSPORT_LABEL[k] || k.toUpperCase()) + '</option>';
    }).join('');
    var catBtns = Object.keys(CATEGORIES).map(function(k) {
      var sel = s.categories.indexOf(k) >= 0 ? ' sel' : '';
      return '<button class="draft-cat-btn' + sel + '" data-cat="' + k +
        '" onclick="_draftToggleCat(' + i + ',this)">' +
        CATEGORIES[k].icon + ' ' + CATEGORIES[k].label + '</button>';
    }).join('');
    var opHint  = s.operatorHint ? '<div class="draft-op-hint">🚉 ' + escHtml(s.operatorHint) + '</div>' : '';
    var memoHint = s.memo        ? '<div class="draft-op-hint">📝 ' + escHtml(s.memo)         + '</div>' : '';

    /* warning row for needsReview stops */
    var warnRow = '';
    if (s.needsReview && s.validationWarnings && s.validationWarnings.length) {
      var warnMap = {
        coords_missing:   '📍 位置情報なし — 後でEdit',
        time_missing:     '⏰ 時刻未設定',
        low_confidence:   '⚠️ 確認推奨（信頼度低）',
        manual_fallback:  '✍️ 手動入力 — 内容を確認してください'
      };
      var warnTxts = s.validationWarnings.map(function(w){ return warnMap[w] || w; }).join(' · ');
      warnRow = '<div style="font-family:var(--font-body);font-size:10px;color:#b07000;' +
        'background:rgba(245,166,35,.1);border-radius:5px;padding:4px 8px;margin-bottom:6px;">' +
        warnTxts + '</div>';
    }

    var borderStyle = s.needsReview
      ? 'border-color:rgba(245,166,35,.55);'
      : (s.source === 'manual_fallback' ? 'border-color:rgba(192,68,68,.4);' : '');

    html +=
      '<div class="draft-card" id="dcard-' + i + '" style="' + borderStyle + '">' +
        '<div class="draft-card-hd">' +
          '<span class="draft-conf" style="background:' + conf.color + '"' +
            ' title="' + conf.icon + ' ' + conf.text + ' — AI信頼度: ' + Math.round(s.confidence*100) + '%"></span>' +
          '<input class="draft-time-inp" type="text" value="' + escHtml(s.time) +
            '" maxlength="5" placeholder="--:--" oninput="_draftSetTime(' + i + ',this.value)">' +
          '<select class="draft-transport-sel" onchange="_draftSetTransport(' + i + ',this.value)">' +
            transportOpts + '</select>' +
          '<label class="draft-dayend-lbl"><input type="checkbox"' +
            (s.isDayEnd ? ' checked' : '') + ' onchange="_draftSetDayEnd(' + i + ',this.checked)"> 終点</label>' +
        '</div>' +
        warnRow +
        '<input class="draft-name-inp" type="text" value="' + escHtml(s.name) +
          '" placeholder="スポット名" oninput="_draftSetName(' + i + ',this.value)">' +
        '<div class="draft-cats">' + catBtns + '</div>' +
        opHint + memoHint +
      '</div>';
  });

  /* ─ invalid items (Codex) ─ */
  if (proc && proc.invalidItems && proc.invalidItems.length) {
    proc.invalidItems.forEach(function(inv) {
      var rawName = inv.raw && typeof inv.raw.name === 'string' ? inv.raw.name : '';
      var reasonMap = { not_an_object: '形式エラー', missing_name: '名前なし' };
      var reason = reasonMap[inv.reason] || inv.reason;
      html +=
        '<div class="draft-card" style="border-color:rgba(192,68,68,.35);opacity:.85;">' +
          '<div style="font-family:var(--font-body);font-size:11px;font-weight:600;' +
            'color:rgba(192,68,68,.8);margin-bottom:6px;">❌ 読み取れませんでした（' + escHtml(reason) + '）' +
            (rawName ? ' — ' + escHtml(rawName) : '') + '</div>' +
          '<button class="ep-btn-outline" style="width:100%;font-size:11px;padding:7px 0;"' +
            ' onclick="_addManualFallbackCard()">＋ 手動で追加</button>' +
        '</div>';
    });
  }

  document.getElementById('aiDraftCards').innerHTML = html;
}

/* Add a blank manual-fallback card to the working list */
function _addManualFallbackCard() {
  _draftStops.push(_createManualFallbackDraft(''));
  /* re-render without proc (no invalid items panel) */
  renderDraftPreviews(null);
  document.getElementById('aiPreviewCount').textContent = _draftStops.length + ' stops';
  /* scroll to new card */
  var cards = document.getElementById('aiDraftCards').children;
  if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* Inline editing callbacks */
function _draftSetName(i, v)       { _draftStops[i].name = v; }
function _draftSetTime(i, v)       { _draftStops[i].time = v; }
function _draftSetTransport(i, v)  { _draftStops[i].transport = v; }
function _draftSetDayEnd(i, v)     { _draftStops[i].isDayEnd = v; }
function _draftToggleCat(i, btn) {
  var k = btn.dataset.cat;
  var idx = _draftStops[i].categories.indexOf(k);
  if (idx >= 0) { _draftStops[i].categories.splice(idx, 1); btn.classList.remove('sel'); }
  else          { _draftStops[i].categories.push(k);        btn.classList.add('sel'); }
}

function confirmDraftStops() {
  if (!_draftStops.length) return;
  var targetDay = parseInt(document.getElementById('aiTargetDay').value, 10) || currentDay;
  var day = DAYS[targetDay];
  if (!day) return;

  _draftStops.forEach(function(s) {
    /* Build stop compatible with existing data structure (schemaVersion 5.16) */
    day.stops.push({
      name:      s.name,
      time:      s.time,
      transport: s.transport,
      categories: s.categories.slice(),
      isDayEnd:  s.isDayEnd,
      label:     s.operatorHint || '',
      memo:      s.memo         || '',
      fare:      '',
      durHours:  0,
      durMins:   0,
      lat:       null,  /* user sets location via Edit panel */
      lng:       null
    });
  });

  /* Persist only after user confirms */
  saveToStorage();

  /* Refresh UI */
  stopAnim(); playing = false; setPlayBtn(false);
  te.normalizedTime = 0; te.baseTime = 0; te.lastStopIdx = -1; te.lastSegIdx = -1;
  removeCurrentPin();
  if (targetDay !== currentDay) {
    currentDay = targetDay;
    renderDayTabs();
  }
  initRouteLines();
  renderMapMarkers();
  renderTimeline();
  updateAllProgress();
  closeAIDraftModal();

  /* Brief toast feedback */
  _aiToast('✅ ' + _draftStops.length + ' stops を Day ' + targetDay + ' に追加しました');
}

/* ── Poster tile helpers ── */
var _posterCanvas = null;
var _posterGenTimer = null;

function _lngToTX(lng, z) { return Math.floor((lng + 180) / 360 * Math.pow(2, z)); }
function _latToTY(lat, z) {
  var s = Math.sin(lat * Math.PI / 180);
  return Math.floor((1 - Math.log((1 + s) / (1 - s)) / (2 * Math.PI)) / 2 * Math.pow(2, z));
}
function _txToLng(tx, z) { return tx / Math.pow(2, z) * 360 - 180; }
function _tyToLat(ty, z) {
  var n = Math.PI - 2 * Math.PI * ty / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}
function _chooseTileZoom(minLng, maxLng, minLat, maxLat) {
  for (var z = 15; z >= 4; z--) {
    var x0 = _lngToTX(minLng, z), x1 = _lngToTX(maxLng, z);
    var y0 = _latToTY(maxLat, z), y1 = _latToTY(minLat, z);
    if ((x1 - x0 + 1) * (y1 - y0 + 1) <= 36) return z;
  }
  return 4;
}
function _loadTileImg(url) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { resolve(img); };
    img.onerror = function() { resolve(null); };
    img.src = url;
  });
}

/* ── Canvas helpers ── */
function _rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);  ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);      ctx.quadraticCurveTo(x,     y,     x + r, y);
  ctx.closePath();
}
function _clip(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  while (text.length > 1 && ctx.measureText(text + '…').width > maxW) text = text.slice(0, -1);
  return text + '…';
}

function generatePosterCanvasAsync(stops) {
  var W = 1080, PAD = 72;
  var day = DAYS[currentDay];
  var HEADER_H = 240, ROUTE_H = 820, ITEM_H = 92, FOOTER_H = 100;
  var H = HEADER_H + ROUTE_H + stops.length * ITEM_H + FOOTER_H;

  /* Geo bounds */
  var lats = stops.map(function(s){return s.lat;}), lngs = stops.map(function(s){return s.lng;});
  var minLat=Math.min.apply(null,lats), maxLat=Math.max.apply(null,lats);
  var minLng=Math.min.apply(null,lngs), maxLng=Math.max.apply(null,lngs);
  var latSpan=(maxLat-minLat)||0.05, lngSpan=(maxLng-minLng)||0.05;
  minLat-=latSpan*0.28; maxLat+=latSpan*0.28;
  minLng-=lngSpan*0.28; maxLng+=lngSpan*0.28;
  latSpan=maxLat-minLat; lngSpan=maxLng-minLng;
  var rW=W-PAD*2, sx=rW/lngSpan, sy=ROUTE_H/latSpan, sc=Math.min(sx,sy);
  var ox=PAD+(rW-lngSpan*sc)/2, oy=HEADER_H+(ROUTE_H-latSpan*sc)/2;
  function cv(lat,lng){return[ox+(lng-minLng)*sc, oy+(maxLat-lat)*sc];}

  /* Tile fetch */
  var z=_chooseTileZoom(minLng,maxLng,minLat,maxLat);
  var tx0=_lngToTX(minLng,z), tx1=_lngToTX(maxLng,z);
  var ty0=_latToTY(maxLat,z), ty1=_latToTY(minLat,z);
  var subs=['a','b','c'], tileJobs=[];
  for(var ty_=ty0;ty_<=ty1;ty_++){
    for(var tx_=tx0;tx_<=tx1;tx_++){
      (function(tx,ty){
        var url='https://'+subs[(tx+ty)%3]+'.basemaps.cartocdn.com/light_all/'+z+'/'+tx+'/'+ty+'@2x.png';
        tileJobs.push(_loadTileImg(url).then(function(img){return{img:img,tx:tx,ty:ty};}));
      })(tx_,ty_);
    }
  }

  return Promise.all(tileJobs).then(function(tiles){
    var canvas=document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');

    /* Background */
    ctx.fillStyle='#F7F5EE'; ctx.fillRect(0,0,W,H);

    /* Map tile layer — clipped to route area */
    var anyTile = tiles.some(function(t){return !!t.img;});
    if(anyTile){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,HEADER_H,W,ROUTE_H); ctx.clip();
      tiles.forEach(function(t){
        if(!t.img) return;
        var wLng=_txToLng(t.tx,z), eLng=_txToLng(t.tx+1,z);
        var nLat=_tyToLat(t.ty,z), sLat=_tyToLat(t.ty+1,z);
        var p0=cv(nLat,wLng), p1=cv(sLat,eLng);
        ctx.drawImage(t.img,p0[0],p0[1],p1[0]-p0[0],p1[1]-p0[1]);
      });
      ctx.restore();
    }

    /* Lime top bar */
    ctx.fillStyle='#C5E84A'; ctx.fillRect(0,0,W,10);

    /* Header */
    ctx.fillStyle='#C5E84A';
    ctx.beginPath(); ctx.arc(PAD+8,68,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#007A8A';
    ctx.font='600 26px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText('DAY '+currentDay+(day.label?' · '+day.label:''),PAD+24,74);
    ctx.font='700 86px "DM Sans",Helvetica,sans-serif';
    var tparts=(TRIP.title||'ROUTE MAP').trim().split(/\s+/);
    var tacc=tparts[0], trest=tparts.slice(1).join(' ');
    var accW=ctx.measureText(tacc).width+18;
    ctx.fillStyle='#C5E84A'; _rrect(ctx,PAD-6,90,accW,80,6); ctx.fill();
    ctx.fillStyle='#222222'; ctx.fillText(tacc,PAD,158);
    if(trest) ctx.fillText(' '+trest,PAD+accW-4,158);
    ctx.fillStyle='#777777';
    ctx.font='400 30px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText(TRIP.subtitle||'',PAD,203);
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,HEADER_H-12,W-PAD*2,1);

    /* Route lines */
    ctx.lineCap='round'; ctx.lineJoin='round';
    for(var i=0;i<stops.length-1;i++){
      var s0=stops[i],s1=stops[i+1],c=tcfg(s0.transport);
      var fp=cv(s0.lat,s0.lng),tp=cv(s1.lat,s1.lng);
      ctx.beginPath();
      ctx.strokeStyle=anyTile?'rgba(50,50,50,0.22)':'#D9D6CC';
      ctx.lineWidth=Math.max(2,c.lineWeight*1.6);
      ctx.setLineDash(c.dashArray?c.dashArray.split(' ').map(Number).map(function(n){return n*2;}):[]);
      if(c.curve){var cp_ll=ctrlPt([s0.lat,s0.lng],[s1.lat,s1.lng],c.curve),cp=cv(cp_ll[0],cp_ll[1]);ctx.moveTo(fp[0],fp[1]);ctx.quadraticCurveTo(cp[0],cp[1],tp[0],tp[1]);}
      else{ctx.moveTo(fp[0],fp[1]);ctx.lineTo(tp[0],tp[1]);}
      ctx.stroke();
    }
    ctx.setLineDash([]);
    for(var i=0;i<stops.length-1;i++){
      var s0=stops[i],s1=stops[i+1],c=tcfg(s0.transport);
      var fp=cv(s0.lat,s0.lng),tp=cv(s1.lat,s1.lng);
      ctx.beginPath(); ctx.strokeStyle='#C5E84A'; ctx.lineWidth=Math.max(3,c.progWeight*1.6);
      if(c.curve){var cp_ll=ctrlPt([s0.lat,s0.lng],[s1.lat,s1.lng],c.curve),cp=cv(cp_ll[0],cp_ll[1]);ctx.moveTo(fp[0],fp[1]);ctx.quadraticCurveTo(cp[0],cp[1],tp[0],tp[1]);}
      else{ctx.moveTo(fp[0],fp[1]);ctx.lineTo(tp[0],tp[1]);}
      ctx.stroke();
    }

    /* Stop dots */
    ctx.setLineDash([]);
    for(var i=0;i<stops.length;i++){
      var p=cv(stops[i].lat,stops[i].lng);
      var r=(i===0||i===stops.length-1)?15:9;
      ctx.beginPath();ctx.fillStyle='rgba(247,245,238,0.9)';ctx.arc(p[0],p[1],r+4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.fillStyle='#FFFFFF';ctx.arc(p[0],p[1],r,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.strokeStyle='#007A8A';ctx.lineWidth=2.5;ctx.arc(p[0],p[1],r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.fillStyle=(i===0)?'#C5E84A':'#007A8A';ctx.arc(p[0],p[1],r/2.4,0,Math.PI*2);ctx.fill();
    }

    /* Stop list */
    var listTop=HEADER_H+ROUTE_H+20;
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,listTop,W-PAD*2,1); listTop+=20;
    for(var i=0;i<stops.length;i++){
      var s=stops[i], y=listTop+i*ITEM_H;
      var isTerminal=!!s.isDayEnd;
      var transportDisp=s.transport?s.transport.replace(/_/g,' ').toUpperCase():'';
      var labelDisp=s.label||'';
      ctx.fillStyle='#007A8A'; ctx.font='500 21px "Space Grotesk",Helvetica,sans-serif';
      ctx.fillText(s.time,PAD,y+22);
      ctx.fillStyle='#222222'; ctx.font='700 34px "DM Sans",Helvetica,sans-serif';
      ctx.fillText(_clip(ctx,s.name,W-PAD*2-(isTerminal?0:230)),PAD,y+62);
      if(!isTerminal){
        ctx.fillStyle='#AAAAAA'; ctx.font='400 21px "Space Grotesk",Helvetica,sans-serif';
        var tDisp=labelDisp?transportDisp+'  '+labelDisp:transportDisp;
        var tw=_clip(ctx,tDisp,210);
        ctx.fillText(tw,W-PAD-ctx.measureText(tw).width,y+62);
      }
      if(i<stops.length-1){ctx.fillStyle='#EEEEEE';ctx.fillRect(PAD,y+ITEM_H-4,W-PAD*2,1);}
    }

    /* Footer */
    var fy=listTop+stops.length*ITEM_H+20;
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,fy,W-PAD*2,1);
    ctx.fillStyle='#AAAAAA'; ctx.font='400 22px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText('Journey Replay',PAD,fy+44);
    if(day.cost){ctx.textAlign='right';ctx.fillText(day.cost,W-PAD,fy+44);ctx.textAlign='left';}
    ctx.fillStyle='#C5E84A'; ctx.fillRect(0,H-10,W,10);

    return canvas;
  });
}

/* ─── Journey Profile ─── */
function haversineKm(lat1, lng1, lat2, lng2) {
  var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function computeJourneyStats() {
  var TYPE_ICONS = {
    plane: '✈️', ferry: '🚢', shinkansen: '🚄',
    train_limited: '🚃', train_local: '🚃',
    bus_express: '🚍', bus_local: '🚌', shuttle: '🚐',
    car: '🚗', bike: '🚴', walk: '🚶'
  };
  var TYPE_LABELS = {
    plane: 'Plane', ferry: 'Ferry', shinkansen: 'Shinkansen',
    train_limited: 'Limited Express', train_local: 'Local Train',
    bus_express: 'Highway Bus', bus_local: 'Local Bus', shuttle: 'Shuttle',
    car: 'Car', bike: 'Bike', walk: 'Walk'
  };
  var allStops = [];
  var days = Object.keys(DAYS).map(Number).sort();
  days.forEach(function(d){ allStops = allStops.concat(DAYS[d].stops); });

  var totalDist = 0, distByType = {}, ridesByType = {}, weightedSpeed = 0;
  for (var i = 0; i < allStops.length - 1; i++) {
    var s = allStops[i];
    var d = haversineKm(s.lat, s.lng, allStops[i+1].lat, allStops[i+1].lng);
    totalDist += d;
    distByType[s.transport]  = (distByType[s.transport]  || 0) + d;
    ridesByType[s.transport] = (ridesByType[s.transport] || 0) + 1;
    weightedSpeed += tcfg(s.transport).speedMult * d;
  }

  var catCount = {};
  allStops.forEach(function(s){
    var cats = Array.isArray(s.categories) ? s.categories : [];
    cats.forEach(function(k){ catCount[k] = (catCount[k]||0) + 1; });
  });

  var rawRhythm = totalDist > 0 ? weightedSpeed / totalDist : 1;
  var rhythmNorm = Math.max(0, Math.min(1, (rawRhythm - 0.42) / (1.9 - 0.42)));
  var rhythmLabel = rhythmNorm < 0.4 ? 'Calm' : rhythmNorm < 0.7 ? 'Balanced' : 'Fast-paced';

  var totalRides = Object.keys(ridesByType).reduce(function(a,k){return a+ridesByType[k];}, 0);
  var totalCatStops = allStops.length;
  var ferryRatio    = (ridesByType.ferry||0) / Math.max(1, totalRides);
  var walkRatio     = (ridesByType.walk||0)  / Math.max(1, totalRides);
  var trainRatio    = ((ridesByType.train_limited||0)+(ridesByType.train_local||0)+(ridesByType.shinkansen||0)) / Math.max(1, totalRides);
  var eventCount    = catCount.event || 0;
  var foodCount     = catCount.food  || 0;
  var sightCount    = catCount.sightseeing || 0;
  var heritageCount = catCount.heritage || 0;
  var onsenCount    = (catCount.onsen||0) + (catCount.stay||0);
  var personality;
  if      (ferryRatio >= 0.2 && walkRatio >= 0.1 && totalDist > 100)                       personality = { icon:'🚢', name:'Island Hopper',      desc:'島と海を巡る旅' };
  else if (eventCount >= 2 && eventCount / Math.max(1,totalCatStops) >= 0.2)               personality = { icon:'🎫', name:'Event Chaser',        desc:'ライブ・イベント中心の遠征' };
  else if (heritageCount / Math.max(1,totalCatStops) >= 0.3 && walkRatio >= 0.15)          personality = { icon:'⛩️', name:'Pilgrimage Walker',   desc:'歴史と文化を歩く旅' };
  else if (heritageCount / Math.max(1,totalCatStops) >= 0.2)                               personality = { icon:'⛩️', name:'Culture Explorer',    desc:'文化探求者' };
  else if (onsenCount / Math.max(1,totalCatStops) >= 0.3)                                  personality = { icon:'♨️', name:'Relaxation Seeker',   desc:'のんびり旅人' };
  else if (foodCount  >= 3)                                                                  personality = { icon:'🍜', name:'Food Tripper',         desc:'食い倒れ旅' };
  else if (sightCount >= 3)                                                                  personality = { icon:'🏛',  name:'Culture Seeker',       desc:'観光・文化系の旅' };
  else if (trainRatio >= 0.3)                                                               personality = { icon:'🚃', name:'Rail Explorer',        desc:'鉄道中心の周遊旅' };
  else if (walkRatio  >= 0.25)                                                              personality = { icon:'🚶', name:'Local Wanderer',       desc:'徒歩中心で街を楽しむ旅' };
  else                                                                                       personality = { icon:'🗺',  name:'Free Traveler',        desc:'スタイルにとらわれない自由な旅' };

  /* ── Vibe ── */
  var transportVariety = Object.keys(ridesByType).length;
  var urbanRides = ['bus_local','train_local','walk','shinkansen','train_limited','bus_express']
    .reduce(function(a,k){return a+(ridesByType[k]||0);}, 0);
  var urbanRatio = urbanRides / Math.max(1, totalRides);
  var ferryRidesCount = ridesByType.ferry || 0;
  var vibe;
  if (ferryRatio >= 0.15 || ferryRidesCount >= 3) {
    vibe = { icon: '🏝', label: 'Island' };
  } else if (totalDist > 300 && transportVariety >= 3) {
    vibe = { icon: '🌲', label: 'Adventure' };
  } else if (urbanRatio > 0.55) {
    vibe = { icon: '🏙', label: 'Urban' };
  } else {
    vibe = { icon: '🌿', label: 'Relaxed' };
  }

  /* ── Story ── */
  var STORY_MAP = {
    'Island Hopper':     'フェリーと海風に乗り、島から島へ渡る旅',
    'Rail Explorer':     '鉄道で駆け抜ける、線路の先に広がる旅',
    'Local Wanderer':    '路地を歩いて街に溶け込む、足で刻む旅',
    'Event Chaser':      'ライブや祭りを追いかける、熱量の旅',
    'Food Tripper':      'ご当地の味を食べ歩く、美食の旅',
    'Culture Seeker':    '歴史と文化の深みを探る旅',
    'Culture Explorer':  '聖地と史跡を巡る、知の旅',
    'Relaxation Seeker': '温泉と宿でゆったり過ごす、癒しの旅',
    'Pilgrimage Walker': '聖地を歩いて巡る、静かな巡礼の旅',
    'Free Traveler':     '移動の記録が、旅の作品になった',
  };
  var story = STORY_MAP[personality.name] || '移動の記録が、旅の作品になった';

  /* ── Achievements ── */
  var achievements = [];
  var walkDist = distByType.walk || 0;
  var busRides = (ridesByType.bus_local||0) + (ridesByType.bus_express||0);
  var ferryRides = ridesByType.ferry || 0;
  var localTrainRides = ridesByType.train_local || 0;
  if (walkDist >= 10)          achievements.push({ icon:'🐕', name:'おさんぽ名人',       desc:'徒歩移動 10km 以上' });
  if ((catCount.cafe||0) >= 5) achievements.push({ icon:'☕', name:'カフェ難民',         desc:'カフェ 5件以上' });
  if (localTrainRides >= 10)   achievements.push({ icon:'🚉', name:'途中下車の達人',      desc:'普通列車 10乗車以上' });
  if (busRides >= 8)           achievements.push({ icon:'🚌', name:'バス沼住人',          desc:'バス 8乗車以上' });
  if (ferryRides >= 5)         achievements.push({ icon:'🚢', name:'船酔いチャレンジャー', desc:'フェリー 5乗船以上' });

  return { totalDays: days.length, totalStops: allStops.length, totalDist: totalDist,
           distByType: distByType, ridesByType: ridesByType, catCount: catCount,
           rhythmNorm: rhythmNorm, rhythmLabel: rhythmLabel,
           personality: personality, vibe: vibe, story: story,
           achievements: achievements, typeIcons: TYPE_ICONS, typeLabels: TYPE_LABELS };
}

function openProfileModal() {
  var stats = computeJourneyStats();
  document.getElementById('profileBody').innerHTML = renderProfileBody(stats);
  document.getElementById('profileModal').classList.add('open');
}
function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('open');
}

function renderProfileBody(st) {
  var h = '';

  /* ── Hero: Personality → Vibe + Rhythm → Story → Stats ── */
  h += '<div class="pf-hero">';
  h += '<div class="pf-eyebrow">Journey Log</div>';
  h += '<div class="pf-title">'+escHtml(TRIP.title)+'</div>';
  h += '<div class="pf-subtitle">'+escHtml(TRIP.subtitle)+'</div>';

  h += '<div class="pf-pers-hero-icon">'+st.personality.icon+'</div>';
  h += '<div class="pf-pers-hero-name">'+escHtml(st.personality.name)+'</div>';

  h += '<div class="pf-chips-row">';
  h += '<span class="pf-chip pf-chip-vibe">'+st.vibe.icon+' '+escHtml(st.vibe.label)+'</span>';
  h += '<span class="pf-chip pf-chip-rhythm">'+escHtml(st.rhythmLabel)+'</span>';
  h += '</div>';

  h += '<div class="pf-story">'+escHtml(st.story)+'</div>';

  h += '<div class="pf-stats-row">';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+Math.round(st.totalDist)+'</div><span class="pf-stat-unit">km</span></div>';
  h += '<div class="pf-stat-div"></div>';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+st.totalDays+'</div><span class="pf-stat-unit">Days</span></div>';
  h += '<div class="pf-stat-div"></div>';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+st.totalStops+'</div><span class="pf-stat-unit">Stops</span></div>';
  h += '</div>';
  h += '</div>'; /* pf-hero */

  /* ── Transport Mix ── */
  var types = Object.keys(st.ridesByType).sort(function(a,b){ return st.ridesByType[b]-st.ridesByType[a]; });
  if (types.length) {
    var maxRides = Math.max.apply(null, types.map(function(t){ return st.ridesByType[t]; }));
    var totalRides = types.reduce(function(a,t){return a+st.ridesByType[t];}, 0);
    h += '<div class="pf-section"><div class="pf-section-label">Transport Mix</div>';
    types.forEach(function(type) {
      var rides = st.ridesByType[type];
      var dist  = Math.round(st.distByType[type] || 0);
      var pct   = Math.round(rides / totalRides * 100);
      var barW  = Math.round(rides / maxRides * 100);
      h += '<div class="pf-bar-row">';
      h += '<span class="pf-bar-icon">'+(st.typeIcons[type]||'·')+'</span>';
      h += '<span class="pf-bar-name">'+(st.typeLabels[type]||type)+'</span>';
      h += '<div class="pf-bar-track"><div class="pf-bar-fill" style="width:'+barW+'%"></div></div>';
      h += '<span class="pf-bar-pct">'+pct+'%</span>';
      h += '<span class="pf-bar-rides">'+rides+' · '+dist+'km</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  /* ── Activity Mix ── */
  var cats = Object.keys(st.catCount).sort(function(a,b){ return st.catCount[b]-st.catCount[a]; });
  if (cats.length) {
    h += '<div class="pf-section"><div class="pf-section-label">Activity Mix</div>';
    cats.forEach(function(cat) {
      var cfg = CATEGORIES[cat]; if(!cfg) return;
      h += '<div class="pf-act-row">';
      h += '<span class="pf-act-icon">'+cfg.icon+'</span>';
      h += '<span class="pf-act-name">'+cfg.label+'</span>';
      h += '<span class="pf-act-count">'+st.catCount[cat]+'</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  /* ── Achievements ── */
  if (st.achievements.length) {
    h += '<div class="pf-section"><div class="pf-section-label">Achievements</div>';
    st.achievements.forEach(function(a) {
      h += '<div class="pf-achievement">';
      h += '<span class="pf-ach-icon">'+a.icon+'</span>';
      h += '<div class="pf-ach-info"><div class="pf-ach-name">'+escHtml(a.name)+'</div><div class="pf-ach-desc">'+escHtml(a.desc)+'</div></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  return h;
}

/* ─── Init ─── */
loadFromStorage();
_setPaletteVars(TRIP.palette || 'tropical');
renderHeader();
renderDayTabs();
switchDay(currentDay);
loadDefaultGtfsDb();
requestAnimationFrame(function() {
  requestAnimationFrame(function() {
    if (isMobile()) setSheet('peek', false);
  });
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.card-menu-wrap')) closeCardMenu();
});

</script>
