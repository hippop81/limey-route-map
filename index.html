<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄遠征ルートマップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --primary:    #222222;
  --secondary:  #777777;
  --lime:       #C5E84A;
  --peacock:    #007A8A;
  --soft-lime:  #E8F5C0;
  --cream:      #F7F5EE;
  --warm-gray:  #D9D6CC;
  --light-gray: #EEEEEE;
  --white:      #FFFFFF;
  --font-head:  "DM Sans", "Helvetica Neue", sans-serif;
  --font-body:  "Space Grotesk", Helvetica, sans-serif;
  --ease:       cubic-bezier(0.25, 0.8, 0.25, 1);
  --dur:        220ms;
  --radius:     8px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--primary);
  height: 100dvh;
  display: flex;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Sidebar ── */
.sidebar {
  width: 308px; min-width: 308px;
  background: var(--cream);
  border-right: 1px solid var(--warm-gray);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
  position: relative;
}
.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--warm-gray);
  background: var(--white);
  flex-shrink: 0;
}
.sidebar-header-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.header-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; position: relative; }
/* More menu dropdown */
.more-menu {
  display: none; position: absolute; right: 0; top: calc(100% + 6px);
  background: var(--white); border: 1px solid var(--warm-gray);
  border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.14);
  padding: 5px; min-width: 148px; z-index: 200; flex-direction: column; gap: 2px;
}
.more-menu.open { display: flex; }
.more-menu-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 7px; background: transparent; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); text-align: left; white-space: nowrap; width: 100%;
}
.more-menu-item:hover { background: var(--soft-lime); color: var(--peacock); }
.eyebrow {
  font-family: var(--font-body);
  font-size: 10px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--peacock); margin-bottom: 4px;
  display: flex; align-items: center; gap: 7px;
}
.eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--lime); flex-shrink: 0; }
.app-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1.25; }
.title-accent { background: var(--lime); padding: 0 5px 1px; border-radius: 3px; }

.edit-toggle-btn {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--secondary); background: transparent;
  border: 1.5px solid var(--warm-gray); border-radius: 6px;
  padding: 5px 10px; cursor: pointer; transition: all .2s;
  white-space: nowrap; flex-shrink: 0;
}
.edit-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
.edit-toggle-btn.on { background: var(--lime); border-color: transparent; color: var(--primary); }

.settings-btn {
  font-family: var(--font-body); font-size: 14px;
  color: var(--secondary); background: transparent;
  border: 1.5px solid var(--warm-gray); border-radius: 6px;
  padding: 5px 8px; cursor: pointer; transition: all .2s;
  flex-shrink: 0; line-height: 1;
}
.settings-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Day tabs ── */
.day-tabs { display: flex; border-bottom: 1px solid var(--warm-gray); background: var(--white); flex-shrink: 0; }
.day-tab {
  flex: 1; padding: 10px 6px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--secondary); cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  transition: all var(--dur) var(--ease);
  line-height: 1.5; text-align: center;
}
.day-tab:hover { color: var(--primary); background: var(--cream); }
.day-tab.active { color: var(--peacock); border-bottom-color: var(--peacock); background: var(--cream); }

/* ── Timeline ── */
.timeline {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  scrollbar-width: thin; scrollbar-color: var(--warm-gray) var(--cream);
}
.timeline::-webkit-scrollbar { width: 3px; }
.timeline::-webkit-scrollbar-thumb { background: var(--warm-gray); border-radius: 2px; }

.stop-row { display: flex; gap: 10px; cursor: pointer; }
.stop-row:hover .stop-card { border-color: var(--peacock); box-shadow: 0 2px 8px rgba(0,122,138,.08); }
.stop-row.active .stop-card {
  border-color: var(--peacock); border-left-width: 3px;
  background: var(--white); box-shadow: 0 2px 12px rgba(0,122,138,.12);
}
.stop-row.passed .stop-card { background: var(--soft-lime); border-color: rgba(149,186,32,.45); }
.stop-row.passed .stop-time  { color: #6b8a00; }
.stop-row.passed .stop-name  { color: #3d5000; }
.stop-row.passed .stop-desc  { color: #7a9a10; }

.stop-spine { display: flex; flex-direction: column; align-items: center; min-width: 16px; padding-top: 14px; }
.stop-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warm-gray); flex-shrink: 0; transition: all .25s; }
.stop-row.active .stop-dot { background: var(--peacock); width: 11px; height: 11px; margin-left: -1px; box-shadow: 0 0 0 3px rgba(0,122,138,.15); }
.stop-row.passed .stop-dot { background: var(--lime); border: 1.5px solid #93b820; box-shadow: 0 0 0 2px rgba(197,232,74,.3); }
.stop-seg { width: 1px; flex: 1; background: var(--warm-gray); min-height: 14px; transition: background .4s; }
.stop-seg.passed { background: var(--lime); }
.stop-seg.t-bike { border-left: 1px dashed var(--warm-gray); background: transparent; }
.stop-seg.t-bike.passed { border-left-color: var(--lime); background: transparent; }
.stop-seg.t-walk { border-left: 1px dotted var(--warm-gray); background: transparent; }
.stop-seg.t-walk.passed { border-left-color: var(--lime); background: transparent; }

.stop-card {
  flex: 1; padding: 9px 11px;
  border: 1px solid var(--light-gray); border-radius: var(--radius);
  margin-bottom: 0; background: var(--white);
  transition: all .25s var(--ease);
  position: relative;
}
.stop-time  { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--secondary); margin-bottom: 1px; }
.stop-row.active .stop-time { color: var(--peacock); }
.stop-name  { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 3px; line-height: 1.3; }
.stop-desc  { font-size: 11px; color: var(--secondary); margin-bottom: 5px; line-height: 1.5; }
.transport-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.badge { font-family: var(--font-body); font-size: 9px; font-weight: 600; letter-spacing: .04em; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
.b-transport { background: rgba(0,122,138,.08); color: var(--peacock); border: 1px solid rgba(0,122,138,.3); }
.label-tag { font-family: var(--font-body); font-size: 10px; color: var(--secondary); }
.price-tag { font-family: var(--font-body); font-size: 10px; font-weight: 700; color: var(--primary); }
.dur-tag   { font-family: var(--font-body); font-size: 9px; color: var(--warm-gray); margin-left: auto; }
.rhythm-pill { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-body); font-size: 8px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--warm-gray); margin-top: 5px; }
.rhythm-pill .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--warm-gray); }

/* ── Edit mode card ⋮ menu ── */
.card-menu {
  display: none; position: absolute; top: 4px; right: 4px;
  align-items: center; gap: 2px;
}
.timeline.edit-mode .card-menu { display: flex; }
.card-menu-btn {
  width: 24px; height: 24px; border-radius: 5px; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--secondary); transition: all .15s;
  line-height: 1;
}
.card-menu-btn:hover { background: rgba(0,0,0,.06); color: var(--primary); }
.card-menu-wrap { position: relative; }
.card-menu-dropdown {
  display: none; position: absolute; top: 28px; right: 0; z-index: 300;
  background: var(--white); border: 1px solid var(--warm-gray);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.14);
  min-width: 148px;
}
.card-menu-dropdown.open { display: block; }
.card-menu-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 14px; border: none; background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); cursor: pointer; text-align: left;
  transition: background .12s; white-space: nowrap;
}
.card-menu-item + .card-menu-item { border-top: 1px solid var(--light-gray); }
.card-menu-item:hover { background: var(--soft-lime); }
.card-menu-item.danger { color: #c04444; }
.card-menu-item.danger:hover { background: rgba(192,68,68,.06); }
.card-menu-sub { border-top: 1px solid var(--light-gray); }
.card-menu-sub-item {
  padding: 8px 14px 8px 28px; font-size: 11px; color: var(--secondary);
}
.card-menu-sub-item:hover { color: var(--peacock); background: var(--soft-lime); }

/* ── Edit mode tabs ── */
.edit-tab-bar {
  display: none; border-bottom: 2px solid var(--light-gray);
  padding: 0 12px; background: var(--white); flex-shrink: 0;
}
.edit-tab {
  padding: 7px 14px; border: none; background: transparent;
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--secondary); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all .15s;
}
.edit-tab.active { color: var(--peacock); border-bottom-color: var(--peacock); }

/* ── Day edit panel ── */
.day-edit-panel {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
}

/* ── Cost bar totals ── */
.cost-total { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--peacock); }

.add-row {
  display: none; justify-content: center;
  margin: 4px 0 8px 26px;
}
.timeline.edit-mode .add-row { display: flex; }
.btn-add-stop {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--secondary); background: transparent;
  border: 1.5px dashed var(--warm-gray); border-radius: 6px;
  padding: 5px 12px; cursor: pointer; transition: all .2s;
  justify-content: center;
}
.btn-add-stop:hover { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.03); }

/* ── Cost bar ── */
.cost-bar {
  padding: 9px 16px; border-top: 1px solid var(--warm-gray);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--soft-lime); flex-shrink: 0;
}
.cost-label { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #556b00; }
.cost-num   { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--primary); }

/* ── Controls ── */
.controls {
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  border-top: 1px solid var(--warm-gray);
  display: flex; flex-direction: column; gap: 8px;
  background: var(--white); flex-shrink: 0;
}
/* ── Seek bar row ── */
.ctrl-seek-row { display: flex; flex-direction: column; gap: 5px; }
.ctrl-seek {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--peacock) var(--seek-pct,0%), var(--warm-gray) var(--seek-pct,0%));
}
.ctrl-seek::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--peacock); border: 2px solid var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,.22); cursor: pointer;
}
.ctrl-seek::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--peacock); border: 2px solid var(--white);
  box-shadow: 0 1px 4px rgba(0,0,0,.22); cursor: pointer;
}
.ctrl-seek-meta { display: flex; align-items: center; justify-content: space-between; }
.ctrl-seek-label { font-family: var(--font-body); font-size: 9px; font-weight: 600; color: var(--secondary); letter-spacing: .04em; }
.ctrl-speed-chips { display: flex; gap: 4px; }
.speed-chip {
  font-family: var(--font-body); font-size: 9px; font-weight: 700;
  letter-spacing: .04em; padding: 2px 7px; border-radius: 20px;
  border: 1.5px solid var(--light-gray); background: transparent;
  color: var(--secondary); cursor: pointer; transition: all .15s;
}
.speed-chip.sel { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.08); }
/* ── Button row ── */
.ctrl-btn-row { display: flex; gap: 6px; }
.btn {
  flex: 1; padding: 8px 10px;
  border-radius: var(--radius); border: 1.5px solid; cursor: pointer;
  font-family: var(--font-body); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  transition: all var(--dur) var(--ease);
}
.btn-play { background: var(--peacock); border-color: var(--peacock); color: var(--white); }
.btn-play:hover { background: #006475; }
.btn-play.playing { background: var(--white); border-color: var(--peacock); color: var(--peacock); }
.btn-step {
  flex: 0 0 34px; padding: 8px 0;
  background: var(--soft-lime); border-color: var(--warm-gray); color: var(--peacock);
  font-size: 13px;
}
.btn-step:hover { border-color: var(--peacock); background: var(--lime); }
.btn-reset { background: transparent; border-color: var(--warm-gray); color: var(--secondary); }
.btn-reset:hover { border-color: var(--primary); color: var(--primary); }

/* ── Edit panel (slides over sidebar) ── */
.edit-panel {
  position: absolute; inset: 0; z-index: 30;
  background: var(--cream);
  display: flex; flex-direction: column;
  transform: translateX(102%);
  transition: transform 0.3s var(--ease);
}
.edit-panel.open { transform: translateX(0); }

/* ── Settings panel ── */
.settings-panel {
  position: absolute; inset: 0; z-index: 32;
  background: var(--cream);
  display: flex; flex-direction: column;
  transform: translateX(102%);
  transition: transform 0.3s var(--ease);
}
.settings-panel.open { transform: translateX(0); }

.ep-header {
  padding: 14px 16px;
  background: var(--white); border-bottom: 1px solid var(--warm-gray);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.ep-back {
  font-family: var(--font-body); font-size: 11px; font-weight: 600;
  color: var(--peacock); background: transparent; border: none;
  cursor: pointer; padding: 0; display: flex; align-items: center; gap: 3px;
}
.ep-back:hover { color: #006475; }
.ep-title {
  font-family: var(--font-head); font-size: 14px; font-weight: 700;
  color: var(--primary); flex: 1;
}

.ep-body { flex: 1; overflow-y: auto; padding: 16px; }

.ep-section { margin-bottom: 18px; }
.ep-section-label {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--secondary); margin-bottom: 10px; display: block;
}
.ep-field { margin-bottom: 10px; }
.ep-lbl {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--secondary); margin-bottom: 4px; display: block;
}
.ep-input, .ep-textarea {
  width: 100%; font-family: var(--font-body); font-size: 12px;
  color: var(--primary); background: var(--white);
  border: 1px solid var(--light-gray); border-radius: 6px;
  padding: 8px 10px; outline: none; transition: border-color .2s;
}
.ep-textarea { resize: vertical; min-height: 58px; line-height: 1.5; }
.ep-input:focus, .ep-textarea:focus { border-color: var(--peacock); }
.ep-row { display: flex; gap: 8px; }
.ep-row .ep-field { flex: 1; }

.type-groups { display: flex; flex-direction: column; gap: 6px; }
.type-group-row { display: flex; flex-wrap: wrap; gap: 5px; }
.type-group-label {
  font-family: var(--font-body); font-size: 8px; font-weight: 700;
  letter-spacing: .10em; text-transform: uppercase;
  color: var(--secondary); opacity: .5; padding: 0 2px; margin-top: 2px;
}
.type-chip {
  font-family: var(--font-body); font-size: 9px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 20px;
  border: 1.5px solid var(--light-gray);
  background: transparent; color: var(--secondary);
  cursor: pointer; transition: all .18s;
}
.type-chip.sel { border-color: var(--peacock); color: var(--peacock); background: rgba(0,122,138,.08); }

.cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.cat-chip {
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  background: var(--cream); border: 1.5px solid var(--warm-gray);
  border-radius: 20px; padding: 4px 10px; cursor: pointer;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  color: var(--primary);
}
.cat-chip.sel { background: var(--lime); border-color: transparent; }
.cat-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  color: var(--peacock); background: var(--soft-lime);
  border-radius: 10px; padding: 1px 7px 1px 5px;
  margin-top: 3px;
}
@keyframes cat-arrive {
  0%   { transform: scale(1);   opacity: .85; }
  100% { transform: scale(4.0); opacity: 0; }
}

.ep-coord-row { display: flex; gap: 6px; }
.ep-coord-row .ep-input { font-size: 11px; }
.ep-pick-btn {
  flex-shrink: 0; padding: 8px 10px;
  background: var(--cream); border: 1px solid var(--warm-gray);
  border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all .2s; white-space: nowrap; line-height: 1;
}
.ep-pick-btn:hover { background: var(--soft-lime); border-color: var(--peacock); }
.ep-pick-btn.picking { background: var(--lime); border-color: transparent; }

/* ── Drag reorder ── */
.drag-handle { font-size: 14px; color: var(--secondary); cursor: grab; padding: 0 5px; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.stop-row.dragging { opacity: 0.3; }
.stop-row.drag-over .stop-card { border-color: var(--peacock) !important; background: var(--soft-lime) !important; outline: 2px dashed var(--peacock); }
/* ── Move to Day ── */
.ep-dur-row { display: flex; align-items: center; gap: 6px; }
.ep-dur-input { width: 56px !important; text-align: center; }
.ep-dur-sep { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--secondary); white-space: nowrap; }
.ep-move-wrap { margin: 0 0 4px; }
.ep-move-btn {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1.5px dashed var(--warm-gray); background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--secondary); cursor: pointer; text-align: left; transition: all .15s;
  display: flex; justify-content: space-between; align-items: center;
}
.ep-move-btn:hover { border-color: var(--peacock); color: var(--peacock); }
.ep-move-menu {
  display: none; margin-top: 4px; border: 1px solid var(--warm-gray);
  border-radius: 8px; overflow: hidden;
}
.ep-move-menu.open { display: block; }
.ep-move-item {
  display: block; width: 100%; padding: 11px 14px; text-align: left; border: none;
  border-bottom: 1px solid var(--light-gray); background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  color: var(--primary); cursor: pointer; transition: background .12s;
}
.ep-move-item:last-child { border-bottom: none; }
.ep-move-item:hover { background: var(--soft-lime); color: var(--peacock); }
.ep-footer {
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
  border-top: 1px solid var(--warm-gray);
  background: var(--white);

var _DEFAULT_DAYS = JSON.parse(JSON.stringify(DAYS));

/* ─── Category config ─── */
var CATEGORIES = {
  food:        { icon: '🍜', label: 'Food',        pauseMs: 2200 },

};
var epCategories = [];

/* ─── localStorage ─── */
var STORAGE_KEY = 'limey-route-data';

function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ trip: TRIP, days: DAYS })); } catch(e) {}
}
function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (data.trip) {
      TRIP.title    = data.trip.title    || TRIP.title;
      TRIP.subtitle = data.trip.subtitle !== undefined ? data.trip.subtitle : TRIP.subtitle;
      TRIP.palette  = data.trip.palette  || TRIP.palette;
    }
    if (data.days) {
      DAYS = {};
      Object.keys(data.days).forEach(function(k) { DAYS[parseInt(k)] = data.days[k]; });
      _migrateDays(DAYS);
    }
    return true;
  } catch(e) { return false; }
}

/* ─── Palette ─── */
function _setPaletteVars(id) {
  var p = PALETTES.filter(function(x){ return x.id === id; })[0] || PALETTES[0];

function triggerImport() {

  document.getElementById('importFileInput').click();

function handleImport(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);

      /* ── Validation (fail early, never touch localStorage) ── */
      if (!data.days || typeof data.days !== 'object') {
        alert('読み込みエラー: daysフィールドがありません。有効なルートマップJSONを選択してください。'); return;
      }
      var errs = [];
      Object.keys(data.days).forEach(function(k) {
        var day = data.days[k];
        if (!day.stops || !Array.isArray(day.stops)) { errs.push('Day ' + k + ': stops が配列ではありません'); return; }
        day.stops.forEach(function(s, i) {
          if (!s.name)             errs.push('Day ' + k + ' Stop ' + (i+1) + ': name が未設定');
          if (s.lat == null || s.lng == null) errs.push('Day ' + k + ' Stop ' + (i+1) + ': 座標(lat/lng)が未設定');
        });
      });
      if (errs.length) {
        alert('読み込みエラー:\n' + errs.slice(0, 6).join('\n') + (errs.length > 6 ? '\n…他 ' + (errs.length - 6) + ' 件' : '')); return;
      }
      var sv = parseFloat(data.schemaVersion || '0');
      if (sv > 0 && sv < 5.0 && !confirm('古いバージョン (schemaVersion ' + data.schemaVersion + ') のデータです。続けますか？')) return;

      /* ── Import (only reached if validation passed) ── */
      if (data.trip) {
        TRIP.title    = data.trip.title    || TRIP.title;
        TRIP.subtitle = data.trip.subtitle !== undefined ? data.trip.subtitle : TRIP.subtitle;
      }
      DAYS = {};
      Object.keys(data.days).forEach(function(k) { DAYS[parseInt(k)] = data.days[k]; });
      _migrateDays(DAYS);
      var firstDay = parseInt(Object.keys(DAYS).sort(function(a,b){return a-b;})[0]) || 1;
      saveToStorage();
      renderHeader();
      currentDay = firstDay;
      renderDayTabs();
      switchDay(firstDay);
      closeSettings();
    } catch(err) { alert('JSONの読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
}

function handleGtfsImport(e) {

    try {
      var arr = JSON.parse(ev.target.result);
      if (!Array.isArray(arr)) arr = [arr];
      var added = 0;
      arr.forEach(function(entry) {
        if (!entry.name || !entry.stops || !entry.types) return;
        var key = entry.name.replace(/[\s　]/g, '_').toLowerCase();
        if (!entry.shape) entry.shape = entry.stops.map(function(s){ return [s.lat, s.lng]; });
        GTFS_DB[key] = entry;
        added++;
      });
      if (!added) { alert('有効な GTFS エントリが見つかりませんでした'); return; }
      stopAnim(); playing = false; setPlayBtn(false); currentStop = -1;
      removeCurrentPin();
      initRouteLines();

      alert(added + ' 路線を読み込みました');

}

function findGtfsShape(fromLat, fromLng, toLat, toLng, type) {
  var THRESHOLD = 0.5;
  var keys = Object.keys(GTFS_DB);
  for (var ki = 0; ki < keys.length; ki++) {
    var db = GTFS_DB[keys[ki]];
    if (db.types.indexOf(type) < 0) continue;
    var fromIdx = -1, toIdx = -1, fromDist = Infinity, toDist = Infinity;
    for (var si = 0; si < db.stops.length; si++) {
      var s = db.stops[si];
      var d1 = haversineKm(fromLat, fromLng, s.lat, s.lng);
      var d2 = haversineKm(toLat,   toLng,   s.lat, s.lng);
      if (d1 < fromDist) { fromDist = d1; fromIdx = si; }
      if (d2 < toDist)   { toDist   = d2; toIdx   = si; }
    }
    if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) continue;
    if (fromDist > THRESHOLD || toDist > THRESHOLD) continue;
    var pts = fromIdx < toIdx
      ? db.shape.slice(fromIdx, toIdx + 1)
      : db.shape.slice(toIdx, fromIdx + 1).reverse();
    if (pts.length >= 2) return pts;
  }
  return null;
}

function polylineInterp(pts, t) {
  if (t <= 0) return pts[0];
  if (t >= 1) return pts[pts.length - 1];
  var dists = [0];
  for (var i = 1; i < pts.length; i++)
    dists.push(dists[i-1] + haversineKm(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1]));
  var total = dists[dists.length - 1], target = t * total;
  for (var i = 1; i < pts.length; i++) {
    if (dists[i] >= target) {
      var st = (dists[i] - dists[i-1]) > 0 ? (target - dists[i-1]) / (dists[i] - dists[i-1]) : 0;
      return [pts[i-1][0] + (pts[i][0] - pts[i-1][0]) * st,
              pts[i-1][1] + (pts[i][1] - pts[i-1][1]) * st];
    }
  }
  return pts[pts.length - 1];
}

function slicePolylineAt(pts, t) {
  if (t >= 1) return pts;
  if (t <= 0) return [pts[0], pts[0]];
  var dists = [0];
  for (var i = 1; i < pts.length; i++)
    dists.push(dists[i-1] + haversineKm(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1]));
  var total = dists[dists.length - 1], target = t * total;
  var result = [pts[0]];
  for (var i = 1; i < pts.length; i++) {
    if (dists[i] <= target) {
      result.push(pts[i]);
    } else {
      var st = (dists[i] - dists[i-1]) > 0 ? (target - dists[i-1]) / (dists[i] - dists[i-1]) : 0;
      result.push([pts[i-1][0] + (pts[i][0] - pts[i-1][0]) * st,
                   pts[i-1][1] + (pts[i][1] - pts[i-1][1]) * st]);
      break;
    }
  }
  return result;
}

/* ─── Easing ─── */
function ease(t, n) { if(n==='linear') return t; if(n==='easeOut') return t*(2-t); return t<.5?2*t*t:-1+(4-2*t)*t; }

/* ─── Bezier helpers ─── */
function bezierPt(p0, c, p1, t) { var m=1-t; return [m*m*p0[0]+2*m*t*c[0]+t*t*p1[0], m*m*p0[1]+2*m*t*c[1]+t*t*p1[1]]; }
function ctrlPt(f,t,b)  { var dl=t[0]-f[0],dn=t[1]-f[1]; return [(f[0]+t[0])/2-dn*b,(f[1]+t[1])/2+dl*b]; }

function fullSegPts(fi, ti) {
  if (segShapes[fi]) return segShapes[fi];
  var s=DAYS[currentDay].stops, f=[s[fi].lat,s[fi].lng], t=[s[ti].lat,s[ti].lng], c=tcfg(s[fi].transport);
  if(!c.curve) return [f,t];
  var ctrl=ctrlPt(f,t,c.curve), pts=[];
  for(var i=0;i<=48;i++) pts.push(bezierPt(f,ctrl,t,i/48));
  return pts;
}
function partialSegPts(fi, te) {
  if (segShapes[fi]) return slicePolylineAt(segShapes[fi], te);
  var s=DAYS[currentDay].stops, f=[s[fi].lat,s[fi].lng], t=[s[fi+1].lat,s[fi+1].lng], c=tcfg(s[fi].transport);
  if(!c.curve) return [f,[f[0]+(t[0]-f[0])*te,f[1]+(t[1]-f[1])*te]];
  var ctrl=ctrlPt(f,t,c.curve), N=Math.max(3,Math.ceil(te*36)), pts=[];
  for(var i=0;i<=N;i++) pts.push(bezierPt(f,ctrl,t,(i/N)*te));
  return pts;
}

    var dragHandle = editMode ? '<span class="drag-handle" draggable="false" ondragstart="event.stopPropagation()">⠿</span>' : '';

/* ─── Jump ─── */
function jumpTo(i) {
  stopAnim(); playing=false; setPlayBtn(false); currentStop=i;
  removeCurrentPin(); renderMapMarkers(); renderTimeline(); updateAllProgress();
  updatePeekInfo();
  var s=DAYS[currentDay].stops[i];
  map.flyTo([s.lat,s.lng],13,{duration:.7});
  if(mapMarkers[i]) mapMarkers[i].openPopup();
  scrollToCard(i);
  if(isMobile() && sheetState==='peek') setSheet('half');
}
function scrollToCard(i) { var el=document.getElementById('sr'+i); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }

/* ─── Playback ─── */
function startPlay() {
  var stops=DAYS[currentDay].stops;
  if(currentStop<0) {
    currentStop=0; renderMapMarkers(); renderTimeline(); updateAllProgress();
    var s0=stops[0]; moveCurrentPin(s0.lat,s0.lng,s0.transport);
    map.flyTo([s0.lat,s0.lng],13,{duration:.5});
    if(mapMarkers[0]) mapMarkers[0].openPopup();
    scrollToCard(0);
    anim.pauseTimer=setTimeout(function(){if(playing)animNext();},tcfg(s0.transport).pauseMs/playbackSpeed);
    return;
  }
  if(currentStop>=stops.length-1){finishPlay();return;}
  animNext();
}
function _cameraFollow(f, t, c, ctrlPt_) {
  var rhythm = c.rhythmLabel;
  if (rhythm === 'air' || rhythm === 'sea') {
    var bounds = L.latLngBounds([f, t]);
    if (ctrlPt_) bounds.extend(ctrlPt_);
    map.fitBounds(bounds.pad(0.35), { maxZoom: 9, animate: true, duration: 1.2 });
  } else if (rhythm === 'trail' || rhythm === 'stroll') {
    map.flyTo([(f[0]+t[0])/2,(f[1]+t[1])/2], 16, { animate: true, duration: 0.7 });
  } else {
    map.flyTo([(f[0]+t[0])/2,(f[1]+t[1])/2], 13, { animate: true, duration: 0.8 });
  }
}
function animNext() {
  var stops=DAYS[currentDay].stops, from=stops[currentStop], to=stops[currentStop+1], c=tcfg(from.transport);
  var f=[from.lat,from.lng],t=[to.lat,to.lng];
  anim.active=true; anim.fromIdx=currentStop; anim.toIdx=currentStop+1;
  anim.fromPt=f; anim.toPt=t;
  anim.shapePts = segShapes[currentStop] || null;
  anim.ctrlPt = (!anim.shapePts && c.curve) ? ctrlPt(f,t,c.curve) : null;
  anim.easing=c.easing; anim.pauseMs=c.pauseMs;
  var dl=t[0]-f[0],dn=t[1]-f[1],dist=Math.sqrt(dl*dl+dn*dn);
  anim.duration=Math.max(700,Math.min(2800,dist*4400))/c.speedMult/playbackSpeed;
  anim.startTime=performance.now();
  _cameraFollow(f, t, c, anim.ctrlPt);
  anim.raf=requestAnimationFrame(animTick);
}
function animTick(ts) {
  if(!anim.active) return;
  var t=Math.min(1,(ts-anim.startTime)/anim.duration), te=ease(t,anim.easing);
  var pos=anim.shapePts?polylineInterp(anim.shapePts,te):anim.ctrlPt?bezierPt(anim.fromPt,anim.ctrlPt,anim.toPt,te):[anim.fromPt[0]+(anim.toPt[0]-anim.fromPt[0])*te,anim.fromPt[1]+(anim.toPt[1]-anim.fromPt[1])*te];
  moveCurrentPin(pos[0],pos[1],DAYS[currentDay].stops[anim.fromIdx].transport);
  segProgressLines[anim.fromIdx].setLatLngs(partialSegPts(anim.fromIdx,te));
  if(t<1){anim.raf=requestAnimationFrame(animTick);return;}
  anim.active=false; currentStop=anim.toIdx;
  segProgressLines[anim.fromIdx].setLatLngs(fullSegPts(anim.fromIdx,anim.toIdx));
  renderMapMarkers(); renderTimeline(); scrollToCard(currentStop);
  updatePeekInfo();
  var arr=DAYS[currentDay].stops[currentStop];
  map.panTo([arr.lat,arr.lng],{animate:true,duration:.4});
  if(mapMarkers[currentStop]) mapMarkers[currentStop].openPopup();
  if(currentStop>=DAYS[currentDay].stops.length-1){finishPlay();return;}
  var _arr=DAYS[currentDay].stops[currentStop];
  var _cats=Array.isArray(_arr.categories)?_arr.categories:[];
  var _pauseMs=_cats.reduce(function(mx,k){var cfg=CATEGORIES[k];return cfg?Math.max(mx,cfg.pauseMs):mx;},anim.pauseMs);
  if(_cats.length) showCategoryArrivalPulse(_arr.lat,_arr.lng);
  anim.pauseTimer=setTimeout(function(){if(playing)animNext();},_pauseMs/playbackSpeed);
}
function stopAnim() {
  anim.active=false;
  if(anim.raf){cancelAnimationFrame(anim.raf);anim.raf=null;}
  if(anim.pauseTimer){clearTimeout(anim.pauseTimer);anim.pauseTimer=null;}
}
function finishPlay() { stopAnim();playing=false;removeCurrentPin();renderMapMarkers();setPlayBtn(false);updatePeekInfo(); }

/* ─── Playback controls ─── */
function setPlaybackSpeed(s) {
  playbackSpeed = s;
  document.querySelectorAll('.speed-chip').forEach(function(c) {
    c.classList.toggle('sel', parseFloat(c.dataset.speed) === s);
  });
}
function stepPrev() {
  if (currentStop <= 0) { resetAnim(); return; }
  jumpTo(currentStop - 1);
}
function stepNext() {
  var stops = DAYS[currentDay].stops;
  if (currentStop < 0) { jumpTo(0); return; }
  if (currentStop >= stops.length - 1) return;
  jumpTo(currentStop + 1);
}
function onSeekInput(val) {
  var idx = parseInt(val);
  var stops = DAYS[currentDay].stops;
  var bar = document.getElementById('seekBar');
  var lbl = document.getElementById('seekStopLabel');
  if (bar) { var pct = stops.length > 1 ? idx / (stops.length - 1) * 100 : 0; bar.style.setProperty('--seek-pct', pct + '%'); }
  if (lbl && idx >= 0 && idx < stops.length) lbl.textContent = (idx + 1) + ' / ' + stops.length + '  ' + stops[idx].name;
}
function onSeekChange(val) {
  var idx = parseInt(val);
  if (isNaN(idx) || idx < 0) return;
  jumpTo(idx);
}
function updateSeekBar() {
  var bar = document.getElementById('seekBar');
  var lbl = document.getElementById('seekStopLabel');
  var stops = DAYS[currentDay].stops;
  if (!bar) return;
  bar.max = stops.length - 1;
  var val = Math.max(0, currentStop);
  bar.value = val;
  var pct = stops.length > 1 ? val / (stops.length - 1) * 100 : 0;
  bar.style.setProperty('--seek-pct', (currentStop >= 0 ? pct : 0) + '%');
  if (lbl) {
    if (currentStop >= 0 && currentStop < stops.length)
      lbl.textContent = (currentStop + 1) + ' / ' + stops.length + '  ' + stops[currentStop].name;
    else
      lbl.textContent = stops.length + ' Stops';
  }
}

/* ─── Mobile / desktop ─── */
var _isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
function isMobile() { return window.innerWidth <= 768 || _isTouchDevice; }

/* ── Bottom sheet state ── */
var sheetState  = 'peek';
var sheetOffset = 0;
var PEEK_H = 76;

function setSheet(state, animate) {
  if (!isMobile()) return;
  sheetState = state;
  var sb = document.getElementById('sidebar');
  var h  = sb.offsetHeight || Math.round(window.innerHeight * 0.9);
  var halfH = Math.round(window.innerHeight * 0.5);
  var off = state === 'peek' ? h - PEEK_H
          : state === 'half' ? h - halfH
          : 0;
  sheetOffset = Math.max(0, off);
  if (animate === false) sb.style.transition = 'none';
  else sb.style.transition = 'transform 0.34s cubic-bezier(0.25,0.8,0.25,1)';
  sb.style.transform = 'translateY(' + sheetOffset + 'px)';
  updatePeekInfo();
}

function updatePeekInfo() {
  var d = DAYS[currentDay];
  var stopText = (currentStop >= 0 && currentStop < d.stops.length)
    ? d.stops[currentStop].name
    : d.stops.length + ' stops';
  var el;
  if ((el = document.getElementById('sdDay')))    el.textContent = 'Day ' + currentDay;
  if ((el = document.getElementById('sdStop')))   el.textContent = stopText;
  if ((el = document.getElementById('sdPlayBtn'))) {
    el.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    el.classList.toggle('playing', playing);
    el.style.paddingLeft = playing ? '0' : '2px';
  }
  updateSeekBar();
}

/* ── Touch drag ── */
var isDraggingSheet = false, touchStartY = null, touchOffsetStart = 0;

(function() {
  var dragEl = document.getElementById('sheetDragArea');

  dragEl.addEventListener('touchstart', function(e) {
    if (!isMobile()) return;
    isDraggingSheet = true;
    touchStartY = e.touches[0].clientY;
    touchOffsetStart = sheetOffset;
    document.getElementById('sidebar').style.transition = 'none';
  }, { passive: true });

  dragEl.addEventListener('click', function() {
    if (!isMobile()) return;
    if (sheetState === 'peek') setSheet('half');
    else if (sheetState === 'half') setSheet('full');
  });

  document.addEventListener('touchmove', function(e) {
    if (!isDraggingSheet || touchStartY === null) return;
    var sb  = document.getElementById('sidebar');
    var h   = sb.offsetHeight;
    var dy  = e.touches[0].clientY - touchStartY;
    var off = Math.max(0, Math.min(h - PEEK_H, touchOffsetStart + dy));
    sheetOffset = off;
    sb.style.transform = 'translateY(' + off + 'px)';
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isDraggingSheet) return;
    isDraggingSheet = false;
    if (touchStartY === null) return;
    var dy = e.changedTouches[0].clientY - touchStartY;
    touchStartY = null;
    var SNAP = 52;
    var next = sheetState;
    if      (dy >  SNAP) next = sheetState === 'full' ? 'half' : 'peek';
    else if (dy < -SNAP) next = sheetState === 'peek' ? 'half' : 'full';
    document.getElementById('sidebar').style.transition = 'transform 0.34s cubic-bezier(0.25,0.8,0.25,1)';
    setSheet(next);
  }, { passive: true });

  window.addEventListener('resize', function() {
    if (isMobile()) setSheet(sheetState, false);
    else {
      var sb = document.getElementById('sidebar');
      sb.style.transform = '';
      sb.style.transition = '';
    }
  });
})();

function openSidebar() {
  if (isMobile()) { setSheet('half'); }
  else { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); }
}
function closeSidebar() {
  if (isMobile()) { setSheet('peek'); }
  else { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); }
}

function openEP(idx, insertAfter) {
  epIdx         = idx;
  epInsertAfter = (idx >= 0) ? -1 : insertAfter;

  var s = idx >= 0 ? DAYS[currentDay].stops[idx] : null;
  document.getElementById('ef-time').value     = s ? s.time     : '';
  document.getElementById('ef-name').value     = s ? s.name     : '';
  document.getElementById('ef-memo').value     = s ? (s.memo || '') : '';
  document.getElementById('ef-label').value    = s ? (s.label || '') : '';
  document.getElementById('ef-fare').value     = s ? (s.fare || '') : '';
  document.getElementById('ef-dur-h').value = s && s.durHours ? String(s.durHours) : '';
  document.getElementById('ef-dur-m').value = s && s.durMins  ? String(s.durMins)  : '';
  document.getElementById('ef-lat').value      = s ? s.lat      : '';
  document.getElementById('ef-lng').value      = s ? s.lng      : '';
  document.getElementById('ef-is-day-end').checked = s ? !!s.isDayEnd : false;

  epType = s ? (s.transport || 'bus_local') : 'bus_local';
  refreshTypeChips();
  updateSearchContext();
  epCategories = s ? (Array.isArray(s.categories) ? s.categories.slice() : []) : [];
  refreshCategoryChips();

  document.getElementById('epTitle').textContent = idx >= 0 ? 'Stop を編集' : 'Stop を追加';
  document.getElementById('epDelBtn').style.display = idx >= 0 ? '' : 'none';

  document.getElementById('ef-name-err').classList.remove('show');
  document.getElementById('ef-coord-err').classList.remove('show');
  document.getElementById('ef-search').value = '';
  closeSearchResults();

  document.getElementById('editPanel').classList.add('open');
}

function closeEP() {
  document.getElementById('editPanel').classList.remove('open');

  removePickPreviewPin();
}

function epSave() {
  var name  = document.getElementById('ef-name').value.trim();
  var lat   = parseFloat(document.getElementById('ef-lat').value);
  var lng   = parseFloat(document.getElementById('ef-lng').value);
  var valid = true;

  if (!name) { document.getElementById('ef-name-err').classList.add('show'); document.getElementById('ef-name').focus(); valid = false; }
  else document.getElementById('ef-name-err').classList.remove('show');

  if (!lat || !lng || isNaN(lat) || isNaN(lng)) { document.getElementById('ef-coord-err').classList.add('show'); valid = false; }
  else document.getElementById('ef-coord-err').classList.remove('show');

  if (!valid) return;

  var newStop = {
    time:       document.getElementById('ef-time').value.trim() || '—',
    name:       name,
    memo:       document.getElementById('ef-memo').value.trim(),
    label:      document.getElementById('ef-label').value.trim(),
    transport:  epType,
    categories: epCategories.slice(),
    isDayEnd:   document.getElementById('ef-is-day-end').checked,
    fare:       document.getElementById('ef-fare').value.trim(),
    durHours:   parseInt(document.getElementById('ef-dur-h').value, 10) || 0,
    durMins:    parseInt(document.getElementById('ef-dur-m').value, 10) || 0,
    lat:        lat,
    lng:        lng
  };

  var stops = DAYS[currentDay].stops;
  var finalIdx;
  if (epIdx >= 0) {
    stops[epIdx] = newStop;
    finalIdx = epIdx;
  } else {
    var at = epInsertAfter + 1;
    stops.splice(at, 0, newStop);
    finalIdx = at;
  }

  stopAnim(); playing = false; currentStop = -1;
  removeCurrentPin(); setPlayBtn(false);

  saveToStorage();
  closeEP();
  renderTimeline();
  initRouteLines();
  renderMapMarkers();

  map.flyTo([newStop.lat, newStop.lng], 13, { duration: 0.6 });
  setTimeout(function() { if (mapMarkers[finalIdx]) mapMarkers[finalIdx].openPopup(); }, 700);
}

/* ── Duration helpers ── */
function formatDur(s) {
  var h = s.durHours ? parseInt(s.durHours, 10) : 0;
  var m = s.durMins  ? parseInt(s.durMins,  10) : 0;
  if (h && m) return h + 'h ' + m + 'm';
  if (h)      return h + 'h';
  if (m)      return m + 'm';
  return '';
}
function _parseDurationStr(str) {
  if (!str || !str.trim()) return null;
  var hm = str.match(/(\d+)\s*[hH時]/);
  var mm = str.match(/(\d+)\s*[mM分]/);
  if (hm || mm) return { h: hm ? parseInt(hm[1], 10) : 0, m: mm ? parseInt(mm[1], 10) : 0 };
  return null;
}
function _migrateDays(days) {
  Object.keys(days).forEach(function(k) {
    var day = days[k];
    if (!day.stops) return;
    day.stops.forEach(function(s) {
      if (s.duration !== undefined) {
        var parsed = _parseDurationStr(s.duration);
        if (parsed) {
          s.durHours = parsed.h;
          s.durMins  = parsed.m;
        } else if (s.duration.trim()) {
          s.memo = s.memo ? s.memo + '（' + s.duration + '）' : s.duration;
        }
        delete s.duration;
      }
    });
  });
}

/* ── 全角→半角 normalize ── */
function toHankaku(input) {
  input.value = input.value
    .replace(/[０-９]/g, function(c){ return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })
    .replace(/：/g, ':')
    .replace(/．/g, '.')
    .replace(/－/g, '-');
}

/* ── Fare auto-format ── */
function formatFareInput(input) {
  var raw = input.value.replace(/[¥,\s]/g, '');
  if (/^\d+$/.test(raw)) {
    input.value = '¥' + parseInt(raw, 10).toLocaleString('ja-JP');
  }
}

function onSearchInput() {
  var q = document.getElementById('ef-search').value.trim();

  _searchTimer = setTimeout(function() { doPlaceSearch(q); }, 380);

function doPlaceSearch(q, isFallback) {
  var ctx    = SEARCH_CTX[epType] || {};
  var suffix = (!isFallback && ctx.suffix) ? (' ' + ctx.suffix) : '';
  var query  = q + suffix;

  var box = document.getElementById('epSearchResults');
  box.innerHTML = '<div class="ep-search-msg">検索中…</div>';
  box.classList.add('open');

  var url = 'https://nominatim.openstreetmap.org/search?q=' +
    encodeURIComponent(query) + '&format=json&limit=6&accept-language=ja,en&addressdetails=0';
  fetch(url, { headers: { 'Accept-Language': 'ja,en' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.length && !isFallback && ctx.suffix) {
        doPlaceSearch(q, true);
      } else {
        renderSearchResults(data);
      }
    })
    .catch(function() {
      var box = document.getElementById('epSearchResults');
      if (box) box.innerHTML = '<div class="ep-search-msg">検索に失敗しました</div>';
    });
}

function renderSearchResults(data) {
  _searchResults = data || [];
  var box = document.getElementById('epSearchResults');
  if (!box) return;
  if (!_searchResults.length) {
    box.innerHTML = '<div class="ep-search-msg">結果が見つかりませんでした</div>';
    return;
  }
  var html = '';
  _searchResults.forEach(function(item, i) {
    var name  = item.name || item.display_name.split(',')[0].trim();
    var parts = item.display_name.split(', ');
    var addr  = parts.length > 1 ? parts.slice(1).join(', ') : '';
    if (addr.length > 52) addr = addr.substring(0, 50) + '…';
    html += '<div class="ep-search-item" onmousedown="selectSearchResult(' + i + ')">' +
      '<div class="ep-search-item-name">' + escHtml(name) + '</div>' +
      (addr ? '<div class="ep-search-item-addr">' + escHtml(addr) + '</div>' : '') +
      '</div>';
  });
  box.innerHTML = html;
}

/* ── Poster tile helpers ── */
var _posterCanvas = null;
var _posterGenTimer = null;

function _lngToTX(lng, z) { return Math.floor((lng + 180) / 360 * Math.pow(2, z)); }
function _latToTY(lat, z) {
  var s = Math.sin(lat * Math.PI / 180);
  return Math.floor((1 - Math.log((1 + s) / (1 - s)) / (2 * Math.PI)) / 2 * Math.pow(2, z));
}
function _txToLng(tx, z) { return tx / Math.pow(2, z) * 360 - 180; }
function _tyToLat(ty, z) {
  var n = Math.PI - 2 * Math.PI * ty / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}
function _chooseTileZoom(minLng, maxLng, minLat, maxLat) {
  for (var z = 15; z >= 4; z--) {
    var x0 = _lngToTX(minLng, z), x1 = _lngToTX(maxLng, z);
    var y0 = _latToTY(maxLat, z), y1 = _latToTY(minLat, z);
    if ((x1 - x0 + 1) * (y1 - y0 + 1) <= 36) return z;
  }
  return 4;
}
function _loadTileImg(url) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { resolve(img); };
    img.onerror = function() { resolve(null); };
    img.src = url;
  });
}

function getSelectedPosterStops() {

/* ── Canvas helpers ── */
function _rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);  ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);      ctx.quadraticCurveTo(x,     y,     x + r, y);
  ctx.closePath();
}
function _clip(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  while (text.length > 1 && ctx.measureText(text + '…').width > maxW) text = text.slice(0, -1);
  return text + '…';
}

function generatePosterCanvasAsync(stops) {
  var W = 1080, PAD = 72;
  var day = DAYS[currentDay];
  var HEADER_H = 240, ROUTE_H = 820, ITEM_H = 92, FOOTER_H = 100;
  var H = HEADER_H + ROUTE_H + stops.length * ITEM_H + FOOTER_H;

  /* Geo bounds */
  var lats = stops.map(function(s){return s.lat;}), lngs = stops.map(function(s){return s.lng;});
  var minLat=Math.min.apply(null,lats), maxLat=Math.max.apply(null,lats);
  var minLng=Math.min.apply(null,lngs), maxLng=Math.max.apply(null,lngs);
  var latSpan=(maxLat-minLat)||0.05, lngSpan=(maxLng-minLng)||0.05;
  minLat-=latSpan*0.28; maxLat+=latSpan*0.28;
  minLng-=lngSpan*0.28; maxLng+=lngSpan*0.28;
  latSpan=maxLat-minLat; lngSpan=maxLng-minLng;
  var rW=W-PAD*2, sx=rW/lngSpan, sy=ROUTE_H/latSpan, sc=Math.min(sx,sy);
  var ox=PAD+(rW-lngSpan*sc)/2, oy=HEADER_H+(ROUTE_H-latSpan*sc)/2;
  function cv(lat,lng){return[ox+(lng-minLng)*sc, oy+(maxLat-lat)*sc];}

  /* Tile fetch */
  var z=_chooseTileZoom(minLng,maxLng,minLat,maxLat);
  var tx0=_lngToTX(minLng,z), tx1=_lngToTX(maxLng,z);
  var ty0=_latToTY(maxLat,z), ty1=_latToTY(minLat,z);
  var subs=['a','b','c'], tileJobs=[];
  for(var ty_=ty0;ty_<=ty1;ty_++){
    for(var tx_=tx0;tx_<=tx1;tx_++){
      (function(tx,ty){
        var url='https://'+subs[(tx+ty)%3]+'.basemaps.cartocdn.com/light_all/'+z+'/'+tx+'/'+ty+'@2x.png';
        tileJobs.push(_loadTileImg(url).then(function(img){return{img:img,tx:tx,ty:ty};}));
      })(tx_,ty_);
    }
  }

  return Promise.all(tileJobs).then(function(tiles){
    var canvas=document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');

    /* Background */
    ctx.fillStyle='#F7F5EE'; ctx.fillRect(0,0,W,H);

    /* Map tile layer — clipped to route area */
    var anyTile = tiles.some(function(t){return !!t.img;});
    if(anyTile){
      ctx.save();
      ctx.beginPath(); ctx.rect(0,HEADER_H,W,ROUTE_H); ctx.clip();
      tiles.forEach(function(t){
        if(!t.img) return;
        var wLng=_txToLng(t.tx,z), eLng=_txToLng(t.tx+1,z);
        var nLat=_tyToLat(t.ty,z), sLat=_tyToLat(t.ty+1,z);
        var p0=cv(nLat,wLng), p1=cv(sLat,eLng);
        ctx.drawImage(t.img,p0[0],p0[1],p1[0]-p0[0],p1[1]-p0[1]);
      });
      ctx.restore();
    }

    /* Lime top bar */
    ctx.fillStyle='#C5E84A'; ctx.fillRect(0,0,W,10);

    /* Header */
    ctx.fillStyle='#C5E84A';
    ctx.beginPath(); ctx.arc(PAD+8,68,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#007A8A';
    ctx.font='600 26px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText('DAY '+currentDay+(day.label?' · '+day.label:''),PAD+24,74);
    ctx.font='700 86px "DM Sans",Helvetica,sans-serif';
    var tparts=(TRIP.title||'ROUTE MAP').trim().split(/\s+/);
    var tacc=tparts[0], trest=tparts.slice(1).join(' ');
    var accW=ctx.measureText(tacc).width+18;
    ctx.fillStyle='#C5E84A'; _rrect(ctx,PAD-6,90,accW,80,6); ctx.fill();
    ctx.fillStyle='#222222'; ctx.fillText(tacc,PAD,158);
    if(trest) ctx.fillText(' '+trest,PAD+accW-4,158);
    ctx.fillStyle='#777777';
    ctx.font='400 30px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText(TRIP.subtitle||'',PAD,203);
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,HEADER_H-12,W-PAD*2,1);

    /* Route lines */
    ctx.lineCap='round'; ctx.lineJoin='round';
    for(var i=0;i<stops.length-1;i++){
      var s0=stops[i],s1=stops[i+1],c=tcfg(s0.transport);
      var fp=cv(s0.lat,s0.lng),tp=cv(s1.lat,s1.lng);
      ctx.beginPath();
      ctx.strokeStyle=anyTile?'rgba(50,50,50,0.22)':'#D9D6CC';
      ctx.lineWidth=Math.max(2,c.lineWeight*1.6);
      ctx.setLineDash(c.dashArray?c.dashArray.split(' ').map(Number).map(function(n){return n*2;}):[]);
      if(c.curve){var cp_ll=ctrlPt([s0.lat,s0.lng],[s1.lat,s1.lng],c.curve),cp=cv(cp_ll[0],cp_ll[1]);ctx.moveTo(fp[0],fp[1]);ctx.quadraticCurveTo(cp[0],cp[1],tp[0],tp[1]);}
      else{ctx.moveTo(fp[0],fp[1]);ctx.lineTo(tp[0],tp[1]);}
      ctx.stroke();
    }
    ctx.setLineDash([]);
    for(var i=0;i<stops.length-1;i++){
      var s0=stops[i],s1=stops[i+1],c=tcfg(s0.transport);
      var fp=cv(s0.lat,s0.lng),tp=cv(s1.lat,s1.lng);
      ctx.beginPath(); ctx.strokeStyle='#C5E84A'; ctx.lineWidth=Math.max(3,c.progWeight*1.6);
      if(c.curve){var cp_ll=ctrlPt([s0.lat,s0.lng],[s1.lat,s1.lng],c.curve),cp=cv(cp_ll[0],cp_ll[1]);ctx.moveTo(fp[0],fp[1]);ctx.quadraticCurveTo(cp[0],cp[1],tp[0],tp[1]);}
      else{ctx.moveTo(fp[0],fp[1]);ctx.lineTo(tp[0],tp[1]);}
      ctx.stroke();
    }

    /* Stop dots */
    ctx.setLineDash([]);
    for(var i=0;i<stops.length;i++){
      var p=cv(stops[i].lat,stops[i].lng);
      var r=(i===0||i===stops.length-1)?15:9;
      ctx.beginPath();ctx.fillStyle='rgba(247,245,238,0.9)';ctx.arc(p[0],p[1],r+4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.fillStyle='#FFFFFF';ctx.arc(p[0],p[1],r,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.strokeStyle='#007A8A';ctx.lineWidth=2.5;ctx.arc(p[0],p[1],r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.fillStyle=(i===0)?'#C5E84A':'#007A8A';ctx.arc(p[0],p[1],r/2.4,0,Math.PI*2);ctx.fill();
    }

    /* Stop list */
    var listTop=HEADER_H+ROUTE_H+20;
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,listTop,W-PAD*2,1); listTop+=20;
    for(var i=0;i<stops.length;i++){
      var s=stops[i], y=listTop+i*ITEM_H;
      var isTerminal=!!s.isDayEnd;
      var transportDisp=s.transport?s.transport.replace(/_/g,' ').toUpperCase():'';
      var labelDisp=s.label||'';
      ctx.fillStyle='#007A8A'; ctx.font='500 21px "Space Grotesk",Helvetica,sans-serif';
      ctx.fillText(s.time,PAD,y+22);
      ctx.fillStyle='#222222'; ctx.font='700 34px "DM Sans",Helvetica,sans-serif';
      ctx.fillText(_clip(ctx,s.name,W-PAD*2-(isTerminal?0:230)),PAD,y+62);
      if(!isTerminal){
        ctx.fillStyle='#AAAAAA'; ctx.font='400 21px "Space Grotesk",Helvetica,sans-serif';
        var tDisp=labelDisp?transportDisp+'  '+labelDisp:transportDisp;
        var tw=_clip(ctx,tDisp,210);
        ctx.fillText(tw,W-PAD-ctx.measureText(tw).width,y+62);
      }
      if(i<stops.length-1){ctx.fillStyle='#EEEEEE';ctx.fillRect(PAD,y+ITEM_H-4,W-PAD*2,1);}
    }

    /* Footer */
    var fy=listTop+stops.length*ITEM_H+20;
    ctx.fillStyle='#D9D6CC'; ctx.fillRect(PAD,fy,W-PAD*2,1);
    ctx.fillStyle='#AAAAAA'; ctx.font='400 22px "Space Grotesk",Helvetica,sans-serif';
    ctx.fillText('Journey Replay',PAD,fy+44);
    if(day.cost){ctx.textAlign='right';ctx.fillText(day.cost,W-PAD,fy+44);ctx.textAlign='left';}
    ctx.fillStyle='#C5E84A'; ctx.fillRect(0,H-10,W,10);

    return canvas;
  });
}

/* ─── Journey Profile ─── */
function haversineKm(lat1, lng1, lat2, lng2) {
  var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function computeJourneyStats() {
  var TYPE_ICONS = {
    plane: '✈️', ferry: '🚢', shinkansen: '🚄',
    train_limited: '🚃', train_local: '🚃',
    bus_express: '🚍', bus_local: '🚌', shuttle: '🚐',
    car: '🚗', bike: '🚴', walk: '🚶'
  };
  var TYPE_LABELS = {
    plane: 'Plane', ferry: 'Ferry', shinkansen: 'Shinkansen',
    train_limited: 'Limited Express', train_local: 'Local Train',
    bus_express: 'Highway Bus', bus_local: 'Local Bus', shuttle: 'Shuttle',
    car: 'Car', bike: 'Bike', walk: 'Walk'
  };
  var allStops = [];
  var days = Object.keys(DAYS).map(Number).sort();
  days.forEach(function(d){ allStops = allStops.concat(DAYS[d].stops); });

  var totalDist = 0, distByType = {}, ridesByType = {}, weightedSpeed = 0;
  for (var i = 0; i < allStops.length - 1; i++) {
    var s = allStops[i];
    var d = haversineKm(s.lat, s.lng, allStops[i+1].lat, allStops[i+1].lng);
    totalDist += d;
    distByType[s.transport]  = (distByType[s.transport]  || 0) + d;
    ridesByType[s.transport] = (ridesByType[s.transport] || 0) + 1;
    weightedSpeed += tcfg(s.transport).speedMult * d;
  }

  var catCount = {};
  allStops.forEach(function(s){
    var cats = Array.isArray(s.categories) ? s.categories : [];
    cats.forEach(function(k){ catCount[k] = (catCount[k]||0) + 1; });
  });

  var rawRhythm = totalDist > 0 ? weightedSpeed / totalDist : 1;
  var rhythmNorm = Math.max(0, Math.min(1, (rawRhythm - 0.42) / (1.9 - 0.42)));
  var rhythmLabel = rhythmNorm < 0.4 ? 'Calm' : rhythmNorm < 0.7 ? 'Balanced' : 'Fast-paced';

  var totalRides = Object.keys(ridesByType).reduce(function(a,k){return a+ridesByType[k];}, 0);
  var totalCatStops = allStops.length;
  var ferryRatio    = (ridesByType.ferry||0) / Math.max(1, totalRides);
  var walkRatio     = (ridesByType.walk||0)  / Math.max(1, totalRides);
  var trainRatio    = ((ridesByType.train_limited||0)+(ridesByType.train_local||0)+(ridesByType.shinkansen||0)) / Math.max(1, totalRides);
  var eventCount    = catCount.event || 0;
  var foodCount     = catCount.food  || 0;
  var sightCount    = catCount.sightseeing || 0;
  var heritageCount = catCount.heritage || 0;
  var onsenCount    = (catCount.onsen||0) + (catCount.stay||0);
  var personality;
  if      (ferryRatio >= 0.2 && walkRatio >= 0.1 && totalDist > 100)                       personality = { icon:'🚢', name:'Island Hopper',      desc:'島と海を巡る旅' };
  else if (eventCount >= 2 && eventCount / Math.max(1,totalCatStops) >= 0.2)               personality = { icon:'🎫', name:'Event Chaser',        desc:'ライブ・イベント中心の遠征' };
  else if (heritageCount / Math.max(1,totalCatStops) >= 0.3 && walkRatio >= 0.15)          personality = { icon:'⛩️', name:'Pilgrimage Walker',   desc:'歴史と文化を歩く旅' };
  else if (heritageCount / Math.max(1,totalCatStops) >= 0.2)                               personality = { icon:'⛩️', name:'Culture Explorer',    desc:'文化探求者' };
  else if (onsenCount / Math.max(1,totalCatStops) >= 0.3)                                  personality = { icon:'♨️', name:'Relaxation Seeker',   desc:'のんびり旅人' };
  else if (foodCount  >= 3)                                                                  personality = { icon:'🍜', name:'Food Tripper',         desc:'食い倒れ旅' };
  else if (sightCount >= 3)                                                                  personality = { icon:'🏛',  name:'Culture Seeker',       desc:'観光・文化系の旅' };
  else if (trainRatio >= 0.3)                                                               personality = { icon:'🚃', name:'Rail Explorer',        desc:'鉄道中心の周遊旅' };
  else if (walkRatio  >= 0.25)                                                              personality = { icon:'🚶', name:'Local Wanderer',       desc:'徒歩中心で街を楽しむ旅' };
  else                                                                                       personality = { icon:'🗺',  name:'Free Traveler',        desc:'スタイルにとらわれない自由な旅' };

  /* ── Vibe ── */
  var transportVariety = Object.keys(ridesByType).length;
  var urbanRides = ['bus_local','train_local','walk','shinkansen','train_limited','bus_express']
    .reduce(function(a,k){return a+(ridesByType[k]||0);}, 0);
  var urbanRatio = urbanRides / Math.max(1, totalRides);
  var ferryRidesCount = ridesByType.ferry || 0;
  var vibe;
  if (ferryRatio >= 0.15 || ferryRidesCount >= 3) {
    vibe = { icon: '🏝', label: 'Island' };
  } else if (totalDist > 300 && transportVariety >= 3) {
    vibe = { icon: '🌲', label: 'Adventure' };
  } else if (urbanRatio > 0.55) {
    vibe = { icon: '🏙', label: 'Urban' };
  } else {
    vibe = { icon: '🌿', label: 'Relaxed' };
  }

  /* ── Story ── */
  var STORY_MAP = {
    'Island Hopper':     'フェリーと海風に乗り、島から島へ渡る旅',
    'Rail Explorer':     '鉄道で駆け抜ける、線路の先に広がる旅',
    'Local Wanderer':    '路地を歩いて街に溶け込む、足で刻む旅',
    'Event Chaser':      'ライブや祭りを追いかける、熱量の旅',
    'Food Tripper':      'ご当地の味を食べ歩く、美食の旅',
    'Culture Seeker':    '歴史と文化の深みを探る旅',
    'Culture Explorer':  '聖地と史跡を巡る、知の旅',
    'Relaxation Seeker': '温泉と宿でゆったり過ごす、癒しの旅',
    'Pilgrimage Walker': '聖地を歩いて巡る、静かな巡礼の旅',
    'Free Traveler':     '移動の記録が、旅の作品になった',
  };
  var story = STORY_MAP[personality.name] || '移動の記録が、旅の作品になった';

  /* ── Achievements ── */
  var achievements = [];
  var walkDist = distByType.walk || 0;
  var busRides = (ridesByType.bus_local||0) + (ridesByType.bus_express||0);
  var ferryRides = ridesByType.ferry || 0;
  var localTrainRides = ridesByType.train_local || 0;
  if (walkDist >= 10)          achievements.push({ icon:'🐕', name:'おさんぽ名人',       desc:'徒歩移動 10km 以上' });
  if ((catCount.cafe||0) >= 5) achievements.push({ icon:'☕', name:'カフェ難民',         desc:'カフェ 5件以上' });
  if (localTrainRides >= 10)   achievements.push({ icon:'🚉', name:'途中下車の達人',      desc:'普通列車 10乗車以上' });
  if (busRides >= 8)           achievements.push({ icon:'🚌', name:'バス沼住人',          desc:'バス 8乗車以上' });
  if (ferryRides >= 5)         achievements.push({ icon:'🚢', name:'船酔いチャレンジャー', desc:'フェリー 5乗船以上' });

  return { totalDays: days.length, totalStops: allStops.length, totalDist: totalDist,
           distByType: distByType, ridesByType: ridesByType, catCount: catCount,
           rhythmNorm: rhythmNorm, rhythmLabel: rhythmLabel,
           personality: personality, vibe: vibe, story: story,
           achievements: achievements, typeIcons: TYPE_ICONS, typeLabels: TYPE_LABELS };
}

function renderProfileBody(st) {
  var h = '';

  /* ── Hero: Personality → Vibe + Rhythm → Story → Stats ── */
  h += '<div class="pf-hero">';
  h += '<div class="pf-eyebrow">Journey Log</div>';
  h += '<div class="pf-title">'+escHtml(TRIP.title)+'</div>';
  h += '<div class="pf-subtitle">'+escHtml(TRIP.subtitle)+'</div>';

  h += '<div class="pf-pers-hero-icon">'+st.personality.icon+'</div>';
  h += '<div class="pf-pers-hero-name">'+escHtml(st.personality.name)+'</div>';

  h += '<div class="pf-chips-row">';
  h += '<span class="pf-chip pf-chip-vibe">'+st.vibe.icon+' '+escHtml(st.vibe.label)+'</span>';
  h += '<span class="pf-chip pf-chip-rhythm">'+escHtml(st.rhythmLabel)+'</span>';
  h += '</div>';

  h += '<div class="pf-story">'+escHtml(st.story)+'</div>';

  h += '<div class="pf-stats-row">';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+Math.round(st.totalDist)+'</div><span class="pf-stat-unit">km</span></div>';
  h += '<div class="pf-stat-div"></div>';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+st.totalDays+'</div><span class="pf-stat-unit">Days</span></div>';
  h += '<div class="pf-stat-div"></div>';
  h += '<div class="pf-stat"><div class="pf-stat-num">'+st.totalStops+'</div><span class="pf-stat-unit">Stops</span></div>';
  h += '</div>';
  h += '</div>'; /* pf-hero */

  /* ── Transport Mix ── */
  var types = Object.keys(st.ridesByType).sort(function(a,b){ return st.ridesByType[b]-st.ridesByType[a]; });
  if (types.length) {
    var maxRides = Math.max.apply(null, types.map(function(t){ return st.ridesByType[t]; }));
    var totalRides = types.reduce(function(a,t){return a+st.ridesByType[t];}, 0);
    h += '<div class="pf-section"><div class="pf-section-label">Transport Mix</div>';
    types.forEach(function(type) {
      var rides = st.ridesByType[type];
      var dist  = Math.round(st.distByType[type] || 0);
      var pct   = Math.round(rides / totalRides * 100);
      var barW  = Math.round(rides / maxRides * 100);
      h += '<div class="pf-bar-row">';
      h += '<span class="pf-bar-icon">'+(st.typeIcons[type]||'·')+'</span>';
      h += '<span class="pf-bar-name">'+(st.typeLabels[type]||type)+'</span>';
      h += '<div class="pf-bar-track"><div class="pf-bar-fill" style="width:'+barW+'%"></div></div>';
      h += '<span class="pf-bar-pct">'+pct+'%</span>';
      h += '<span class="pf-bar-rides">'+rides+' · '+dist+'km</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  /* ── Activity Mix ── */
  var cats = Object.keys(st.catCount).sort(function(a,b){ return st.catCount[b]-st.catCount[a]; });
  if (cats.length) {
    h += '<div class="pf-section"><div class="pf-section-label">Activity Mix</div>';
    cats.forEach(function(cat) {
      var cfg = CATEGORIES[cat]; if(!cfg) return;
      h += '<div class="pf-act-row">';
      h += '<span class="pf-act-icon">'+cfg.icon+'</span>';
      h += '<span class="pf-act-name">'+cfg.label+'</span>';
      h += '<span class="pf-act-count">'+st.catCount[cat]+'</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  /* ── Achievements ── */
  if (st.achievements.length) {
    h += '<div class="pf-section"><div class="pf-section-label">Achievements</div>';
    st.achievements.forEach(function(a) {
      h += '<div class="pf-achievement">';
      h += '<span class="pf-ach-icon">'+a.icon+'</span>';
      h += '<div class="pf-ach-info"><div class="pf-ach-name">'+escHtml(a.name)+'</div><div class="pf-ach-desc">'+escHtml(a.desc)+'</div></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  return h;
}

/* ─── Init ─── */
loadFromStorage();
_setPaletteVars(TRIP.palette || 'tropical');
renderHeader();
renderDayTabs();
switchDay(currentDay);
requestAnimationFrame(function() {
  requestAnimationFrame(function() {
    if (isMobile()) setSheet('peek', false);
  });
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.card-menu-wrap')) closeCardMenu();
});
</script>
</body>
