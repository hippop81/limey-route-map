<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖縄遠征 ROUTE MAP — limey</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#222222;--secondary:#777777;--lime:#C5E84A;--peacock:#007A8A;
  --soft-lime:#E8F5C0;--cream:#F7F5EE;--warm-gray:#D9D6CC;
  --light-gray:#EEEEEE;--white:#FFFFFF;
  --font-head:"DM Sans",sans-serif;--font-body:"Space Grotesk",sans-serif;
  --radius:8px;--ease:cubic-bezier(0.25,0.8,0.25,1);--dur:220ms;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--cream);color:var(--primary);height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;}
.sidebar{width:308px;min-width:308px;background:var(--cream);border-right:1px solid var(--warm-gray);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--warm-gray);background:var(--white);}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--peacock);display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--lime);flex-shrink:0;}
.app-title{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--primary);}
.title-accent{background:var(--lime);padding:0 5px 1px;border-radius:3px;}
.day-tabs{display:flex;border-bottom:1px solid var(--warm-gray);background:var(--white);}
.day-tab{flex:1;padding:10px 4px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--secondary);cursor:pointer;font-family:var(--font-body);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all var(--dur) var(--ease);line-height:1.5;text-align:center;}
.day-tab:hover{color:var(--primary);}
.day-tab.active{color:var(--peacock);border-bottom-color:var(--peacock);background:var(--cream);}
.timeline{flex:1;overflow-y:auto;padding:12px 16px;scrollbar-width:thin;scrollbar-color:var(--warm-gray) var(--cream);}
.timeline::-webkit-scrollbar{width:3px;}
.timeline::-webkit-scrollbar-thumb{background:var(--warm-gray);border-radius:2px;}
.stop-row{display:flex;gap:9px;cursor:pointer;}
.stop-row:hover .stop-card{border-color:#bbb;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.stop-row.active .stop-card{border-left:3px solid var(--peacock);background:var(--white);box-shadow:0 2px 10px rgba(0,122,138,.1);}
.stop-spine{display:flex;flex-direction:column;align-items:center;min-width:14px;padding-top:13px;}
.stop-dot{width:8px;height:8px;border-radius:50%;background:var(--warm-gray);flex-shrink:0;transition:all .2s;}
.stop-row.active .stop-dot{background:var(--peacock);width:10px;height:10px;margin-left:-1px;box-shadow:0 0 0 3px rgba(0,122,138,.15);}
.stop-seg{width:1px;flex:1;background:var(--warm-gray);min-height:12px;}
.stop-card{flex:1;padding:8px 10px;border:1px solid var(--light-gray);border-radius:var(--radius);margin-bottom:9px;background:var(--white);transition:all .2s var(--ease);}
.stop-time{font-family:var(--font-head);font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--secondary);margin-bottom:1px;}
.stop-row.active .stop-time{color:var(--peacock);}
.stop-name{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--primary);line-height:1.3;margin-bottom:2px;}
.stop-desc{font-size:10px;color:var(--secondary);line-height:1.5;margin-bottom:4px;}
.transport-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{font-family:var(--font-body);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.b-bus{background:rgba(0,122,138,.08);color:var(--peacock);border:1px solid rgba(0,122,138,.25);}
.b-train{background:rgba(91,127,166,.08);color:#5b7fa6;border:1px solid rgba(91,127,166,.25);}
.b-plane{background:rgba(139,92,246,.08);color:#8b5cf6;border:1px solid rgba(139,92,246,.25);}
.b-walk{background:var(--light-gray);color:var(--secondary);border:1px solid var(--warm-gray);}
.b-stay{background:rgba(197,232,74,.2);color:#556b00;border:1px solid rgba(197,232,74,.5);}
.b-tour{background:rgba(0,122,138,.12);color:var(--peacock);border:1px solid rgba(0,122,138,.3);}
.price-tag{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--primary);}
.cost-bar{padding:9px 16px;border-top:1px solid var(--warm-gray);display:flex;justify-content:space-between;align-items:center;background:var(--soft-lime);}
.cost-label{font-family:var(--font-body);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#556b00;}
.cost-num{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--primary);}
.controls{padding:11px 16px;border-top:1px solid var(--warm-gray);display:flex;gap:8px;background:var(--white);}
.btn{flex:1;padding:9px;border-radius:var(--radius);border:1.5px solid;cursor:pointer;font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all var(--dur) var(--ease);}
.btn-play{background:var(--peacock);border-color:var(--peacock);color:#fff;}
.btn-play:hover{background:#006475;}
.btn-play.playing{background:var(--white);border-color:var(--peacock);color:var(--peacock);}
.btn-reset{background:transparent;border-color:var(--warm-gray);color:var(--secondary);}
.btn-reset:hover{border-color:var(--primary);color:var(--primary);}
#map{flex:1;}
.leaflet-container{background:#1a6a7a;}
.leaflet-popup-content-wrapper{background:var(--white)!important;border-top:3px solid var(--peacock)!important;border-radius:var(--radius)!important;color:var(--primary)!important;box-shadow:0 4px 16px rgba(0,0,0,.18)!important;padding:0!important;}
.leaflet-popup-content{margin:11px 13px!important;font-family:var(--font-body)!important;}
.leaflet-popup-tip{background:var(--white)!important;}
.leaflet-popup-close-button{color:var(--secondary)!important;}
.leaflet-control-zoom a{background:var(--white)!important;color:var(--primary)!important;border-color:var(--warm-gray)!important;border-radius:6px!important;}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <div class="eyebrow">Okinawa June 2026</div>
    <div class="app-title"><span class="title-accent">ROUTE</span> MAP</div>
  </div>
  <div class="day-tabs">
    <button class="day-tab active" onclick="switchDay(0)">Day 1<br><span style="font-size:9px;font-weight:400;letter-spacing:.01em;text-transform:none">名護・北谷タコス旅</span></button>
    <button class="day-tab" onclick="switchDay(1)">Day 2<br><span style="font-size:9px;font-weight:400;letter-spacing:.01em;text-transform:none">首里・コザ・ライブ</span></button>
    <button class="day-tab" onclick="switchDay(2)">Day 3<br><span style="font-size:9px;font-weight:400;letter-spacing:.01em;text-transform:none">hippopバス・帰京</span></button>
  </div>
  <div class="timeline" id="timeline"></div>
  <div class="cost-bar" id="costBar"></div>
  <div class="controls">
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
    <button class="btn btn-reset" onclick="resetAnim()">&#8635; Reset</button>
  </div>
</div>
<div id="map"></div>

<script>
var DAYS=[
  {
    label:'Day 1',cost:'交通費 ¥1,000（ゆいレール）+ YKB ¥1,600 + 120番',
    center:[26.39,127.82],zoom:10,
    stops:[
      {name:'那覇空港',time:'09:00',desc:'到着！赤嶺駅へ、ホテルに荷物を預ける',transport:'ゆいレール',type:'train',price:'',lat:26.196,lng:127.646},
      {name:'EIBUN palette 旭橋',time:'10:00',desc:'オープンで入る。旅のスタート飯🌮',transport:'徒歩',type:'walk',price:'',lat:26.215,lng:127.681},
      {name:'県庁北口 YKB888乗車',time:'10:20',desc:'名護市役所へ（約1時間40分）',transport:'YKB888',type:'bus',price:'¥1,600',lat:26.216,lng:127.679},
      {name:'名護市役所エリア',time:'12:00',desc:'和タコス🌮・名護市営市場・ひんぷんガジュマル・名護城跡',transport:'徒歩',type:'walk',price:'',lat:26.592,lng:127.978},
      {name:'オリオンハッピーパーク',time:'16:00',desc:'工場見学（予約済）🍺 できたてオリオンビール！17:10出発',transport:'120番',type:'bus',price:'',lat:26.595,lng:127.983},
      {name:'名護城入口 → 桑江',time:'17:16',desc:'120番で北谷方面へ南下（約1時間30分）',transport:'120番',type:'bus',price:'',lat:26.591,lng:127.977},
      {name:'北谷 アメリカンビレッジ',time:'18:45',desc:'ZHYVAGO・Aサインタコス🌮・夕日・スヌーピーサーフショップ・タコロコ🌮',transport:'20/28番',type:'bus',price:'',lat:26.309,lng:127.754},
      {name:'北谷ブルーシール',time:'20:00',desc:'夜のブルーシール撮影📸',transport:'20/28番',type:'bus',price:'',lat:26.309,lng:127.754},
      {name:'安里 国際通り周辺',time:'21:00',desc:'Borrachos / tacos ichicolor / バモス / モンテクリスト / somos TACOS から2軒🌮',transport:'徒歩',type:'walk',price:'',lat:26.216,lng:127.688},
      {name:'ホテルチェックイン',time:'22:00',desc:'グランドキャビンホテル那覇小禄（24h対応）',transport:'到着',type:'stay',price:'',lat:26.201,lng:127.663}
    ]
  },
  {
    label:'Day 2',cost:'OTOPa 1day ¥2,900',
    center:[26.27,127.73],zoom:11,
    stops:[
      {name:'ホテル朝食',time:'06:30',desc:'朝食を食べてから出発',transport:'ゆいレール 17番',type:'train',price:'',lat:26.201,lng:127.663},
      {name:'首里金城石畳・大アカギ',time:'08:00',desc:'石畳を歩いて首里金城の大アカギへ🌿',transport:'徒歩',type:'walk',price:'',lat:26.215,lng:127.720},
      {name:'首里城 奉神門',time:'08:25',desc:'御開門式（うけーじょー）🏯 西のアザナ・守礼門',transport:'徒歩',type:'walk',price:'',lat:26.217,lng:127.719},
      {name:'rokkan coffee',time:'09:00',desc:'朝活コーヒー☕',transport:'346番',type:'bus',price:'',lat:26.217,lng:127.718},
      {name:'壺屋やちむん通り',time:'10:00',desc:'器を選ぶ→配送手配🍶',transport:'徒歩',type:'walk',price:'',lat:26.218,lng:127.690},
      {name:'赤とんぼ / DRUNK TACOS',time:'11:00',desc:'赤とんぼ（電話予約済）/ DRUNK TACOS テイクアウト🌮',transport:'ゆいレール',type:'train',price:'',lat:26.217,lng:127.689},
      {name:'那覇BT 5番のりば',time:'11:40',desc:'30番で比屋根へ（約1時間20分）',transport:'30番バス',type:'bus',price:'',lat:26.215,lng:127.681},
      {name:'比屋根 キングタコス',time:'13:00',desc:'キングタコス🌮',transport:'52番→31番',type:'bus',price:'',lat:26.329,lng:127.799},
      {name:'胡屋 チャーリー多幸寿',time:'13:50',desc:'テイクアウト予約済🌮 → 徒歩orチャリでアリーナへ',transport:'徒歩/Hello Cycling',type:'walk',price:'',lat:26.334,lng:127.803},
      {name:'沖縄サントリーアリーナ',time:'15:00',desc:'SixTONES MILE オーラス 16:00開演🎤',transport:'',type:'stay',price:'',lat:26.331,lng:127.793},
      {name:'カフェオーシャン',time:'19:00',desc:'終演後 徒歩1.6km🌮 LO21:00',transport:'90番',type:'bus',price:'',lat:26.334,lng:127.803},
      {name:'牧志 国際通り周辺',time:'20:30',desc:'Borrachos / tacos ichicolor / バモス / モンテクリスト / somos TACOS から2軒🌮',transport:'徒歩',type:'walk',price:'',lat:26.216,lng:127.688}
    ]
  },
  {
    label:'Day 3',cost:'hippopバス ¥7,000（美ら海・パイン込）',
    center:[26.45,127.85],zoom:10,
    stops:[
      {name:'ホテル朝食・チェックアウト',time:'06:30',desc:'朝食→荷物持ってチェックアウト',transport:'ゆいレール',type:'train',price:'',lat:26.201,lng:127.663},
      {name:'県民広場 hippopバス集合',time:'08:15',desc:'Aコース出発🚌',transport:'hippopバス',type:'tour',price:'¥7,000',lat:26.216,lng:127.681},
      {name:'ナゴパイナップルパーク',time:'10:00',desc:'カート体験！約1時間🍍',transport:'hippopバス',type:'tour',price:'込',lat:26.584,lng:127.964},
      {name:'古宇利島',time:'11:25',desc:'ワルミ大橋は車窓から🌊',transport:'hippopバス',type:'tour',price:'込',lat:26.697,lng:128.036},
      {name:'美ら海水族館',time:'12:20',desc:'ジンベイザメ！約2時間30分🐠',transport:'hippopバス',type:'tour',price:'込',lat:26.694,lng:127.878},
      {name:'御菓子御殿 名護店',time:'16:00',desc:'紅芋タルト🍠 約25分',transport:'hippopバス',type:'tour',price:'',lat:26.592,lng:127.977},
      {name:'万座毛',time:'16:30',desc:'絶景！約30分',transport:'hippopバス',type:'tour',price:'',lat:26.444,lng:127.726},
      {name:'Tギャラリア沖縄 by DFS',time:'17:50',desc:'解散！ジュエリーを見る👀',transport:'バス',type:'bus',price:'',lat:26.219,lng:127.677},
      {name:'残りタコス',time:'18:00',desc:'Borrachos / tacos ichicolor / バモス / モンテクリスト / somos TACOS から残ってるとこ🌮',transport:'バス',type:'bus',price:'',lat:26.216,lng:127.688},
      {name:'那覇空港',time:'19:00',desc:'DFS・4Fラウンジ・3F A&W・スナックコーナー風月✈️',transport:'',type:'stay',price:'',lat:26.196,lng:127.646},
      {name:'搭乗ゲート',time:'20:10',desc:'SNA26 20:30発 → 羽田22:50着',transport:'ソラシドエア SNA26',type:'plane',price:'',lat:26.196,lng:127.646}
    ]
  }
];

var PEACOCK='#007A8A',LIME='#C5E84A';
var map=L.map('map',{zoomControl:true,attributionControl:false});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:19,opacity:.85}).addTo(map);

var currentDay=0,currentStop=-1,playing=false,playTimer=null;
var mapMarkers=[],mapLines=[];

function makeIcon(s,active){
  if(active){return L.divIcon({className:'',html:'<div style="width:34px;height:34px;background:'+LIME+';border:2.5px solid #222;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(197,232,74,.3),0 3px 10px rgba(0,0,0,.3)"><div style="width:10px;height:10px;background:#222;border-radius:50%"></div></div>',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-17]});}
  return L.divIcon({className:'',html:'<div style="width:22px;height:22px;background:#fff;border:2px solid '+PEACOCK+';border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)"><div style="width:7px;height:7px;background:'+PEACOCK+';border-radius:50%"></div></div>',iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-11]});
}

function renderTimeline(){
  var d=DAYS[currentDay];
  var html='';
  for(var i=0;i<d.stops.length;i++){
    var s=d.stops[i];
    var isActive=i===currentStop;
    var hasT=s.transport&&s.transport!=='到着';
    var tHtml='';
    if(hasT){tHtml='<div class="transport-row"><span class="badge b-'+s.type+'">'+s.transport+'</span>'+(s.price?'<span class="price-tag">'+s.price+'</span>':'')+'</div>';}
    html+='<div class="stop-row'+(isActive?' active':'')+'" onclick="jumpTo('+i+')" id="sr'+i+'">';
    html+='<div class="stop-spine"><div class="stop-dot"></div>'+(i<d.stops.length-1?'<div class="stop-seg"></div>':'')+'</div>';
    html+='<div style="flex:1"><div class="stop-card"><div class="stop-time">'+s.time+'</div><div class="stop-name">'+s.name+'</div><div class="stop-desc">'+s.desc+'</div>'+tHtml+'</div></div></div>';
  }
  document.getElementById('timeline').innerHTML=html;
  document.getElementById('costBar').innerHTML='<span class="cost-label">交通費メモ</span><span class="cost-num">'+d.cost+'</span>';
}

function renderMap(){
  for(var i=0;i<mapMarkers.length;i++)map.removeLayer(mapMarkers[i]);
  for(var i=0;i<mapLines.length;i++)map.removeLayer(mapLines[i]);
  mapMarkers=[];mapLines=[];
  var d=DAYS[currentDay];
  var ll=[];
  for(var i=0;i<d.stops.length;i++)if(d.stops[i].lat)ll.push([d.stops[i].lat,d.stops[i].lng]);
  if(ll.length>1)mapLines.push(L.polyline(ll,{color:PEACOCK,weight:2.5,opacity:.6,dashArray:'8 5'}).addTo(map));
  for(var i=0;i<d.stops.length;i++){
    (function(idx){
      var s=d.stops[idx];
      if(!s.lat)return;
      var m=L.marker([s.lat,s.lng],{icon:makeIcon(s,idx===currentStop)}).addTo(map);
      var hasT=s.transport&&s.transport!=='到着';
      var tHtml=hasT?'<div style="margin-top:5px"><span style="font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:rgba(0,122,138,.1);color:'+PEACOCK+';border:1px solid rgba(0,122,138,.3)">'+s.transport+'</span>'+(s.price?'<span style="font-size:10px;font-weight:700;color:#222;margin-left:4px">'+s.price+'</span>':'')+'</div>':'';
      m.bindPopup('<div style="font-family:Space Grotesk,sans-serif;min-width:155px"><div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:'+PEACOCK+';margin-bottom:2px">'+s.time+'</div><div style="font-family:DM Sans,sans-serif;font-weight:700;font-size:13px;color:#222;margin-bottom:3px;line-height:1.3">'+s.name+'</div><div style="font-size:11px;color:#777;line-height:1.5">'+s.desc+'</div>'+tHtml+'</div>');
      m.on('click',function(){jumpTo(idx);});
      mapMarkers.push(m);
    })(i);
  }
  map.setView(d.center,d.zoom,{animate:true});
}

function jumpTo(i){
  currentStop=i;
  var d=DAYS[currentDay];
  for(var j=0;j<mapMarkers.length;j++)mapMarkers[j].setIcon(makeIcon(d.stops[j],j===i));
  map.flyTo([d.stops[i].lat,d.stops[i].lng],13,{duration:.7});
  mapMarkers[i].openPopup();
  renderTimeline();
  var el=document.getElementById('sr'+i);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchDay(i){
  currentDay=i;currentStop=-1;playing=false;clearInterval(playTimer);
  document.getElementById('playBtn').innerHTML='&#9654; Play';
  document.getElementById('playBtn').classList.remove('playing');
  document.querySelectorAll('.day-tab').forEach(function(t,j){t.classList.toggle('active',j===i);});
  renderTimeline();renderMap();
}

function togglePlay(){
  if(playing){
    clearInterval(playTimer);playing=false;
    document.getElementById('playBtn').innerHTML='&#9654; Play';
    document.getElementById('playBtn').classList.remove('playing');
  } else {
    playing=true;
    document.getElementById('playBtn').innerHTML='&#9632; Stop';
    document.getElementById('playBtn').classList.add('playing');
    var max=DAYS[currentDay].stops.length;
    if(currentStop>=max-1)currentStop=-1;
    playTimer=setInterval(function(){
      currentStop++;
      if(currentStop>=max){clearInterval(playTimer);playing=false;document.getElementById('playBtn').innerHTML='&#9654; Play';document.getElementById('playBtn').classList.remove('playing');return;}
      jumpTo(currentStop);
    },2200);
  }
}

function resetAnim(){
  clearInterval(playTimer);playing=false;currentStop=-1;
  document.getElementById('playBtn').innerHTML='&#9654; Play';
  document.getElementById('playBtn').classList.remove('playing');
  renderTimeline();renderMap();
}

switchDay(0);
</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-client.js"></script>
<script src="./trip-repository.js"></script>
</body>
