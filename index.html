function withTimeout(promise, ms, label) {
  return new Promise(function(resolve, reject) {
    var settled = false;
    var timer = setTimeout(function() {
      if (settled) return;
      settled = true;
      reject(new Error((label || 'Operation') + ' timed out after ' + ms + 'ms'));
    }, ms);
    Promise.resolve(promise).then(function(value) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      resolve(value);
    }, function(err) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(err);
    });
  });
}

function fallbackEnrichedTrip(trip) {
  return {
    id: trip.id,
    title: trip.title,
    updated_at: trip.updated_at || trip.created_at,
    stopCount: 0,
    emoji: extractEmoji(trip.title, null)
  };
}

async function enrichTrip(trip) {
  var routeData = null;
  try {
    routeData = await withTimeout(
      TripRepository.loadTrip(trip.id),
      TRIP_ENRICH_TIMEOUT_MS,
      'loadTrip'
    );
  } catch (err) {
    console.warn('[Limey] enrichTrip failed for trip', trip.id, err);
  }
  return {
    id: trip.id,
    title: trip.title,
    updated_at: trip.updated_at || trip.created_at,
    stopCount: countStops(routeData),
    emoji: extractEmoji(trip.title, routeData)
  };
}

function renderTripCard(trip) {
  var card = document.createElement('article');
  card.className = 'trip-card';
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('data-trip-id', trip.id);
  card.innerHTML =
    '<div class="trip-card-emoji" aria-hidden="true">' + escapeHtml(trip.emoji) + '</div>' +
    '<div class="trip-card-body">' +
      '<div class="trip-card-title">' + escapeHtml(stripLeadingEmoji(trip.title)) + '</div>' +
      '<div class="trip-card-meta">' +
        '<span>' + trip.stopCount + ' stop' + (trip.stopCount === 1 ? '' : 's') + '</span>' +
        '<span>Updated ' + escapeHtml(formatRelativeDate(trip.updated_at)) + '</span>' +
        '<span class="trip-card-sync" data-sync-state="idle"></span>' +
      '</div>' +
    '</div>' +
    '<button class="trip-card-delete" type="button" aria-label="Delete trip" title="Delete trip">&#128465;</button>';

  card.addEventListener('click', function() { openTrip(trip.id, trip.title); });
  card.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTrip(trip.id, trip.title); }
  });
  card.querySelector('.trip-card-delete').addEventListener('click', function(e) {
    e.stopPropagation();
    handleDeleteTrip(trip.id);
  });
  return card;
}

function renderTripsList(enriched) {
  var listEl = document.getElementById('tripsList');
  listEl.innerHTML = '';
  if (!enriched.length) {
    listEl.hidden = true;
    document.getElementById('tripsEmpty').hidden = false;
    return;
  }
  document.getElementById('tripsEmpty').hidden = true;
  listEl.hidden = false;
  enriched.forEach(function(trip) { listEl.appendChild(renderTripCard(trip)); });
}

async function refreshTripsList() {
  setTripsLoading(true);
  document.getElementById('tripsError').hidden = true;
  try {
    var trips = await TripRepository.listTrips();
    setTripsLoading(false);
    renderTripsList(trips.map(fallbackEnrichedTrip));
    var enriched = await Promise.all(trips.map(function(trip) {
      return enrichTrip(trip).catch(function(err) {
        console.warn('[Limey] enrichTrip rejected:', trip.id, err);
        return fallbackEnrichedTrip(trip);
      });
    }));
    renderTripsList(enriched);
  } catch (err) {
    console.error('[Limey] refreshTripsList failed:', err);
    document.getElementById('tripsList').hidden = true;
    document.getElementById('tripsEmpty').hidden = true;
    var errEl = document.getElementById('tripsError');
    errEl.textContent = 'Could not load trips. ' + (err.message || 'Please try again.');
    errEl.hidden = false;
  } finally {
    setTripsLoading(false);
  }
}

async function handleNewTrip() {
  var title = window.prompt('Trip title');
  if (title === null) return;
  title = title.trim() || 'Untitled Trip';
  try {
    var result = await TripRepository.createTrip(title);
    await refreshTripsList();
    if (result && result.trip) openTrip(result.trip.id, result.trip.title);
  } catch (err) {
    window.alert('Could not create trip: ' + (err.message || 'Unknown error'));
  }
}

async function handleDeleteTrip(tripId) {
  if (!window.confirm('Delete this trip?')) return;
  cancelAutoSave();
  try {
    await TripRepository.deleteTrip(tripId);
    if (currentTripId === tripId) {
      stopReplay();
      clearRouteLayers();
      currentTripId = null;
      currentRoute = null;
      savedSnapshot = '';
      showScreen('trips');
    }
    await refreshTripsList();
  } catch (err) {
    window.alert('Could not delete trip: ' + (err.message || 'Unknown error'));
  }
}

async function goToTrips() {
  stopReplay();
  await flushPendingSave();
  if (isDirty() && !window.confirm('You have unsaved changes. Leave without saving?')) return;
  cancelAutoSave();
  clearRouteLayers();
  currentTripId = null;
  currentRoute = null;
  savedSnapshot = '';
  showScreen('trips');
  refreshTripsList();
}

async function openTrip(tripId, tripTitle) {
  try {
    setSharedViewMode(false);
    var routeData = await TripRepository.loadTrip(tripId);
    if (!await switchTrip(tripId, routeData, tripTitle)) return;
    setTimeout(function() { if (map) map.invalidateSize(); }, 50);
  } catch (err) {
    window.alert('Could not load trip: ' + (err.message || 'Unknown error'));
  }
}

async function switchTrip(tripId, routeData, tripTitle) {
  stopReplay();
  await flushPendingSave();
  if (isDirty() && !window.confirm('You have unsaved changes. Continue without saving?')) return false;

  cancelAutoSave();
  suppressAutosave = true;
  clearRouteLayers();
  resetEditMode();

  currentTripId = tripId;
  currentRoute = normalizeRouteData(routeData, tripTitle);
  currentTripTitle = tripTitle || getRouteTitle(currentRoute) || 'Trip';

  currentDay = 0;
  currentStop = -1;

  savedSnapshot = JSON.stringify(currentRoute);
  DAYS = routeDataToDays(currentRoute);
  document.getElementById('mapEyebrow').textContent = stripLeadingEmoji(currentTripTitle);

  showScreen('map');
  ensureMap();
  render();

  suppressAutosave = false;
  updateSaveStatus('saved');
  return true;
}

function initApp() {
  preloadLimeyIcons();
  var tripId = getSharedTripIdFromUrl();
  if (tripId) {
    enterSharedView(tripId);
    return;
  }
  setSharedViewMode(false);
  showScreen('trips');
  refreshTripsList();
}

/* ── Map / replay engine ── */
var PEACOCK='#3F6B77',LIME='#C7E93E',CHARCOAL='#212121';
var map=null, mapReady=false, routeLayer=null;
var currentDay=0,currentStop=-1,playing=false,playTimer=null;
var mapMarkers=[];

function stopReplay() {
  clearInterval(playTimer);
  playTimer = null;
  playing = false;
  clearReplayTransitTimer();
  replayPhase = 'at_stop';
  replayTransitMode = 'walk';
  currentStop = -1;
  setPlayButtonState(false);
}

function clearRouteLayers() {
  if (map) map.closePopup();
  if (routeLayer) routeLayer.clearLayers();
  mapMarkers = [];
}

function render() {
  renderDayTabs();
  renderTimeline();
  renderMap();
}

function ensureMap() {
  if (mapReady) return;
  map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:19,opacity:.85}).addTo(map);
  routeLayer = L.layerGroup().addTo(map);
  mapReady=true;
  updateMapChromeForSheet();
}

function renderDayTabs() {
  var tabs = document.getElementById('dayTabs');
  var html = '';
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var sub = escapeHtml(d.label || ('Day ' + (i + 1)));
    html += '<button class="day-tab' + (i === currentDay ? ' active' : '') + '" onclick="switchDay(' + i + ')">Day ' + (i + 1) +
      '<br><span style="font-size:9px;font-weight:400;letter-spacing:.01em;text-transform:none">' + sub + '</span></button>';
  }
  tabs.innerHTML = html;
  var hint = document.getElementById('daySwipeHint');
  if (hint) hint.hidden = !(isMobileLayout() && DAYS.length > 1);
}

function makeStopMarkerIcon(idx) {
  var markerSize = 40;
  var isActive = idx === currentStop;
  var isDone = currentStop >= 0 && idx < currentStop;
  var iconOpts = {
    className: 'limey-map-marker',
    iconSize: [markerSize, markerSize],
    iconAnchor: [markerSize / 2, markerSize / 2],
    popupAnchor: [0, -(markerSize / 2)]
  };
  if (!isActive) {
    return L.divIcon(Object.assign({}, iconOpts, {
      iconSize: [22, 22],
      iconAnchor: [11, 11],
      popupAnchor: [0, -11],
      html: '<div class="stop-marker-host' + (isDone ? ' is-done' : '') + '" style="width:22px;height:22px;background:var(--color-surface);border:2px solid var(--color-charcoal);border-radius:50%;display:flex;align-items:center;justify-content:center"><div style="width:7px;height:7px;background:var(--color-charcoal);border-radius:50%"></div></div>'
    }));
  }
  var pinVisible = replayPhase !== 'in_transit';
  var transportName = transportModeToIconName(replayTransitMode);
  var pinLayer = iconMarkup('marker-current-pin', 'var(--color-lime)', 32, 32);
  var transportInner = iconMarkup(transportName, 'var(--color-muted-peacock)', 20, 20);
  var transportLayer = '<div class="replay-transport-disc">' + transportInner + '</div>';
  if (!pinLayer) {
    return L.divIcon(Object.assign({}, iconOpts, {
      html: '<div style="width:40px;height:40px;background:var(--color-lime);border:2px solid var(--color-charcoal);border-radius:50%"></div>'
    }));
  }
  var html = '<div class="replay-marker-host">' +
    '<div class="replay-marker-layer pin' + (pinVisible ? ' is-visible' : '') + '">' + pinLayer + '</div>' +
    '<div class="replay-marker-layer transport' + (!pinVisible ? ' is-visible' : '') + '">' + transportLayer + '</div>' +
    '</div>';
  return L.divIcon(Object.assign({}, iconOpts, { html: html }));
}

function refreshMarkerIcons() {
  var d = DAYS[currentDay];
  if (!d || !mapMarkers.length) return;
  for (var j = 0; j < mapMarkers.length; j++) {
    mapMarkers[j].setIcon(makeStopMarkerIcon(j));
  }
}

function renderAddRow(insertAfter){
  return '<div class="add-row"><button type="button" class="btn-add-stop" onclick="event.stopPropagation();openEP(-1,'+insertAfter+')">+ Add stop'+(insertAfter>=0?' after':' at start')+'</button></div>';
}

function renderTimeline(){
  var d=DAYS[currentDay];
  var tl=document.getElementById('timeline');
  var canEdit = editMode && !isSharedView;
  tl.className = 'timeline' + (canEdit ? ' edit-mode' : '');
  if (!d) {
    tl.innerHTML = canEdit
      ? renderAddRow(-1) + '<div style="padding:16px;text-align:center;color:var(--secondary);font-size:12px">No stops in this day</div>'
      : '<div style="padding:16px;text-align:center;color:var(--secondary);font-size:12px">No stops in this day</div>';
    document.getElementById('costBar').innerHTML = '';
    return;
  }
  var html='';
  if (canEdit) html += renderAddRow(-1);
  for(var i=0;i<d.stops.length;i++){
    var s=d.stops[i];
    var isActive=i===currentStop;
    var isDone=currentStop>=0&&i<currentStop;
    var hasT=s.transport&&s.transport!=='到着';
    var tHtml='';
    if(hasT){tHtml='<div class="transport-row"><span class="badge b-'+s.type+'">'+escapeHtml(s.transport)+'</span>'+(s.price?'<span class="price-tag">'+escapeHtml(s.price)+'</span>':'')+'</div>';}
    var dragAttr = canEdit ? ' draggable="true" ondragstart="onDragStart(event,'+i+')" ondragover="onDragOver(event,'+i+')" ondrop="onDrop(event,'+i+')" ondragend="onDragEnd(event)"' : '';
    var clickAttr = canEdit ? '' : ' onclick="jumpTo('+i+')"';
    var editActions = canEdit
      ? '<div class="stop-edit-actions">'+
          '<span class="drag-handle" draggable="false" ondragstart="event.stopPropagation()" title="ドラッグして並び替え">&#10495;</span>'+
          '<button type="button" class="stop-action-btn" onclick="event.stopPropagation();openEP('+i+',-1)" title="編集">&#9999;</button>'+
          '<button type="button" class="stop-action-btn" onclick="event.stopPropagation();handleDeleteStop('+i+')" title="削除">&#128465;</button>'+
        '</div>'
      : '';
    html+='<div class="stop-row'+(isActive?' active':'')+(isDone?' is-done':'')+'"'+clickAttr+dragAttr+' id="sr'+i+'">';
    html+='<div class="stop-spine"><div class="stop-dot"></div></div>';
    html+='<div style="flex:1"><div class="stop-card"><div class="stop-time">'+escapeHtml(s.time)+'</div><div class="stop-name">'+escapeHtml(s.name)+'</div><div class="stop-desc">'+escapeHtml(s.desc)+'</div>'+tHtml+'</div></div>';
    html+=editActions;
    html+='</div>';
    if (i < d.stops.length - 1) {
      html += renderTransitConnector(getTransitEstimate(s, d.stops[i + 1]), i);
    }
    if (canEdit) html += renderAddRow(i);
  }
  tl.innerHTML=html;
  document.getElementById('costBar').innerHTML='<span class="cost-label">交通費メモ</span><span class="cost-num">'+escapeHtml(d.cost)+'</span>';
}

function renderMap(){
  if (!map || !routeLayer) return;
  routeLayer.clearLayers();
  mapMarkers=[];
  var d=DAYS[currentDay];
  if (!d) return;
  var ll=[];
  for(var i=0;i<d.stops.length;i++)if(d.stops[i].lat)ll.push([d.stops[i].lat,d.stops[i].lng]);
  if(ll.length>1)routeLayer.addLayer(L.polyline(ll,{color:PEACOCK,weight:3,opacity:.85}));
  for(var i=0;i<d.stops.length;i++){
    (function(idx){
      var s=d.stops[idx];
      if(!s.lat)return;
      var m=L.marker([s.lat,s.lng],{icon:makeStopMarkerIcon(idx)});
      var hasT=s.transport&&s.transport!=='到着';
      var tHtml=hasT?'<div style="margin-top:5px"><span style="font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;background:#E9E6E2;color:#6A6C67;border:1px solid #E1DED9">'+escapeHtml(s.transport)+'</span>'+(s.price?'<span style="font-size:10px;font-weight:700;color:'+CHARCOAL+';margin-left:4px">'+escapeHtml(s.price)+'</span>':'')+'</div>':'';
      m.bindPopup('<div style="font-family:Space Grotesk,sans-serif;min-width:155px"><div style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#A1A19B;margin-bottom:2px">'+escapeHtml(s.time)+'</div><div style="font-family:DM Sans,sans-serif;font-weight:700;font-size:13px;color:'+CHARCOAL+';margin-bottom:3px;line-height:1.3">'+escapeHtml(s.name)+'</div><div style="font-size:11px;color:#6A6C67;line-height:1.5">'+escapeHtml(s.desc)+'</div>'+tHtml+'</div>');
      m.on('click',function(){jumpTo(idx);});
      routeLayer.addLayer(m);
      mapMarkers.push(m);
    })(i);
  }
  map.setView(d.center,d.zoom,{animate:true});
}

function jumpTo(i){
  clearReplayTransitTimer();
  currentStop=i;
  var d=DAYS[currentDay];
  if (!d || !d.stops[i] || !d.stops[i].lat) return;
  replayPhase = 'at_stop';
  replayTransitMode = i < d.stops.length - 1 ? normalizeTransportMode(d.stops[i + 1]) : 'walk';
  refreshMarkerIcons();
  map.flyTo([d.stops[i].lat,d.stops[i].lng],13,{duration:.7});
  mapMarkers[i].openPopup();
  renderTimeline();
  if (playing && i < d.stops.length - 1) scheduleInTransitPhase(i);
  var el=document.getElementById('sr'+i);
  if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchDay(i){
  stopReplay();
  currentDay=i;
  closeEP();
  document.querySelectorAll('.day-tab').forEach(function(t,j){t.classList.toggle('active',j===i);});
  renderTimeline();
  renderMap();
}

function togglePlay(){
  if(playing){
    clearInterval(playTimer);
    playTimer=null;
    playing=false;
    clearReplayTransitTimer();
    replayPhase='at_stop';
    setPlayButtonState(false);
    refreshMarkerIcons();
    renderTimeline();
  } else {
    playing=true;
    setPlayButtonState(true);
    var max=DAYS[currentDay].stops.length;
    if(currentStop>=max-1)currentStop=-1;
    if(currentStop>=0) scheduleInTransitPhase(currentStop);
    playTimer=setInterval(function(){
      currentStop++;
      if(currentStop>=max){
        clearInterval(playTimer);
        playTimer=null;
        playing=false;
        clearReplayTransitTimer();
        replayPhase='at_stop';
        setPlayButtonState(false);
        refreshMarkerIcons();
        renderTimeline();
        return;
      }
      jumpTo(currentStop);
    },2200);
  }
}

function resetAnim(){
  stopReplay();
  replayPhase='at_stop';
  renderTimeline();
  renderMap();
}

/* ── Mobile UX (Pre-Okinawa review) ── */
var MOBILE_MAX_WIDTH = 767;
var SHEET_STATES = ['peek', 'half', 'full'];
var sheetState = 'half';
var sheetDrag = { active: false, startY: 0, startH: 0, moved: false, lastY: 0, lastT: 0, velocity: 0 };
var daySwipe = { active: false, x0: 0, y0: 0, locked: null };

function isMobileLayout() {
  return window.matchMedia('(max-width: ' + MOBILE_MAX_WIDTH + 'px)').matches;
}

function getSheetHeightTargets() {
  var vh = window.innerHeight;
  return {
    peek: 120,
    half: Math.round(vh * 0.58),
    full: Math.round(Math.min(vh * 0.88, vh - 48))
  };
}

function setSheetState(state) {
  if (SHEET_STATES.indexOf(state) === -1) state = 'half';
  sheetState = state;
  var sheet = document.getElementById('routeSheet');
  if (sheet) {
    sheet.setAttribute('data-sheet', state);
    sheet.style.height = '';
  }
  updateMapChromeForSheet();
  if (map && mapReady) {
    setTimeout(function() { map.invalidateSize(); }, 240);
  }
}

function updateMapChromeForSheet() {
  var zoom = document.querySelector('#mapScreen .leaflet-bottom.leaflet-right');
  if (!zoom) return;
  if (!isMobileLayout()) {
    zoom.style.bottom = '';
    return;
  }
  var sheet = document.getElementById('routeSheet');
  var h = sheet ? sheet.getBoundingClientRect().height : 0;
  zoom.style.bottom = Math.max(12, h + 8) + 'px';
}

function onMapScreenVisible() {
  if (!isMobileLayout()) {
    setSheetState('half');
    return;
  }
  setSheetState(sheetState || 'half');
  updateMapChromeForSheet();
  if (map && mapReady) setTimeout(function() { map.invalidateSize(); }, 80);
}

function initRouteSheet() {
  var sheet = document.getElementById('routeSheet');
  var handle = document.getElementById('sheetHandle');
  if (!sheet || !handle || handle._sheetInit) return;
  handle._sheetInit = true;

  function snapSheetFromHeight(h, velocity) {
    var targets = getSheetHeightTargets();
    var v = velocity || 0;
    if (v < -0.35) {
      setSheetState('full');
      return;
    }
    if (v > 0.35) {
      setSheetState(h < (targets.peek + targets.half) / 2 ? 'peek' : 'half');
      return;
    }
    var fullBias = targets.half + (targets.full - targets.half) * 0.32;
    var peekBias = targets.peek + (targets.half - targets.peek) * 0.38;
    if (h >= fullBias) {
      setSheetState('full');
      return;
    }
    if (h <= peekBias) {
      setSheetState('peek');
      return;
    }
    setSheetState('half');
  }

  handle.addEventListener('pointerdown', function(e) {
    if (!isMobileLayout()) return;
    sheetDrag.active = true;
    sheetDrag.moved = false;
    sheetDrag.startY = e.clientY;
    sheetDrag.startH = sheet.getBoundingClientRect().height;
    sheetDrag.lastY = e.clientY;
    sheetDrag.lastT = performance.now();
    sheetDrag.velocity = 0;
    sheet.classList.add('sheet-dragging');
    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener('pointermove', function(e) {
    if (!sheetDrag.active || !isMobileLayout()) return;
    var dy = sheetDrag.startY - e.clientY;
    if (Math.abs(dy) > 6) sheetDrag.moved = true;
    var now = performance.now();
    var dt = now - sheetDrag.lastT;
    if (dt > 0) sheetDrag.velocity = (sheetDrag.lastY - e.clientY) / dt;
    sheetDrag.lastY = e.clientY;
    sheetDrag.lastT = now;
    var targets = getSheetHeightTargets();
    var newH = Math.max(targets.peek, Math.min(targets.full, sheetDrag.startH + dy));
    sheet.style.height = newH + 'px';
    updateMapChromeForSheet();
  });

  function endSheetDrag(e) {
    if (!sheetDrag.active) return;
    sheetDrag.active = false;
    sheet.classList.remove('sheet-dragging');
    try { handle.releasePointerCapture(e.pointerId); } catch (err) { /* ignore */ }
    if (!sheetDrag.moved && isMobileLayout()) {
      setSheetState(sheetState === 'full' ? 'half' : 'full');
      return;
    }
    snapSheetFromHeight(sheet.getBoundingClientRect().height, sheetDrag.velocity);
  }

  handle.addEventListener('pointerup', endSheetDrag);
  handle.addEventListener('pointercancel', endSheetDrag);

  window.addEventListener('resize', function() {
    if (!isMobileLayout()) {
      sheet.style.height = '';
      updateMapChromeForSheet();
      return;
    }
    updateMapChromeForSheet();
  });
}

function initDaySwipe() {
  var el = document.getElementById('timeline');
  if (!el || el._daySwipeInit) return;
  el._daySwipeInit = true;

  el.addEventListener('touchstart', function(e) {
    if (!isMobileLayout() || e.touches.length !== 1 || sheetState === 'peek') return;
    daySwipe.active = true;
    daySwipe.x0 = e.touches[0].clientX;
    daySwipe.y0 = e.touches[0].clientY;
    daySwipe.locked = null;
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    if (!daySwipe.active || !isMobileLayout() || e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - daySwipe.x0;
    var dy = e.touches[0].clientY - daySwipe.y0;
    if (!daySwipe.locked) {
      if (Math.abs(dy) > 14 && Math.abs(dy) > Math.abs(dx)) {
        daySwipe.locked = 'vertical';
        return;
      }
      if (Math.abs(dx) > 14 && Math.abs(dx) > Math.abs(dy) * 1.4) {
        daySwipe.locked = 'horizontal';
        el.classList.add('day-swipe-lock');
      }
    }
    if (daySwipe.locked === 'horizontal') e.preventDefault();
  }, { passive: false });

  function endDaySwipe(e) {
    if (!daySwipe.active) return;
    el.classList.remove('day-swipe-lock');
    if (daySwipe.locked !== 'horizontal' || !e.changedTouches || !e.changedTouches.length) {
      daySwipe.active = false;
      daySwipe.locked = null;
      return;
    }
    var dx = e.changedTouches[0].clientX - daySwipe.x0;
    daySwipe.active = false;
    daySwipe.locked = null;
    if (Math.abs(dx) < 56 || DAYS.length < 2) return;
    if (dx < 0 && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
    else if (dx > 0 && currentDay > 0) switchDay(currentDay - 1);
  }

  el.addEventListener('touchend', endDaySwipe, { passive: true });
  el.addEventListener('touchcancel', endDaySwipe, { passive: true });
}

initRouteSheet();
initDaySwipe();

initApp();
</script>
</body>
